    box.querySelectorAll('[data-f]').forEach(function(el){
      var fkey=el.getAttribute('data-f');var v=el.value;
      if(fkey==='impact'||fkey==='effort')v=Math.min(5,Math.max(1,parseInt(v)||3));
      f[fkey]=v;
    });
    f.linkedKRId=pendingKR;
    f.linkedInitiativeIds=pendingInits;
    f.risks=pendingRisks;
    f.updatedAt=new Date().toISOString();
    features[f.id]=f;
    rmSaveFeatures(features);
    if(f.linkedKRId)tmSyncKRLink(f.id, '', f.linkedKRId);
    logEntry('Updated feature '+f.id,'edit');
    toast('Feature saved','ok');
    ov.remove();
    renderRoadmaps();
  };
  box.querySelector('#rm-drawer-del').onclick=function(){
    if(!confirm('Delete this feature?'))return;
    delete features[f.id];rmSaveFeatures(features);
    logEntry('Deleted feature '+f.id,'del');toast('Deleted','ok');
    ov.remove();renderRoadmaps();
  };
  box.querySelector('#rm-drawer-close').onclick=function(){ov.remove();};
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  function onEsc(e){if(e.key==='Escape'){ov.remove();document.removeEventListener('keydown',onEsc);}}
  document.addEventListener('keydown',onEsc);
}

// ── Initiative picker (small searchable list) ──────────────────────────
function rmOpenInitiativePicker(onSelect){
  var ov=document.createElement('div');ov.className='rm-init-picker-ov';
  var box=document.createElement('div');box.className='rm-init-picker';
  var initiatives=rmGetAllInitiatives();
  if(initiatives.length===0){
    box.innerHTML='<div class="rm-empty-inline">No initiatives found. Create one in the Strategy module first.</div><button class="rm-btn" id="rm-init-picker-close">Close</button>';
    ov.appendChild(box);document.body.appendChild(ov);
    box.querySelector('#rm-init-picker-close').onclick=function(){ov.remove();};
    ov.onclick=function(e){if(e.target===ov)ov.remove();};
    return;
  }
  box.innerHTML='<input class="rm-init-search" placeholder="Search initiatives..." />'+
    '<div class="rm-init-list-wrap" id="rm-init-search-list"></div>'+
    '<button class="rm-btn" id="rm-init-picker-cancel">Cancel</button>';
  ov.appendChild(box);document.body.appendChild(ov);
  var inp=box.querySelector('.rm-init-search');
  var list=box.querySelector('#rm-init-search-list');
  function render(f){
    list.innerHTML='';
    var filt=(f||'').toLowerCase();
    initiatives.filter(function(i){return !filt||i.id.toLowerCase().indexOf(filt)>=0||i.title.toLowerCase().indexOf(filt)>=0;}).slice(0,40).forEach(function(i){
      var r=document.createElement('div');r.className='rm-init-pick-row';
      r.innerHTML='<span class="rm-init-id">'+esc(i.id)+'</span><span class="rm-init-pick-title">'+esc(i.title)+'</span><span class="rm-init-prog">'+i.progress+'%</span>';
      r.onclick=function(){onSelect(i.id);ov.remove();};
      list.appendChild(r);
    });
  }
  render('');
  inp.addEventListener('input',function(){render(this.value);});
  inp.focus();
  box.querySelector('#rm-init-picker-cancel').onclick=function(){ov.remove();};
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
}

// ── New Feature modal ──────────────────────────────────────────────────
function rmOpenNewFeatureModal(){
  var themes=rmLoadThemes();
  var ov=document.createElement('div');ov.id='rm-new-ov';ov.className='rm-new-ov';
  var box=document.createElement('div');box.className='rm-new-box';
  var themeOpts=Object.keys(themes).map(function(tid){return '<option value="'+esc(tid)+'">'+esc(themes[tid].title)+'</option>';}).join('');
  box.innerHTML='<button class="rm-new-close" id="rm-nf-close">×</button>'+
    '<div class="rm-new-h">New feature</div>'+
    '<div class="rm-new-sub">A discrete user-visible thing being built. Link to a theme and a strategic KR.</div>'+
    '<input class="rm-new-name" id="rm-nf-title" placeholder="Feature name..."/>'+
    '<div class="rm-new-row"><label>THEME</label><select id="rm-nf-theme"><option value="">— no theme —</option>'+themeOpts+'</select></div>'+
    '<div class="rm-new-row"><label>HORIZON</label><select id="rm-nf-horizon">'+RM_HORIZONS.map(function(h){return '<option'+(h==='Next'?' selected':'')+'>'+h+'</option>';}).join('')+'</select></div>'+
    '<div class="rm-new-row"><label>TARGET</label><select id="rm-nf-target"><option value="">— unscheduled —</option>'+RM_QUARTERS.map(function(q){return '<option>'+q+'</option>';}).join('')+'</select></div>'+
    '<div class="rm-new-row"><label>OWNER</label><select id="rm-nf-owner">'+tmAssigneeOptions(currentUser?currentUser.name:'')+'</select></div>'+
    '<div class="rm-new-foot"><button class="rm-btn" id="rm-nf-cancel">Cancel</button><button class="rm-btn rm-btn-primary" id="rm-nf-create">Create</button></div>';
  ov.appendChild(box);document.body.appendChild(ov);
  function close(){ov.remove();document.removeEventListener('keydown',onEsc);}
  function onEsc(e){if(e.key==='Escape')close();}
  document.addEventListener('keydown',onEsc);
  ov.onclick=function(e){if(e.target===ov)close();};
  box.querySelector('#rm-nf-close').onclick=close;
  box.querySelector('#rm-nf-cancel').onclick=close;
  function create(){
    var title=(box.querySelector('#rm-nf-title').value||'').trim();
    if(!title){toast('Title required','err');return;}
    var features=rmLoadFeatures();
    var seq=Object.keys(features).length+1;
    var id='F-'+String(seq).padStart(3,'0');
    while(features[id]){seq++;id='F-'+String(seq).padStart(3,'0');}
    features[id]={
      id:id, title:title,
      themeId:box.querySelector('#rm-nf-theme').value||'',
      horizon:box.querySelector('#rm-nf-horizon').value||'Next',
      targetQuarter:box.querySelector('#rm-nf-target').value||'',
      ownerName:box.querySelector('#rm-nf-owner').value||(currentUser?currentUser.name:''),
      status:'Discovery', confidence:'Medium', progressPct:0, impact:3, effort:3,
      risks:[], linkedInitiativeIds:[], linkedKRId:'',description:'',
      createdAt:new Date().toISOString()
    };
    rmSaveFeatures(features);
    logEntry('Feature '+id+' created: '+title,'add');
    toast('Feature created','ok');
    close();renderRoadmaps();
    // Open drawer for editing
    setTimeout(function(){rmOpenFeatureDrawer(id);},100);
  }
  box.querySelector('#rm-nf-create').onclick=create;
  box.querySelector('#rm-nf-title').focus();
  box.querySelector('#rm-nf-title').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();create();}});
}

// ── New Theme modal ────────────────────────────────────────────────────
function rmOpenNewThemeModal(){rmOpenThemeEdit(null);}
function rmOpenThemeEdit(themeId){
  var themes=rmLoadThemes();
  var existing=themeId?themes[themeId]:null;
  var ov=document.createElement('div');ov.className='rm-new-ov';
  var box=document.createElement('div');box.className='rm-new-box';
  var colors=['#6c63ff','#10b981','#f59e0b','#ef4444','#3b82f6','#ec4899','#14b8a6'];
  box.innerHTML='<button class="rm-new-close" id="rm-nt-close">×</button>'+
    '<div class="rm-new-h">'+(existing?'Edit theme':'New theme')+'</div>'+
    '<div class="rm-new-sub">A strategic grouping for features (e.g. Improve Customer Experience).</div>'+
    '<input class="rm-new-name" id="rm-nt-title" placeholder="Theme name..." value="'+esc(existing?existing.title:'')+'"/>'+
    '<textarea class="rm-textarea" id="rm-nt-desc" placeholder="What does this theme represent strategically?">'+esc(existing?(existing.description||''):'')+'</textarea>'+
    '<div class="rm-new-row"><label>COLOR</label><div class="rm-color-row">'+colors.map(function(c){return '<button type="button" class="rm-color-swatch'+((existing?existing.color:'#6c63ff')===c?' active':'')+'" data-c="'+c+'" style="background:'+c+'"></button>';}).join('')+'</div></div>'+
    '<div class="rm-new-foot">'+
      (existing?'<button class="rm-btn rm-btn-danger" id="rm-nt-del">Delete</button>':'')+
      '<button class="rm-btn" id="rm-nt-cancel">Cancel</button>'+
      '<button class="rm-btn rm-btn-primary" id="rm-nt-save">'+(existing?'Save':'Create')+'</button>'+
    '</div>';
  ov.appendChild(box);document.body.appendChild(ov);
  var selectedColor=existing?existing.color:'#6c63ff';
  box.querySelectorAll('.rm-color-swatch').forEach(function(b){
    b.onclick=function(){selectedColor=this.getAttribute('data-c');box.querySelectorAll('.rm-color-swatch').forEach(function(bb){bb.classList.remove('active');});this.classList.add('active');};
  });
  function close(){ov.remove();}
  ov.onclick=function(e){if(e.target===ov)close();};
  box.querySelector('#rm-nt-close').onclick=close;
  box.querySelector('#rm-nt-cancel').onclick=close;
  if(existing)box.querySelector('#rm-nt-del').onclick=function(){
    if(!confirm('Delete theme? Features will be unassigned.'))return;
    delete themes[themeId];rmSaveThemes(themes);
    // Unassign features
    var fts=rmLoadFeatures();
    Object.values(fts).forEach(function(f){if(f.themeId===themeId)f.themeId='';});
    rmSaveFeatures(fts);
    logEntry('Deleted theme '+themeId,'del');toast('Theme deleted','ok');
    close();renderRoadmaps();
  };
  box.querySelector('#rm-nt-save').onclick=function(){
    var title=(box.querySelector('#rm-nt-title').value||'').trim();
    if(!title){toast('Title required','err');return;}
    var desc=(box.querySelector('#rm-nt-desc').value||'').trim();
    if(existing){existing.title=title;existing.description=desc;existing.color=selectedColor;existing.updatedAt=new Date().toISOString();}
    else{
      var seq=Object.keys(themes).length+1;var id='T-'+String(seq).padStart(2,'0');
      while(themes[id]){seq++;id='T-'+String(seq).padStart(2,'0');}
      themes[id]={id:id,title:title,description:desc,ownerEmail:currentUser?currentUser.email:'',color:selectedColor,order:Object.keys(themes).length,createdAt:new Date().toISOString()};
    }
    rmSaveThemes(themes);
    logEntry('Theme '+(existing?'updated':'created')+': '+title,existing?'edit':'add');
    toast('Theme saved','ok');close();renderRoadmaps();
  };
  box.querySelector('#rm-nt-title').focus();
}


init();
</script>
</body>
</html>
