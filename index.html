function wrapField(label,el){
  var d=document.createElement('div');d.className='fl';
  var l=document.createElement('span');l.textContent=label.toUpperCase();l.style.cssText='color:var(--mut);font-size:9px;letter-spacing:.5px';
  d.appendChild(l);d.appendChild(el);return d;
}

function matchesFilters(n,st,edges,nodesMap){
  // Type filter — but the cascade must still include parents to reach matches
  if(st.dept!=='All'&&n.dept&&n.dept!==st.dept&&n.type!=='CompanyObjective')return false;
  if(st.dept!=='All'&&n.type==='CompanyObjective'){
    // a CO matches if any descendant matches the dept filter; cheap check: any DO/KR/Init in this dept with parent path
    var descMatches=anyDescendantInDept(n.id,st.dept,edges,nodesMap);
    if(!descMatches)return false;
  }
  if(st.owner!=='All'){var o=(n.ownerEmail||n.ownerName||'');if(o!==st.owner)return false;}
  if(st.type!=='All'&&n.type!==st.type)return false;
  if(st.search){
    var q=st.search.toLowerCase();
    if(String(n.title||'').toLowerCase().indexOf(q)<0&&String(n.id||'').toLowerCase().indexOf(q)<0)return false;
  }
  return true;
}
function anyDescendantInDept(rootId,dept,edges,nodesMap){
  var stack=[rootId],seen={};
  while(stack.length){
    var id=stack.pop();if(seen[id])continue;seen[id]=1;
    var n=nodesMap[id];if(n&&n.dept===dept)return true;
    edges.filter(function(e){return e.p===id;}).forEach(function(e){stack.push(e.c);});
  }
  return false;
}

function renderNode(n,edges,nodesMap,st,depth){
  var wrap=document.createElement('div');wrap.className='strat-node';
  var children=edges.filter(function(e){return e.p===n.id;}).map(function(e){return nodesMap[e.c];}).filter(Boolean);
  // Filter visible children, but always recurse — collapsed by default beyond L5 for top-level reads
  var expanded=st.expanded[n.id];
  if(expanded===undefined){
    expanded=(n.type==='CompanyObjective'||n.type==='DepartmentObjective');
  }
  var tier=tierFor(n.type);
  var head=document.createElement('div');head.className='strat-node-h';
  var caret=document.createElement('span');caret.className='strat-caret'+(expanded?' open':'');
  caret.textContent=children.length>0?'▸':' ';
  caret.onclick=function(ev){ev.stopPropagation();toggleExpand(n.id);NS.renderStrategy();};
  head.appendChild(caret);

  var tch=document.createElement('span');tch.className='strat-tier '+tier;tch.textContent=tier;
  head.appendChild(tch);

  var idch=document.createElement('span');idch.className='strat-id';idch.textContent=n.id;
  head.appendChild(idch);

  var name=document.createElement('span');name.className='strat-name '+tier;name.textContent=n.title||'(untitled)';
  head.appendChild(name);

  // progress bar
  if(typeof n.progressPct==='number'&&n.type!=='Task'){
    var pw=document.createElement('div');pw.className='strat-prog';
    var pb=document.createElement('div');pb.className='strat-prog-bar';pb.style.width=Math.min(100,Math.max(0,n.progressPct))+'%';
    pw.appendChild(pb);head.appendChild(pw);
  }
  // owner
  var owner=n.ownerEmail||n.ownerName;
  if(owner){var ow=document.createElement('span');ow.className='strat-owner';ow.textContent=truncate(owner,18);head.appendChild(ow);}

  // scores
  var sc=document.createElement('div');sc.className='strat-scores';
  var aS=NS.alignmentScore(n,edges,nodesMap);
  var eS=NS.execReadinessScore(n,edges,nodesMap);
  var rL=NS.riskLevel(n,edges,nodesMap);
  sc.appendChild(scoreChip('A',aS,bandClass(aS),'Alignment Score: '+aS+'/100 — strategic linkage quality. Click node for breakdown.'));
  sc.appendChild(scoreChip('E',eS,bandClass(eS),'Execution Readiness: '+eS+'/100 — has owner, children, metric. Click node for breakdown.'));
  sc.appendChild(scoreChip('R',rL,(rL==='Low'?'s-ok':(rL==='Medium'?'s-warn':'s-bad')),'Risk Level: '+rL+' — based on progress vs. expected, confidence, blockers, stale activity.'));
  head.appendChild(sc);

  head.onclick=function(){openDetail(n,edges,nodesMap);};
  wrap.appendChild(head);

  if(expanded&&children.length>0){
    var cwrap=document.createElement('div');cwrap.className='strat-children';
    children.forEach(function(cn){
      if(!matchesFilters(cn,st,edges,nodesMap)&&!anyDescendantMatches(cn,st,edges,nodesMap))return;
      cwrap.appendChild(renderNode(cn,edges,nodesMap,st,depth+1));
    });
    wrap.appendChild(cwrap);
  }
  return wrap;
}
function anyDescendantMatches(n,st,edges,nodesMap){
  var stack=[n.id],seen={};
  while(stack.length){
    var id=stack.pop();if(seen[id])continue;seen[id]=1;
    var nn=nodesMap[id];
    if(nn&&matchesFilters(nn,st,edges,nodesMap)&&nn.id!==n.id)return true;
    edges.filter(function(e){return e.p===id;}).forEach(function(e){stack.push(e.c);});
  }
  return false;
}

function scoreChip(letter,val,cls,tip){
  var s=document.createElement('span');s.className='strat-score '+cls;

function tierFor(type){
  return {CompanyObjective:'L1',DepartmentObjective:'L2',TeamObjective:'L3',IndividualObjective:'L4',KeyResult:'L5',Initiative:'L6',Task:'L7'}[type]||'L?';
}

function renderSummary(nodesMap,edges,st){
  var c=document.createElement('div');c.className='strat-card';
  var counts={CompanyObjective:0,DepartmentObjective:0,KeyResult:0,Initiative:0,Task:0};
  Object.values(nodesMap).forEach(function(n){if(counts[n.type]!=null)counts[n.type]++;});
  var avgA=0,avgE=0,cnt=0;
  Object.values(nodesMap).forEach(function(n){
    if(n.type==='Task')return;
    avgA+=NS.alignmentScore(n,edges,nodesMap);
    avgE+=NS.execReadinessScore(n,edges,nodesMap);
    cnt++;
  });
  avgA=cnt?Math.round(avgA/cnt):0;avgE=cnt?Math.round(avgE/cnt):0;
  c.innerHTML='<div class="strat-card-h">EXECUTION PORTFOLIO — '+quarterLabel(st.quarter)+'</div>';
  var grid=document.createElement('div');grid.className='strat-stat';
  grid.appendChild(mkStat(counts.CompanyObjective,'L1 COMPANY','var(--acc)'));
  grid.appendChild(mkStat(counts.DepartmentObjective,'L2 DEPT','var(--grn)'));
  grid.appendChild(mkStat(counts.KeyResult,'L5 KRs','var(--red)'));
  grid.appendChild(mkStat(counts.Initiative,'L6 INIT','#5aa3e0'));
  grid.appendChild(mkStat(avgA+'%','AVG ALIGN','var(--acc)'));
  grid.appendChild(mkStat(avgE+'%','AVG READY','var(--grn)'));
  c.appendChild(grid);
  return c;
}
function mkStat(val,label,color){
  var d=document.createElement('div');d.className='strat-stat-c';
  d.innerHTML='<div class="strat-stat-v" style="color:'+color+'">'+val+'</div><div class="strat-stat-l">'+label+'</div>';
  return d;
}

function renderInsightsPanel(st){
  var c=document.createElement('div');c.className='strat-card';
  c.innerHTML='<div class="strat-card-h">INSIGHTS (HEURISTIC)</div>';
  var ins=NS.computeInsights(st.quarter);
  if(ins.length===0){
    var ok=document.createElement('div');ok.style.cssText='font-size:11px;color:var(--mut);padding:14px;text-align:center';
    ok.innerHTML='○ No issues detected. Strategy graph looks clean.';
    c.appendChild(ok);return c;
  }
  // sort severity
  var order={high:0,med:1,low:2};ins.sort(function(a,b){return order[a.sev]-order[b.sev];});
  ins.slice(0,12).forEach(function(i){
    var d=document.createElement('div');d.className='strat-insight sev-'+(i.sev==='high'?'high':i.sev==='med'?'med':'low');
    d.innerHTML='<div class="strat-insight-t">'+i.type+'</div>'
      +'<div class="strat-insight-b">'+esc(i.body)+'</div>'
      +(i.nodeId?'<div class="strat-insight-id">'+i.nodeId+'</div>':'');
    if(i.nodeId){
      d.style.cursor='pointer';
      d.onclick=function(){
        var allN=loadNodes()[st.quarter]||{};var allE=loadEdges()[st.quarter]||[];
        var nodesMap=Object.assign({},allN);
        allE.forEach(function(e){if(e.c.indexOf('TA-')===0&&!nodesMap[e.c]){var t=NS.getTask(e.c);if(t)nodesMap[e.c]={id:e.c,type:'Task',title:t.name,dept:t.dept,quarter:st.quarter,ownerName:t.assignee,progressPct:t.progress||0,state:t.status,due:t.due};}});
        var n=nodesMap[i.nodeId];if(n)openDetail(n,allE,nodesMap);
      };
    }
    c.appendChild(d);
  });
  if(ins.length>12){
    var more=document.createElement('div');more.style.cssText='font-size:10px;color:var(--mut);text-align:center;margin-top:8px;font-family:Roboto Mono,monospace';
    more.textContent='+ '+(ins.length-12)+' more insights';
    c.appendChild(more);
  }
  return c;
}

function openDetail(n,edges,nodesMap){
  var dp=document.getElementById('strat-detail-panel');
  if(!dp){dp=document.createElement('div');dp.id='strat-detail-panel';dp.className='strat-detail';document.body.appendChild(dp);}
  dp.innerHTML='';
  var close=document.createElement('button');close.className='strat-detail-close';close.innerHTML='×';
  close.onclick=function(){dp.classList.remove('open');};
  dp.appendChild(close);

  var tier=tierFor(n.type);
  var h=document.createElement('h3');h.textContent=n.title||'(untitled)';dp.appendChild(h);
  var meta=document.createElement('div');meta.className='strat-detail-meta';
  meta.innerHTML='<span class="strat-tier '+tier+'">'+tier+' · '+n.type.replace(/([A-Z])/g,' $1').trim()+'</span>'
    +'<span class="strat-id">'+n.id+'</span>'
    +(n.dept?'<span class="strat-owner">'+n.dept+'</span>':'')
    +(n.quarter?'<span class="strat-owner">'+quarterLabel(n.quarter)+'</span>':'')
    +(n.state?'<span class="strat-owner" style="color:var(--acc)">'+n.state+'</span>':'');
  dp.appendChild(meta);

  // Scores section
  var aS=NS.alignmentScore(n,edges,nodesMap);
  var eS=NS.execReadinessScore(n,edges,nodesMap);
  var rL=NS.riskLevel(n,edges,nodesMap);
  var sect=document.createElement('div');sect.className='strat-detail-sect';
  sect.innerHTML='<h4>SCORES</h4>';
  var sg=document.createElement('div');sg.style.cssText='display:flex;gap:10px;flex-wrap:wrap';
  sg.appendChild(scoreBlock('Alignment',aS+'/100',bandClass(aS),
    '40 if has parent traceable upward (or is L1)<br>20 if parents same quarter<br>20 if owner set<br>20 if title shares tokens with a parent'));
  sg.appendChild(scoreBlock('Execution Readiness',eS+'/100',bandClass(eS),
    '25 if enough children<br>25 if all children have owner<br>20 if children have due dates<br>15 if workload estimate set<br>15 if metric fully defined (KR)'));
  sg.appendChild(scoreBlock('Risk',rL,(rL==='Low'?'s-ok':(rL==='Medium'?'s-warn':'s-bad')),
    'Composite of: progress vs expected,<br>confidence flag, blocker state,<br>stalled activity (>14 days)'));
  sect.appendChild(sg);
  dp.appendChild(sect);

  // Owner
  var oSec=document.createElement('div');oSec.className='strat-detail-sect';
  oSec.innerHTML='<h4>OWNERSHIP</h4><div style="font-size:12px">'+
    (n.ownerName||n.ownerEmail?(esc(n.ownerName||'')+(n.ownerEmail?(' <span class="strat-owner">&middot; '+esc(n.ownerEmail)+'</span>'):'')):'<span class="strat-link-empty">No owner assigned</span>')
    +'</div>';
  dp.appendChild(oSec);

  // Lineage: parents
  var pSec=document.createElement('div');pSec.className='strat-detail-sect';
  pSec.innerHTML='<h4>PARENTS</h4>';
  var parents=edges.filter(function(e){return e.c===n.id;}).map(function(e){return nodesMap[e.p];}).filter(Boolean);
  if(!parents.length)pSec.innerHTML+='<div class="strat-link-empty">No parents (top of cascade)</div>';
  else parents.forEach(function(p){
    var l=document.createElement('div');l.className='strat-link';
    l.innerHTML='<span class="strat-tier '+tierFor(p.type)+'">'+tierFor(p.type)+'</span><span style="flex:1">'+esc(p.title)+'</span><span class="strat-id">'+p.id+'</span>';
    l.onclick=function(){openDetail(p,edges,nodesMap);};
    pSec.appendChild(l);
  });
  dp.appendChild(pSec);

  // Children
  var cSec=document.createElement('div');cSec.className='strat-detail-sect';
  cSec.innerHTML='<h4>CHILDREN</h4>';
  var ch=edges.filter(function(e){return e.p===n.id;}).map(function(e){return nodesMap[e.c];}).filter(Boolean);
  if(!ch.length)cSec.innerHTML+='<div class="strat-link-empty">No children — execution missing</div>';
  else ch.forEach(function(p){
    var l=document.createElement('div');l.className='strat-link';
    l.innerHTML='<span class="strat-tier '+tierFor(p.type)+'">'+tierFor(p.type)+'</span><span style="flex:1">'+esc(p.title||'(untitled)')+'</span>'
      +(typeof p.progressPct==='number'?'<span class="strat-owner">'+p.progressPct+'%</span>':'')
      +'<span class="strat-id">'+p.id+'</span>';
    l.onclick=function(){openDetail(p,edges,nodesMap);};
    cSec.appendChild(l);
  });
  dp.appendChild(cSec);

  // KR metric (placeholder)
  if(n.type==='KeyResult'){
    var mSec=document.createElement('div');mSec.className='strat-detail-sect';
    var m=n.metric||{};
    mSec.innerHTML='<h4>METRIC</h4>'
      +'<div class="strat-score-explain">'
      +'Baseline: '+(m.baseline!=null?esc(String(m.baseline)):'<em>not set</em>')+'<br>'
      +'Target: '+(m.target!=null?esc(String(m.target)):'<em>not set</em>')+'<br>'
      +'Unit: '+(m.unit?esc(m.unit):'<em>not set</em>')+'<br>'
      +'Direction: '+(m.direction?esc(m.direction):'<em>not set</em>')+'<br>'
      +'Confidence: '+esc(n.confidence||'—')
      +'</div>'
      +'<div style="font-size:10px;color:var(--mut);margin-top:8px;font-family:Roboto Mono,monospace">Metric editing lands in Phase 3 (Execution Planning Engine).</div>';
    dp.appendChild(mSec);
  }

  // Linked tasks (live) for Initiative
  if(n.type==='Initiative'){
    var tSec=document.createElement('div');tSec.className='strat-detail-sect';
    tSec.innerHTML='<h4>LINKED TASKS (LIVE)</h4>';
    var tasks=ch.filter(function(c){return c.type==='Task';});
    if(!tasks.length)tSec.innerHTML+='<div class="strat-link-empty">No tasks attached</div>';
    else tasks.forEach(function(t){
      var l=document.createElement('div');l.className='strat-link';
      l.innerHTML='<span class="strat-id">'+t.id.replace('TA-','')+'</span><span style="flex:1">'+esc(t.title)+'</span><span class="strat-owner">'+esc(t.state||'')+'</span><span class="strat-owner">'+(t.progressPct||0)+'%</span>';
      tSec.appendChild(l);
    });
    dp.appendChild(tSec);
  }

  // Footer hint
  var foot=document.createElement('div');foot.className='strat-detail-sect';
  foot.innerHTML='<div style="font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;border-top:1px solid var(--brd);padding-top:10px;line-height:1.6">'
    +'Edit ownership, metric, planning fields & state transitions land in Phase 3.<br>'
    +'Mindmap visualization with drag-and-drop reparenting lands in Phase 4.'
    +'</div>';
  dp.appendChild(foot);

  dp.classList.add('open');
}

  d.innerHTML='<div style="font-size:9px;font-weight:800;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.5px;margin-bottom:4px">'+label.toUpperCase()+'</div>'

// ── Interactive Strategic Mindmap (v2) ────────────────────────────────
// Layout: focus on the LEFT, children stacked VERTICALLY on the RIGHT,
// connected by horizontal S-curves. Pan via drag, zoom via wheel.
// Re-focus is in-place: only the SVG re-renders, no modal teardown.
var _MM={
  focusId:null, quarter:null, member:'', container:null, svg:null,
  pan:{x:0,y:0}, zoom:1, dragStart:null, layout:'tree'
};

NS.openMindmap=function(focusId){

  }
  if(!focusId||!nodesMap[focusId]){
    var firstL1=Object.values(nodesMap).find(function(n){return n.type==='CompanyObjective';});

  _MM.focusId=focusId;
  _MM.pan={x:0,y:0};_MM.zoom=1;

  // Open or reuse modal
  var ov=document.getElementById('strat-mm-overlay');

    ov=document.createElement('div');ov.id='strat-mm-overlay';ov.className='mm-ov';
    document.body.appendChild(ov);
  }
  ov.innerHTML='';
  var box=document.createElement('div');box.className='mm-box';
  ov.appendChild(box);

  // === Top bar ===
  var top=document.createElement('div');top.className='mm-top';
  var title=document.createElement('div');title.className='mm-title';

  var nodesForCo=_mmHydrateNodes(_MM.quarter);

  };
  top.appendChild(_mmField('CO FILTER',coSel));

  var upBtn=document.createElement('button');upBtn.className='mm-btn';upBtn.innerHTML='↑ Up';
  upBtn.id='mm-up-btn';
  upBtn.onclick=function(){_mmGoUp();};
  top.appendChild(upBtn);

  var resetBtn=document.createElement('button');resetBtn.className='mm-btn';resetBtn.innerHTML='⌂ Top';
  resetBtn.onclick=function(){
    var nm=_mmHydrateNodes(_MM.quarter);
    var firstL1=Object.values(nm).find(function(n){return n.type==='CompanyObjective';});
    if(firstL1)_mmRefocus(firstL1.id);

  top.appendChild(resetBtn);

  var zoomOut=document.createElement('button');zoomOut.className='mm-btn';zoomOut.innerHTML='−';zoomOut.title='Zoom out';
  zoomOut.onclick=function(){_MM.zoom=Math.max(0.4,_MM.zoom-0.15);_mmApplyTransform();};

  zoomIn.onclick=function(){_MM.zoom=Math.min(2.5,_MM.zoom+0.15);_mmApplyTransform();};
  top.appendChild(zoomIn);
  var zoomReset=document.createElement('button');zoomReset.className='mm-btn';zoomReset.innerHTML='⊙';zoomReset.title='Reset view';
  zoomReset.onclick=function(){_MM.zoom=1;_MM.pan={x:0,y:0};_mmApplyTransform();};
  top.appendChild(zoomReset);

  // Layout toggle: Tree (focus + children) vs Chain (CO → Dept → Individual)
  var layoutWrap=document.createElement('div');layoutWrap.className='mm-layout-toggle';
  ['tree','chain'].forEach(function(mode){
    var b=document.createElement('button');b.className='mm-btn mm-layout-btn'+(_MM.layout===mode?' active':'');
    b.innerHTML=mode==='chain'?'🔗 Strategy Chain'+_thi('3-column layout: Company Objective in column 1, Department Objectives in column 2, Individuals (people who own KRs/IOs) in column 3. Curves connect the strategic chain CO → Dept → Person. Click any node to drill.'):'🌲 Tree'+_thi('Focus node on the left with its direct children stacked on the right. Click a child to refocus, ↑ Up to walk to parent.');
    b.onclick=(function(m){return function(){_MM.layout=m;var s=loadUI();s.mmLayout=m;saveUI(s);if(_MM.container)_mmRenderSvgInto(_MM.container);Array.from(layoutWrap.querySelectorAll('button')).forEach(function(bb,i){bb.classList.toggle('active',(i===0?'tree':'chain')===m);});};})(mode);

  top.appendChild(layoutWrap);

  var closeBtn=document.createElement('button');closeBtn.className='mm-close';closeBtn.innerHTML='×';

  box.appendChild(foot);

  _MM.container=svgHost;

  // Render SVG into host

  // Persist focus
  var s=loadUI();s.mmFocus=focusId;s.quarter=_MM.quarter;saveUI(s);

  ov.onclick=function(e){if(e.target===ov)ov.classList.remove('open');};
  function onEsc(e){if(e.key==='Escape'){ov.classList.remove('open');document.removeEventListener('keydown',onEsc);}}
  document.addEventListener('keydown',onEsc);

function _mmField(label,el){
  var d=document.createElement('div');d.style.cssText='display:flex;align-items:center;gap:6px';
  var l=document.createElement('span');l.textContent=label;l.style.cssText='font-size:9px;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.5px';
  d.appendChild(l);d.appendChild(el);return d;
}

function _mmHydrateNodes(quarter){
  var allNodes=loadNodes()[quarter]||{};
  var allEdges=loadEdges()[quarter]||[];
  var nodesMap=Object.assign({},allNodes);
  allEdges.forEach(function(e){
    if(e.c.indexOf('TA-')===0&&!nodesMap[e.c]){
      var t=NS.getTask(e.c);
      if(t)nodesMap[e.c]={id:e.c,type:'Task',title:t.name,dept:t.dept,quarter:quarter,ownerName:t.assignee,progressPct:t.progress||0,state:t.status,due:t.due};
    }
  });
  return nodesMap;
}

function _mmGoUp(){
  var nm=_mmHydrateNodes(_MM.quarter);
  var es=loadEdges()[_MM.quarter]||[];
  var p=es.filter(function(e){return e.c===_MM.focusId;}).map(function(e){return nm[e.p];}).filter(Boolean)[0];
  if(p)_mmRefocus(p.id);
}

function _mmRefocus(newFocusId){
  _MM.focusId=newFocusId;
  _MM.pan={x:0,y:0};_MM.zoom=1;
  var s=loadUI();s.mmFocus=newFocusId;saveUI(s);
  if(_MM.container){
    _mmRenderSvgInto(_MM.container);
    _mmRenderCrumb();
    _mmUpdateUpBtn();
  }
}

function _mmUpdateUpBtn(){
  var btn=document.getElementById('mm-up-btn');if(!btn)return;
  var es=loadEdges()[_MM.quarter]||[];
  var hasParent=es.some(function(e){return e.c===_MM.focusId;});
  btn.disabled=!hasParent;
  btn.style.opacity=hasParent?'1':'.4';
  btn.style.cursor=hasParent?'pointer':'not-allowed';
}

function _mmRenderCrumb(){
  var crumb=document.getElementById('mm-crumb');if(!crumb)return;
  crumb.innerHTML='';
  var nm=_mmHydrateNodes(_MM.quarter);
  var es=loadEdges()[_MM.quarter]||[];
  var chain=buildAncestorChain(_MM.focusId,es,nm);
  chain.forEach(function(n,i){
    var c=document.createElement('span');c.className='mm-crumb-item'+(i===chain.length-1?' active':'');
    c.innerHTML='<span class="strat-tier '+tierFor(n.type)+'" style="font-size:8px;padding:1px 5px">'+tierFor(n.type)+'</span> '+esc(truncate(n.title,38));
    c.onclick=function(){_mmRefocus(n.id);};
    crumb.appendChild(c);
    if(i<chain.length-1){var sep=document.createElement('span');sep.className='mm-crumb-sep';sep.textContent='›';crumb.appendChild(sep);}
  });
}

function _mmBindCanvas(canvas){
  // Pan: mousedown on background, move, up
  canvas.addEventListener('mousedown',function(e){
    // Don't pan if clicking a node group
    if(e.target.closest('.mm-node-g'))return;
    _MM.dragStart={x:e.clientX-_MM.pan.x,y:e.clientY-_MM.pan.y};
    canvas.style.cursor='grabbing';
  });
  canvas.addEventListener('mousemove',function(e){
    if(!_MM.dragStart)return;
    _MM.pan.x=e.clientX-_MM.dragStart.x;
    _MM.pan.y=e.clientY-_MM.dragStart.y;
    _mmApplyTransform();
  });
  canvas.addEventListener('mouseup',function(){_MM.dragStart=null;canvas.style.cursor='grab';});
  canvas.addEventListener('mouseleave',function(){_MM.dragStart=null;canvas.style.cursor='grab';});
  // Zoom: wheel
  canvas.addEventListener('wheel',function(e){
    e.preventDefault();
    var delta=e.deltaY<0?0.1:-0.1;
    _MM.zoom=Math.max(0.4,Math.min(2.5,_MM.zoom+delta));
    _mmApplyTransform();
  },{passive:false});
  canvas.style.cursor='grab';
}

function _mmApplyTransform(){
  if(!_MM.container)return;
  var g=_MM.container.querySelector('.mm-pan-group');
  if(g)g.setAttribute('transform','translate('+_MM.pan.x+' '+_MM.pan.y+') scale('+_MM.zoom+')');
}

function _mmRenderSvgInto(host){
  host.innerHTML='';
  var nodesMap=_mmHydrateNodes(_MM.quarter);
  var edges=loadEdges()[_MM.quarter]||[];
  var focus=nodesMap[_MM.focusId];
  if(!focus){
    host.innerHTML='<div style="text-align:center;color:var(--mut);font-size:13px;padding:60px">No node selected</div>';
    return;
  }
  if(_MM.layout==='chain'){return _mmRenderChainSvg(host,nodesMap,edges,focus);}

  // Resolve children with member filter
  var children=edges.filter(function(e){return e.p===_MM.focusId;}).map(function(e){return nodesMap[e.c];}).filter(Boolean);
  if(_MM.member&&window.USER_REGISTRY){
    var u=USER_REGISTRY[_MM.member];var mN=u?u.name:_MM.member;
    children=children.filter(function(c){
      var o=(c.ownerName||c.ownerEmail||'');
      if(o===mN||o===_MM.member)return true;
      return hasDescendantOwnedBy(c.id,mN,_MM.member,edges,nodesMap);
    });
  }
  var parents=edges.filter(function(e){return e.c===_MM.focusId;}).map(function(e){return nodesMap[e.p];}).filter(Boolean);
  var parent=parents[0]||null;

  // === Layout constants ===
  var W=1500, H=900;
  // Focus on the left
  var fcx=350, fcy=H/2;
  var fW=320, fH=130;
  // Children right column
  var childX=950;
  var childW=380;
  var childH=70;
  var rowGap=18;

  // Vertical layout for children — limit visible to keep readable
  var visibleChildren=children.slice(0,12);
  var hiddenCount=children.length-visibleChildren.length;
  var totalH=visibleChildren.length*childH + Math.max(0,visibleChildren.length-1)*rowGap;
  var startY=fcy-totalH/2+childH/2;

  // Build SVG
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.setAttribute('width','100%');svg.setAttribute('height','100%');
  svg.setAttribute('class','mm-svg');
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');

  // Pan/zoom group (everything inside transforms)
  var panG=document.createElementNS('http://www.w3.org/2000/svg','g');
  panG.setAttribute('class','mm-pan-group');
  svg.appendChild(panG);

  // === Parent indicator (top-left, click to walk up) ===
  if(parent){
    var pX=160, pY=80, pW=300, pH=46;
    _mmDrawCurve(panG, pX+pW/2, pY+pH, fcx, fcy-fH/2, tierStrokeColor(parent.type), 0.35, true);
    _mmDrawNode(panG, parent, pX, pY, pW, pH, false, (function(pid){return function(){NS.openMindmapDetail(pid);};})(parent.id));
    var lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',pX+pW/2);lbl.setAttribute('y',pY-10);lbl.setAttribute('text-anchor','middle');
    lbl.setAttribute('fill','var(--mut)');lbl.setAttribute('font-size','10');
    lbl.setAttribute('font-family','Roboto Mono,monospace');lbl.setAttribute('letter-spacing','.5');
    lbl.textContent='▲ PARENT — CLICK TO WALK UP';
    panG.appendChild(lbl);
  }

  // === Curves: focus right-edge → each child left-edge ===
  visibleChildren.forEach(function(child,i){
    var cy=startY+i*(childH+rowGap);
    var x1=fcx+fW/2;
    var y1=fcy + (((i+0.5)/visibleChildren.length)-0.5)*60; // small fan-out vertical offset at source
    var x2=childX;
    var y2=cy;
    _mmDrawCurve(panG, x1, y1, x2, y2, tierStrokeColor(child.type), 0.85, false);
  });

  // === Focus node ===
  _mmDrawNode(panG, focus, fcx-fW/2, fcy-fH/2, fW, fH, true, null);

  // === Child nodes (vertical stack right) ===
  visibleChildren.forEach(function(child,i){
    var cy=startY+i*(childH+rowGap);
    var grandCount=edges.filter(function(e){return e.p===child.id;}).length;
    _mmDrawNode(panG, child, childX, cy-childH/2, childW, childH, false, function(){_mmRefocus(child.id);}, grandCount);
  });

  // === "N more children" indicator ===
  if(hiddenCount>0){
    var more=document.createElementNS('http://www.w3.org/2000/svg','text');
    more.setAttribute('x',childX+childW/2);
    more.setAttribute('y',startY+visibleChildren.length*(childH+rowGap)-rowGap/2+10);
    more.setAttribute('text-anchor','middle');
    more.setAttribute('fill','var(--mut)');
    more.setAttribute('font-size','12');
    more.setAttribute('font-family','Roboto Mono,monospace');
    more.textContent='+ '+hiddenCount+' more — refine with filter or member pivot';
    panG.appendChild(more);
  }

  // Empty state
  if(children.length===0){
    var emp=document.createElementNS('http://www.w3.org/2000/svg','text');
    emp.setAttribute('x',childX+childW/2);emp.setAttribute('y',fcy);
    emp.setAttribute('text-anchor','middle');emp.setAttribute('fill','var(--mut)');
    emp.setAttribute('font-size','14');
    emp.textContent='○ No children — execution chain ends here';
    panG.appendChild(emp);
    var hint=document.createElementNS('http://www.w3.org/2000/svg','text');
    hint.setAttribute('x',childX+childW/2);hint.setAttribute('y',fcy+22);
    hint.setAttribute('text-anchor','middle');hint.setAttribute('fill','var(--mut)');
    hint.setAttribute('font-size','11');hint.setAttribute('font-family','Roboto Mono,monospace');
    hint.textContent=focus.type==='KeyResult'?'Add an Initiative to make this KR executable':'Add a child node to extend the cascade';
    panG.appendChild(hint);
  }

  host.appendChild(svg);
  _MM.svg=svg;
}

function _mmRenderChainSvg(host,nodesMap,edges,focus){
  // Walk up to find the ancestor Company Objective
  var chain=buildAncestorChain(focus.id,edges,nodesMap);
  var rootCO=chain.find(function(n){return n.type==='CompanyObjective';});
  if(!rootCO){
    // Focus IS a CO or above
    if(focus.type==='CompanyObjective')rootCO=focus;
    else rootCO=chain[0];
  }
  // If no CO available, fall back to tree
  if(!rootCO||rootCO.type!=='CompanyObjective'){
    var allCOs=Object.values(nodesMap).filter(function(n){return n.type==='CompanyObjective';});
    if(allCOs.length===0){host.innerHTML='<div style="text-align:center;color:var(--mut);font-size:13px;padding:60px">No Company Objectives in this quarter yet — set one in the OKR Tracker to enable Strategy Chain view.</div>';return;}
    rootCO=allCOs[0];
  }

  // Find Dept Objectives linked to this CO
  var deptObjs=edges.filter(function(e){return e.p===rootCO.id;}).map(function(e){return nodesMap[e.c];}).filter(function(n){return n&&n.type==='DepartmentObjective';});
  // Group remaining KRs under the CO (KRs directly under CO without going through DO)
  var directKRs=edges.filter(function(e){return e.p===rootCO.id;}).map(function(e){return nodesMap[e.c];}).filter(function(n){return n&&n.type==='KeyResult';});

  // For each DO, find owners of KRs/IOs underneath
  function ownersFor(rootId){
    var stack=[rootId],seen={},owners={};
    while(stack.length){
      var id=stack.pop();if(seen[id])continue;seen[id]=1;
      var n=nodesMap[id];
      if(n&&(n.type==='KeyResult'||n.type==='IndividualObjective')){
        var o=n.ownerEmail||n.ownerName||'';
        if(o){
          if(!owners[o])owners[o]={key:o,name:n.ownerName||o,email:n.ownerEmail||null,nodes:[]};
          owners[o].nodes.push(n);
        }
      }
      edges.filter(function(e){return e.p===id;}).forEach(function(e){stack.push(e.c);});
    }
    return Object.values(owners);
  }

  // For each DO, compute its owners
  var deptWithOwners=deptObjs.map(function(d){return {dept:d, owners:ownersFor(d.id)};});

  // Member filter: if active, dim non-matching chains
  var memberKey=_MM.member;
  var memberName=memberKey&&window.USER_REGISTRY&&USER_REGISTRY[memberKey]?USER_REGISTRY[memberKey].name:memberKey;
  function isMatch(o){if(!memberKey)return true;return o.key===memberKey||o.key===memberName||o.name===memberName;}

  // Build a unique-people list for col 3, merging across DOs
  var personMap={};
  deptWithOwners.forEach(function(dw){
    dw.owners.forEach(function(o){
      if(!personMap[o.key])personMap[o.key]={key:o.key,name:o.name,email:o.email,deptIds:{},nodeCount:0};
      personMap[o.key].deptIds[dw.dept.id]=1;
      personMap[o.key].nodeCount+=o.nodes.length;
    });
  });
  var persons=Object.values(personMap);
  if(memberKey){
    var match=persons.filter(isMatch);
    var others=persons.filter(function(o){return !isMatch(o);});
    persons=match.concat(others);  // matching first, then dimmed
  }

  // === Layout ===
  var W=1500, H=900;
  var pad=40;
  var colX={CO:240,DO:760,IND:1260};
  var coBoxW=380,coBoxH=120;
  var doBoxW=360,doBoxH=84;
  var indBoxW=320,indBoxH=64;

  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.setAttribute('width','100%');svg.setAttribute('height','100%');
  svg.setAttribute('class','mm-svg');
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');
  var panG=document.createElementNS('http://www.w3.org/2000/svg','g');
  panG.setAttribute('class','mm-pan-group');
  svg.appendChild(panG);

  // Column headers
  _mmColHeader(panG, colX.CO, 30, 'COMPANY OBJECTIVE','#6c63ff');
  _mmColHeader(panG, colX.DO, 30, 'DEPARTMENT','#09faa3');
  _mmColHeader(panG, colX.IND, 30, 'INDIVIDUAL','#a78bfa');

  // === CO node (single, centered vertically) ===
  var coY=H/2;
  _mmDrawNode(panG, rootCO, colX.CO-coBoxW/2, coY-coBoxH/2, coBoxW, coBoxH, true, null);

  // === DO column ===
  var doStartY, doStep;
  if(deptWithOwners.length===0){
    var emp=document.createElementNS('http://www.w3.org/2000/svg','text');
    emp.setAttribute('x',colX.DO);emp.setAttribute('y',H/2);emp.setAttribute('text-anchor','middle');
    emp.setAttribute('fill','var(--yel)');emp.setAttribute('font-size','13');
    emp.textContent='⚠ No Department Objectives linked to this CO';
    panG.appendChild(emp);
  }
  var doTotal=deptWithOwners.length*doBoxH+(deptWithOwners.length-1)*16;
  doStartY=H/2-doTotal/2+doBoxH/2;
  deptWithOwners.forEach(function(dw,i){
    var dy=doStartY+i*(doBoxH+16);
    // Curve from CO right edge to DO left edge
    _mmDrawCurve(panG, colX.CO+coBoxW/2, coY, colX.DO-doBoxW/2, dy, tierStrokeColor('DepartmentObjective'), 0.75, false);
    _mmDrawNode(panG, dw.dept, colX.DO-doBoxW/2, dy-doBoxH/2, doBoxW, doBoxH, false, (function(d){return function(){NS.openMindmapDetail(d.id);};})(dw.dept), dw.owners.length);
  });

  // === Individual column ===
  if(persons.length===0){
    var empI=document.createElementNS('http://www.w3.org/2000/svg','text');
    empI.setAttribute('x',colX.IND);empI.setAttribute('y',H/2);empI.setAttribute('text-anchor','middle');
    empI.setAttribute('fill','var(--mut)');empI.setAttribute('font-size','13');
    empI.textContent='○ No KR owners under these Department Objectives';
    panG.appendChild(empI);
  }
  var maxVisible=Math.min(persons.length,14);
  var visiblePersons=persons.slice(0,maxVisible);
  var indTotal=visiblePersons.length*indBoxH+(visiblePersons.length-1)*10;
  var indStartY=H/2-indTotal/2+indBoxH/2;
  visiblePersons.forEach(function(p,i){
    var py=indStartY+i*(indBoxH+10);
    var dim=memberKey&&!isMatch(p);
    // Curves: connect to each DO that has this person as an owner
    Object.keys(p.deptIds).forEach(function(doId){
      // Find the y of that DO
      var didx=deptWithOwners.findIndex(function(dw){return dw.dept.id===doId;});
      if(didx<0)return;
      var dy=doStartY+didx*(doBoxH+16);
      _mmDrawCurve(panG, colX.DO+doBoxW/2, dy, colX.IND-indBoxW/2, py, '#a78bfa', dim?0.18:0.7, false);
    });
    _mmDrawPersonNode(panG, p, colX.IND-indBoxW/2, py-indBoxH/2, indBoxW, indBoxH, dim);
  });
  if(persons.length>maxVisible){
    var more=document.createElementNS('http://www.w3.org/2000/svg','text');
    more.setAttribute('x',colX.IND);more.setAttribute('y',indStartY+visiblePersons.length*(indBoxH+10)-10);
    more.setAttribute('text-anchor','middle');more.setAttribute('fill','var(--mut)');
    more.setAttribute('font-size','11');more.setAttribute('font-family','Roboto Mono,monospace');
    more.textContent='+ '+(persons.length-maxVisible)+' more — pivot by Member to focus';
    panG.appendChild(more);
  }

  // CO label below it
  var coLabel=document.createElementNS('http://www.w3.org/2000/svg','text');
  coLabel.setAttribute('x',colX.CO);coLabel.setAttribute('y',coY+coBoxH/2+20);
  coLabel.setAttribute('text-anchor','middle');coLabel.setAttribute('fill','var(--mut)');
  coLabel.setAttribute('font-size','10');coLabel.setAttribute('font-family','Roboto Mono,monospace');
  coLabel.textContent='STRATEGIC ANCHOR';
  panG.appendChild(coLabel);

  // CO siblings hint
  var allCOs=Object.values(nodesMap).filter(function(n){return n.type==='CompanyObjective';});
  if(allCOs.length>1){
    var sibY=H-50;
    var sibLabel=document.createElementNS('http://www.w3.org/2000/svg','text');
    sibLabel.setAttribute('x',colX.CO);sibLabel.setAttribute('y',sibY);sibLabel.setAttribute('text-anchor','middle');
    sibLabel.setAttribute('fill','var(--mut)');sibLabel.setAttribute('font-size','10');sibLabel.setAttribute('font-family','Roboto Mono,monospace');
    sibLabel.textContent='OTHER OBJECTIVES';
    panG.appendChild(sibLabel);
    var sibY2=sibY+20;
    var sibGap=Math.min(40,(W*0.45)/Math.max(1,allCOs.length-1));
    allCOs.filter(function(c){return c.id!==rootCO.id;}).forEach(function(c,i){
      var sx=colX.CO-(allCOs.length-1)*sibGap/2+i*sibGap;
      var dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',sx);dot.setAttribute('cy',sibY2);dot.setAttribute('r',8);
      dot.setAttribute('fill','rgba(108,99,255,.18)');dot.setAttribute('stroke','#6c63ff');dot.setAttribute('stroke-width','1.5');
      dot.setAttribute('class','mm-node-g clickable');dot.style.cursor='pointer';
      dot.addEventListener('click',(function(id){return function(){_mmRefocus(id);};})(c.id));
      var titleEl=document.createElementNS('http://www.w3.org/2000/svg','title');
      titleEl.textContent=c.id+' — '+c.title;dot.appendChild(titleEl);
      panG.appendChild(dot);
    });
  }

  host.appendChild(svg);
  _MM.svg=svg;
}

  bg.setAttribute('x',x-120);bg.setAttribute('y',y-12);bg.setAttribute('width',240);bg.setAttribute('height',26);
  bg.setAttribute('rx',6);bg.setAttribute('fill',color);bg.setAttribute('opacity','0.18');

  t.setAttribute('font-family','Roboto Mono,monospace');t.setAttribute('letter-spacing','1.5');
  t.textContent=label;
  g.appendChild(t);
  host.appendChild(g);
}

function _mmDrawPersonNode(host,p,x,y,w,h,dim){
  var g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','mm-node-g'+(dim?' dim':''));g.style.cursor='pointer';
  if(dim)g.setAttribute('opacity','0.35');
  g.addEventListener('click',function(){
    // Switch to Individual view focused on this person
    if(p.email){setState({viewpoint:'individual',mmMember:p.email});}
    document.getElementById('strat-mm-overlay').classList.remove('open');
    NS.renderStrategy();
  });
  var rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x);rect.setAttribute('y',y);rect.setAttribute('width',w);rect.setAttribute('height',h);
  rect.setAttribute('rx',12);rect.setAttribute('fill','rgba(167,139,250,.16)');
  rect.setAttribute('stroke','#a78bfa');rect.setAttribute('stroke-width','1.8');
  g.appendChild(rect);
  // Avatar
  var av=document.createElementNS('http://www.w3.org/2000/svg','circle');
  av.setAttribute('cx',x+24);av.setAttribute('cy',y+h/2);av.setAttribute('r',16);
  av.setAttribute('fill','#a78bfa');
  g.appendChild(av);
  var initials=(p.name||'?').split(' ').map(function(s){return s[0];}).join('').slice(0,2).toUpperCase();
  var avT=document.createElementNS('http://www.w3.org/2000/svg','text');
  avT.setAttribute('x',x+24);avT.setAttribute('y',y+h/2+4);avT.setAttribute('text-anchor','middle');
  avT.setAttribute('fill','#fff');avT.setAttribute('font-size','11');avT.setAttribute('font-weight','800');
  avT.setAttribute('font-family','Roboto Mono,monospace');
  avT.textContent=initials;
  g.appendChild(avT);
  // Name
  var nm=document.createElementNS('http://www.w3.org/2000/svg','text');
  nm.setAttribute('x',x+48);nm.setAttribute('y',y+h/2-2);
  nm.setAttribute('fill','var(--txt)');nm.setAttribute('font-size','12');nm.setAttribute('font-weight','700');
  nm.textContent=truncate(p.name,26);
  g.appendChild(nm);
  // Subtext
  var sub=document.createElementNS('http://www.w3.org/2000/svg','text');
  sub.setAttribute('x',x+48);sub.setAttribute('y',y+h/2+14);
  sub.setAttribute('fill','var(--mut)');sub.setAttribute('font-size','10');sub.setAttribute('font-family','Roboto Mono,monospace');
  var role=p.email&&window.USER_REGISTRY&&USER_REGISTRY[p.email]?USER_REGISTRY[p.email].role:'';
  sub.textContent=truncate((role||'')+(role?' · ':'')+p.nodeCount+' KR'+(p.nodeCount===1?'':'s'),32);
  g.appendChild(sub);
  // Tooltip
  var tip=document.createElementNS('http://www.w3.org/2000/svg','title');
  tip.textContent=p.name+(role?' · '+role:'')+' · owns '+p.nodeCount+' KR/IO';
  g.appendChild(tip);
  host.appendChild(g);
}

function _mmDrawCurve(host,x1,y1,x2,y2,stroke,opacity,isParentLine){
  // Smooth horizontal S-curve like the reference image
  var dx=x2-x1;
  var c1x=x1+dx*0.55, c1y=y1;
  var c2x=x2-dx*0.55, c2y=y2;
  var path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d','M '+x1+' '+y1+' C '+c1x+' '+c1y+' '+c2x+' '+c2y+' '+x2+' '+y2);
  path.setAttribute('stroke',stroke||'#6c63ff');
  path.setAttribute('stroke-width',isParentLine?2:3);
  path.setAttribute('fill','none');
  path.setAttribute('opacity',opacity!=null?opacity:0.85);
  path.setAttribute('stroke-linecap','round');
  if(isParentLine){path.setAttribute('stroke-dasharray','5 6');}
  host.appendChild(path);
}

function _mmDrawNode(host,node,x,y,w,h,isFocus,onClick,grandCount){
  var g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','mm-node-g'+(isFocus?' focus':'')+(onClick?' clickable':''));
  if(onClick){
    g.style.cursor='pointer';
    g.addEventListener('click',function(e){e.stopPropagation();onClick();});
  }

  // Outer rect
  var rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x);rect.setAttribute('y',y);
  rect.setAttribute('width',w);rect.setAttribute('height',h);
  rect.setAttribute('rx',isFocus?16:12);rect.setAttribute('ry',isFocus?16:12);
  rect.setAttribute('fill',tierBgColor(node.type));
  rect.setAttribute('stroke',tierStrokeColor(node.type));
  rect.setAttribute('stroke-width',isFocus?3:1.8);
  if(isFocus)rect.setAttribute('filter','url(#mm-focus-glow)');
  g.appendChild(rect);

  // === TOP ROW: badge (left) + ID (right) ===
  var topY = y + 18;
  var tier=tierFor(node.type);
  var badge=document.createElementNS('http://www.w3.org/2000/svg','rect');
  badge.setAttribute('x',x+10);badge.setAttribute('y',y+8);
  badge.setAttribute('width',30);badge.setAttribute('height',18);
  badge.setAttribute('rx',4);badge.setAttribute('fill',tierStrokeColor(node.type));
  g.appendChild(badge);
  var tt=document.createElementNS('http://www.w3.org/2000/svg','text');
  tt.setAttribute('x',x+25);tt.setAttribute('y',y+21);tt.setAttribute('text-anchor','middle');
  tt.setAttribute('fill','#fff');tt.setAttribute('font-size','10');tt.setAttribute('font-weight','800');
  tt.setAttribute('font-family','Roboto Mono,monospace');
  tt.textContent=tier;
  g.appendChild(tt);

  var idt=document.createElementNS('http://www.w3.org/2000/svg','text');
  idt.setAttribute('x',x+w-12);idt.setAttribute('y',y+21);idt.setAttribute('text-anchor','end');
  idt.setAttribute('fill','var(--mut)');idt.setAttribute('font-size','10');
  idt.setAttribute('font-family','Roboto Mono,monospace');
  idt.textContent=node.id;
  g.appendChild(idt);

  // === MIDDLE: TITLE (wrapped, full width, BELOW the top row) ===
  var titleFontSize=isFocus?15:12;
  var pxPerChar=titleFontSize*0.55;
  var titleAreaLeft = x + 14;
  var titleAreaRight = x + w - 14;
  var titleAreaW = titleAreaRight - titleAreaLeft;
  var maxChars=Math.max(8,Math.floor(titleAreaW/pxPerChar));
  // Compute owner/progress row presence
  var owner=node.ownerName||node.ownerEmail||'';
  var hasBottom = (node.type!=='Task') && (owner || typeof node.progressPct==='number');
  // Title vertical area: between top row bottom (y+32) and bottom row top
  var topRowBot = y + 32;
  var botRowTop = hasBottom ? (y + h - 22) : (y + h - 8);
  var titleAreaH = botRowTop - topRowBot;
  var maxLines = Math.max(1, Math.floor(titleAreaH/(titleFontSize*1.2)));
  if(isFocus)maxLines = Math.min(maxLines, 4);
  var lines=wrapText(node.title||'(untitled)',maxChars).slice(0,maxLines);
  var totalChars=lines.join(' ').length;
  if(totalChars<(node.title||'').length && lines.length>0){
    lines[lines.length-1]=lines[lines.length-1].replace(/.{0,3}$/,'…');
  }
  var titleH = lines.length * titleFontSize * 1.2;
  var titleStartY = topRowBot + (titleAreaH - titleH)/2 + titleFontSize*0.85;
  lines.forEach(function(line,i){
    var t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',x+w/2);
    t.setAttribute('y',titleStartY+i*titleFontSize*1.2);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('fill','var(--txt)');
    t.setAttribute('font-size',titleFontSize);
    t.setAttribute('font-weight',isFocus?700:600);
    t.textContent=line;
    g.appendChild(t);
  });

  // === BOTTOM ROW: owner (left) + progress (right) ===
  if(hasBottom){
    if(owner){
      var ot=document.createElementNS('http://www.w3.org/2000/svg','text');
      ot.setAttribute('x',x+12);ot.setAttribute('y',y+h-10);
      ot.setAttribute('text-anchor','start');ot.setAttribute('fill','var(--mut)');
      ot.setAttribute('font-size','10');ot.setAttribute('font-family','Roboto Mono,monospace');
      ot.textContent=truncate(owner, Math.max(10, Math.floor((w*0.55)/6.5)));
      g.appendChild(ot);
    }
    if(typeof node.progressPct==='number'){
      var pt=document.createElementNS('http://www.w3.org/2000/svg','text');
      pt.setAttribute('x',x+w-12);pt.setAttribute('y',y+h-10);
      pt.setAttribute('text-anchor','end');pt.setAttribute('fill',tierStrokeColor(node.type));
      pt.setAttribute('font-size','11');pt.setAttribute('font-weight','800');
      pt.setAttribute('font-family','Roboto Mono,monospace');
      pt.textContent=Math.round(node.progressPct)+'%';
      g.appendChild(pt);
    }
  }

  // Grandchild count badge — small floating button on the right edge
  if(grandCount&&grandCount>0&&!isFocus){
    var gcg=document.createElementNS('http://www.w3.org/2000/svg','g');
    var gbCX=x+w-2,gbCY=y-2;  // top-right corner overlap
    var gb=document.createElementNS('http://www.w3.org/2000/svg','circle');
    gb.setAttribute('cx',gbCX);gb.setAttribute('cy',gbCY+16);gb.setAttribute('r',13);
    gb.setAttribute('fill',tierStrokeColor(node.type));gb.setAttribute('opacity','.95');
    gb.setAttribute('stroke','var(--surf)');gb.setAttribute('stroke-width','2');
    gcg.appendChild(gb);
    var gt=document.createElementNS('http://www.w3.org/2000/svg','text');

function buildAncestorChain(nodeId,edges,nodesMap){
  var chain=[],cur=nodeId,seen={},safety=12;
  while(cur&&!seen[cur]&&safety-->0){
    seen[cur]=1;
    var n=nodesMap[cur];if(!n)break;
    chain.unshift(n);
    var p=edges.filter(function(e){return e.c===cur;}).map(function(e){return e.p;})[0];
    cur=p;
  }
  return chain;
}

function hasDescendantOwnedBy(rootId,mName,memberId,edges,nodesMap){
  var stack=[rootId],seen={},safety=300;
  while(stack.length&&safety-->0){
    var id=stack.pop();if(seen[id])continue;seen[id]=1;
    var n=nodesMap[id];if(n){var o=n.ownerName||n.ownerEmail||'';if(o===mName||o===memberId)return true;}
    edges.filter(function(e){return e.p===id;}).forEach(function(e){stack.push(e.c);});
  }
  return false;
}
function wrapText(text,maxChars){
  if(maxChars<=0)maxChars=1;
  var words=String(text||'').split(/\s+/),lines=[],cur='';
  words.forEach(function(w){
    if((cur+' '+w).trim().length<=maxChars){cur=(cur+' '+w).trim();}
    else{if(cur)lines.push(cur);cur=w;}
  });
  if(cur)lines.push(cur);
  return lines.length?lines:[''];
}

// ── Health computation ─────────────────────────────────────────────────
function tmHealth(t){
  if(t.status==='Done')return 'done';
  if(t.status==='Blocked')return 'blocked';
  if(!t.due)return 'ok';
  var today=new Date();today.setHours(0,0,0,0);
  var due=new Date(t.due);due.setHours(0,0,0,0);
  var days=Math.round((due-today)/86400000);
  if(days<0)return 'overdue';
  if(days<=2)return 'soon';
  return 'ok';
}
function tmHealthLabel(h){return {ok:'On Track',soon:'Due Soon',overdue:'Overdue',blocked:'Blocked',done:'Done'}[h]||h;}
function tmHealthDot(h){return '<span class="tm-dot dot-'+h+'"></span>';}

// ── Focus algorithm ────────────────────────────────────────────────────
function tmFocusScore(t){
  var score=0;
  if(t.status==='Blocked')score+=100;
  var h=tmHealth(t);
  if(h==='overdue')score+=60;
  else if(h==='soon'){
    var today=new Date();today.setHours(0,0,0,0);
    var due=new Date(t.due);due.setHours(0,0,0,0);
    var days=Math.round((due-today)/86400000);
    if(days===0)score+=40;
    else if(days===1)score+=20;
  }
  if(t.priority==='Urgent')score+=30;
  else if(t.priority==='This Week')score+=15;
  if(t.due){
    var today2=new Date();today2.setHours(0,0,0,0);
    var due2=new Date(t.due);due2.setHours(0,0,0,0);
    var days2=Math.round((due2-today2)/86400000);
    if(days2>0)score-=Math.min(days2,30)*0.2;
  }
  return score;
}

// ── Counts for status strip ────────────────────────────────────────────
function tmCounts(st, scope){
  var src=scope==='mine'?tmGetMyTasks(st):tmGetTasks(st);
  var open=src.filter(function(t){return t.status!=='Done';});
  var today=open.filter(function(t){return tmHealth(t)==='soon' && t.due && (new Date(t.due).toDateString()===new Date().toDateString());});
  var overdue=open.filter(function(t){return tmHealth(t)==='overdue';});
  var blocked=open.filter(function(t){return tmHealth(t)==='blocked';});
  return {open:open.length, today:today.length, overdue:overdue.length, blocked:blocked.length};
}

function tmRenderMyWork(host, st){

  var ranked=tasks.map(function(t){return {t:t, score:tmFocusScore(t)};}).sort(function(a,b){return b.score-a.score;});

  }else{
    var f=ranked[0].t;
    var fh=tmHealth(f);
    focusCard.innerHTML=
      '<div class="tm-section-label">FOCUS</div>'+
      '<div class="tm-focus-body">'+
        '<div class="tm-focus-title">'+tmHealthDot(fh)+esc(f.name)+'</div>'+
        '<div class="tm-focus-meta">'+
          '<span class="tm-pri pri-'+esc(f.priority||'').toLowerCase().replace(/ /g,'-')+'">'+esc(f.priority||'')+'</span>'+
          '<span>'+tmDueLabel(f)+'</span>'+
          '<span>'+(f.progress||0)+'% complete</span>'+
        '</div>'+
        '<div class="tm-focus-acts">'+
          '<button class="tm-btn tm-btn-primary" data-act="open" data-id="'+esc(f.id)+'" data-dept="'+esc(f.dept)+'">Open</button>'+
          '<button class="tm-btn" data-act="block" data-id="'+esc(f.id)+'" data-dept="'+esc(f.dept)+'">Mark blocked</button>'+
          '<button class="tm-btn" data-act="snooze" data-id="'+esc(f.id)+'" data-dept="'+esc(f.dept)+'">Snooze 1 day</button>'+
        '</div>'+
      '</div>';
  }
  focusCard.addEventListener('click', function(e){
    var btn=e.target.closest('button[data-act]');if(!btn)return;
    var id=btn.getAttribute('data-id'), dept=btn.getAttribute('data-dept'), act=btn.getAttribute('data-act');
    var t=(data[dept]||[]).find(function(x){return x.id===id;});if(!t)return;
    if(act==='open'){tmOpenDrawer(t, dept);}
    else if(act==='block'){t.status='Blocked';t.lastUpdated=new Date().toISOString();autoSave();logEntry(id+' marked blocked','edit');renderTasksV2();}
    else if(act==='snooze'){
      var due=t.due?new Date(t.due):new Date();due.setDate(due.getDate()+1);
      t.due=due.toISOString().split('T')[0];t.lastUpdated=new Date().toISOString();autoSave();
      logEntry(id+' snoozed to '+t.due,'edit');renderTasksV2();
    }
  });
  host.appendChild(focusCard);

  // QUICK ADD
  var qa=document.createElement('div');qa.className='tm-quick';
  var inp=document.createElement('input');inp.className='tm-quick-input';inp.placeholder='+ Add a task...';
  qa.appendChild(inp);
  inp.addEventListener('keydown', function(e){
    if(e.key==='Enter' && inp.value.trim()){
      var name=inp.value.trim();
      var dept=currentUser&&currentUser.dept?currentUser.dept:'Management';
      if(!data[dept])data[dept]=[];
      var today=new Date(),wk=new Date(today.getTime()+7*86400000);
      var t={id:nextId(dept), name:name, assignee:currentUser?currentUser.name:'',
        priority:'Planned', status:'Not Started',
        createdAt:new Date().toISOString(),
        due:wk.toISOString().split('T')[0],
        startDate:today.toISOString().split('T')[0],
        progress:0, notes:'', lastUpdated:new Date().toISOString()};
      data[dept].push(t);
      autoSave();logEntry(t.id+' created via Quick Add','add');
      inp.value='';
      toast(t.id+' added','ok');
      renderTasksV2();
    }
  });
  host.appendChild(qa);

  // GROUPED LISTS
  var openTasks=tasks.filter(function(t){return t.status!=='Done';});
  var today=openTasks.filter(function(t){return tmHealth(t)==='soon' && t.due && (new Date(t.due).toDateString()===new Date().toDateString());});
  var tomorrow=openTasks.filter(function(t){return tmHealth(t)==='soon' && t.due && (new Date(t.due).toDateString()===new Date(Date.now()+86400000).toDateString());});
  var overdue=openTasks.filter(function(t){return tmHealth(t)==='overdue';});
  var thisWeek=openTasks.filter(function(t){
    if(tmHealth(t)==='overdue'||!t.due)return false;
    if(today.indexOf(t)>=0||tomorrow.indexOf(t)>=0)return false;
    var d=new Date(t.due),wk=new Date(Date.now()+7*86400000);
    return d<=wk;
  });
  var later=openTasks.filter(function(t){
    if(today.indexOf(t)>=0||tomorrow.indexOf(t)>=0||overdue.indexOf(t)>=0||thisWeek.indexOf(t)>=0)return false;
    return true;
  });

  if(overdue.length)tmRenderGroup(host, 'OVERDUE', overdue, 'overdue', false);
  if(today.length)tmRenderGroup(host, 'TODAY', today, 'today', false);
  if(tomorrow.length)tmRenderGroup(host, 'TOMORROW', tomorrow, 'tomorrow', false);
  if(thisWeek.length)tmRenderGroup(host, 'THIS WEEK', thisWeek, 'week', false);
  if(later.length)tmRenderGroup(host, 'LATER', later, 'later', true);

  if(openTasks.length===0){
    var empty=document.createElement('div');empty.className='tm-empty';
    empty.innerHTML='<div class="tm-empty-ic">◯</div>No open tasks. Use Quick Add above or check <strong>Team</strong>.';
    host.appendChild(empty);
  }
}

function tmDueLabel(t){
  if(!t.due)return 'no due date';
  var today=new Date();today.setHours(0,0,0,0);
  var due=new Date(t.due);due.setHours(0,0,0,0);
  var days=Math.round((due-today)/86400000);
  if(days<0)return Math.abs(days)+'d overdue';
  if(days===0)return 'due today';
  if(days===1)return 'due tomorrow';
  if(days<=7)return 'due in '+days+'d';
  var opts={month:'short',day:'numeric'};
  return 'due '+due.toLocaleDateString('en-US',opts);
}

// ── TEAM TAB ───────────────────────────────────────────────────────────
function tmRenderTeam(host, st){
  var tasks=tmGetTasks(st).filter(function(t){return t.status!=='Done';});
  // Grouping picker
  var picker=document.createElement('div');picker.className='tm-grouping';
  picker.innerHTML='<span class="tm-grouping-label">Group by</span>';
  ['owner','status','priority','due'].forEach(function(g){
    var b=document.createElement('button');b.className='tm-group-pick'+(st.grouping===g?' active':'');
    b.textContent=g.charAt(0).toUpperCase()+g.slice(1);
    b.onclick=function(){tmSetState({grouping:g});renderTasksV2();};
    picker.appendChild(b);
  });
  host.appendChild(picker);

  // Group tasks
  var groups={};
  tasks.forEach(function(t){
    var key='';
    if(st.grouping==='owner')key=t.assignee||'unassigned';
    else if(st.grouping==='status')key=t.status||'Not Started';
    else if(st.grouping==='priority')key=t.priority||'Planned';
    else if(st.grouping==='due'){
      var h=tmHealth(t);
      key=h==='overdue'?'Overdue':h==='soon'?'Due soon':'Later';
    }
    if(!groups[key])groups[key]=[];
    groups[key].push(t);
  });
  Object.keys(groups).sort().forEach(function(g){
    var key='team::'+g;
    var open=st.expanded[key];if(open===undefined)open=true;
    var sec=document.createElement('div');sec.className='tm-group';
    var hdr=document.createElement('div');hdr.className='tm-group-h';
    hdr.innerHTML='<button class="tm-caret">'+(open?'▾':'▸')+'</button>'+
      '<span class="tm-group-label">'+esc(g.toUpperCase())+'</span>'+
      '<span class="tm-group-count">'+groups[g].length+'</span>';
    hdr.onclick=function(){var e=tmState().expanded;e[key]=!open;tmSetState({expanded:e});renderTasksV2();};
    sec.appendChild(hdr);
    if(open)groups[g].forEach(function(t){sec.appendChild(tmRenderCard(t));});
    host.appendChild(sec);
  });
  if(tasks.length===0){
    var empty=document.createElement('div');empty.className='tm-empty';
    empty.innerHTML='<div class="tm-empty-ic">◯</div>No open tasks in this scope.';
    host.appendChild(empty);
  }
}

function tmOpenNewTaskModal(){
  var ov=document.getElementById('tm-new-ov');
  if(!ov){ov=document.createElement('div');ov.id='tm-new-ov';ov.className='tm-new-ov';document.body.appendChild(ov);}
  ov.innerHTML='';
  var box=document.createElement('div');box.className='tm-new-box';
  var st=tmState();
  var defaultDept=st.dept!=='All'?st.dept:(currentUser&&currentUser.dept?currentUser.dept:DEPTS[0]);
  var weekLater=new Date(Date.now()+7*86400000).toISOString().split('T')[0];

  box.innerHTML=
    '<button class="tm-new-close" id="tm-new-close">×</button>'+
    '<div class="tm-new-h">Create a new task</div>'+
    '<div class="tm-new-sub">Press Enter to create with sensible defaults, or expand details below.</div>'+
    '<input class="tm-new-name" id="tm-new-name" placeholder="Describe the task..." />'+
    '<button class="tm-new-toggle" id="tm-new-toggle">+ More details</button>'+
    '<div class="tm-new-details" id="tm-new-details" style="display:none">'+
      '<div class="tm-new-row"><label>OWNER</label><select id="tm-new-owner">'+tmAssigneeOptions(currentUser?currentUser.name:'')+'</select></div>'+
      '<div class="tm-new-row"><label>DEPARTMENT</label><select id="tm-new-dept">'+DEPTS.map(function(d){return '<option'+(d===defaultDept?' selected':'')+'>'+d+'</option>';}).join('')+'</select></div>'+
      '<div class="tm-new-row"><label>PRIORITY</label><select id="tm-new-priority">'+TM_PRIORITIES.map(function(p){return '<option'+(p==='Planned'?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div>'+
      '<div class="tm-new-row"><label>DUE DATE</label><input type="date" id="tm-new-due" value="'+weekLater+'" /></div>'+
      '<div class="tm-new-row"><label>LINK TO OKR</label><div id="tm-new-kr-cell"></div></div>'+
    '</div>'+
    '<div class="tm-new-foot">'+
      '<button class="tm-btn" id="tm-new-cancel">Cancel</button>'+
      '<button class="tm-btn tm-btn-primary" id="tm-new-create">Create task</button>'+
    '</div>';
  ov.appendChild(box);

  function close(){ov.remove();document.removeEventListener('keydown',onEsc);}
  function onEsc(e){if(e.key==='Escape')close();}
  document.addEventListener('keydown',onEsc);
  ov.onclick=function(e){if(e.target===ov)close();};

  function create(){
    var name=(document.getElementById('tm-new-name').value||'').trim();
    if(!name){toast('Task description required','err');return;}
    var detailsOpen=document.getElementById('tm-new-details').style.display!=='none';
    var dept=detailsOpen?document.getElementById('tm-new-dept').value:defaultDept;
    var owner=detailsOpen?document.getElementById('tm-new-owner').value:(currentUser?currentUser.name:'');
    var priority=detailsOpen?document.getElementById('tm-new-priority').value:'Planned';
    var due=detailsOpen?document.getElementById('tm-new-due').value:weekLater;
    var linkedKRId=detailsOpen?(window._tmPendingKR||''):'';
    if(!data[dept])data[dept]=[];
    var t={id:nextId(dept), name:name, assignee:owner,
      priority:priority, status:'Not Started',
      createdAt:new Date().toISOString(),
      due:due, startDate:new Date().toISOString().split('T')[0],
      progress:0, notes:'', lastUpdated:new Date().toISOString(),
      linkedKRId:linkedKRId||''};
    data[dept].push(t);
    if(linkedKRId)tmSyncKRLink(t.id, null, linkedKRId);
    autoSave();logEntry(t.id+' created via + New task'+(linkedKRId?(' (linked to '+linkedKRId+')'):''),'add');
    toast(t.id+' added','ok');
    close();
    renderTasksV2();
  }

  document.getElementById('tm-new-close').onclick=close;
  document.getElementById('tm-new-cancel').onclick=close;
  document.getElementById('tm-new-create').onclick=create;
  document.getElementById('tm-new-toggle').onclick=function(){
    var d=document.getElementById('tm-new-details');
    var open=d.style.display!=='none';
    d.style.display=open?'none':'block';
    this.textContent=open?'+ More details':'− Hide details';
  };
  // Mount the OKR picker button into its cell
  window._tmPendingKR='';
  var krCell=document.getElementById('tm-new-kr-cell');
  if(krCell){var pBtn=tmRenderKRPickerButton('', function(id){window._tmPendingKR=id;});krCell.appendChild(pBtn);}
  var nameInp=document.getElementById('tm-new-name');
  nameInp.focus();
  nameInp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();create();}});
}

  ov.innerHTML='';
  var box=document.createElement('div');box.className='tm-drawer';
  var h=tmHealth(t);
  var pri=(t.priority||'Planned').toLowerCase().replace(/ /g,'-');
  box.innerHTML=

    '</div>'+

      '<div class="tm-section-label">NOTES</div>'+
      '<textarea class="tm-notes-area" data-f="notes" placeholder="Add notes, context, blockers...">'+esc(t.notes||'')+'</textarea>'+
    '</div>'+
    '<div class="tm-drawer-foot">'+
      '<button class="tm-btn tm-btn-danger" id="tm-drawer-del">Delete</button>'+
      '<button class="tm-btn tm-btn-primary" id="tm-drawer-save">Save</button>'+
    '</div>';
  ov.appendChild(box);

  // Mount KR picker into its cell
  var pickerCell=box.querySelector('#tm-kr-cell');
  var pendingKR=t.linkedKRId||'';
  var pickerBtn=tmRenderKRPickerButton(pendingKR, function(newId){pendingKR=newId;});
  pickerCell.appendChild(pickerBtn);

  ov.querySelector('#tm-drawer-save').onclick=function(){
    var oldKR=t.linkedKRId||'';
    box.querySelectorAll('[data-f]').forEach(function(el){
      var f=el.getAttribute('data-f');
      var v=el.value;
      if(f==='progress')v=Math.min(100,Math.max(0,parseInt(v)||0));
      t[f]=v;
    });
    // KR comes from the picker, not a form field
    t.linkedKRId=pendingKR;
    if((t.linkedKRId||'')!==oldKR)tmSyncKRLink(t.id, oldKR, t.linkedKRId||'');
    t.lastUpdated=new Date().toISOString();
    autoSave();
    logEntry('Updated '+t.id+' via drawer','edit');
    toast('Saved','ok');
    ov.remove();
    renderTasksV2();
  };
  ov.querySelector('#tm-drawer-del').onclick=function(){
    if(!confirm('Delete this task?'))return;
    data[dept]=(data[dept]||[]).filter(function(x){return x.id!==t.id;});
    autoSave();logEntry('Deleted '+t.id,'del');toast('Deleted','ok');
    ov.remove();renderTasksV2();
  };
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  function onEsc(e){if(e.key==='Escape'){ov.remove();document.removeEventListener('keydown',onEsc);}}
  document.addEventListener('keydown',onEsc);
}


// Global N shortcut for new task — only when not typing in inputs
(function(){
  document.addEventListener('keydown', function(e){
    if((e.key==='n'||e.key==='N') && !e.ctrlKey && !e.metaKey && !e.altKey){
      var t=e.target;
      var tag=(t&&t.tagName||'').toLowerCase();
      if(tag==='input'||tag==='textarea'||tag==='select'||(t&&t.isContentEditable))return;
      if(typeof view!=='undefined' && view==='tasks'){
        e.preventDefault();
        if(typeof tmOpenNewTaskModal==='function')tmOpenNewTaskModal();
      }
    }
  });
})();

// ── Get initiatives from existing strategy data ─────────────────────────
function rmGetAllInitiatives(){
  try{
    var nodes=JSON.parse(localStorage.getItem('rl_strat_nodes_v1')||'{}');
    var quarters=Object.keys(nodes);
    var out=[];
    quarters.forEach(function(q){
      Object.values(nodes[q]||{}).forEach(function(n){
        if(n.type==='Initiative')out.push({id:n.id,title:n.title,quarter:q,progress:n.progressPct||0,dept:n.dept||''});
      });
    });
    return out;
  }catch(e){return [];}
}
function rmGetInitiative(id){return rmGetAllInitiatives().find(function(i){return i.id===id;});}

// ── Health computation ─────────────────────────────────────────────────
function rmHealthBand(f){
  if(f.status==='Released')return 'ok';
  if(f.risks && f.risks.length>0)return f.confidence==='Low'?'risk':'warn';
  if(f.confidence==='Low' && f.status!=='Discovery')return 'risk';
  // Velocity-based forecast on progress vs quarter elapsed
  var q=f.targetQuarter; if(!q)return 'warn';
  var match=q.match(/Q(\d) (\d{4})/);
  if(!match)return 'warn';
  var qn=parseInt(match[1]),yy=parseInt(match[2]);
  var monthEnd=qn*3-1; // 0-indexed end month
  var endDate=new Date(yy,monthEnd+1,0).getTime();
  var now=Date.now();
  if(now>endDate && f.status!=='Released')return 'risk';
  var qStartMonth=(qn-1)*3;
  var startDate=new Date(yy,qStartMonth,1).getTime();
  var elapsed=Math.max(0,Math.min(1,(now-startDate)/(endDate-startDate)));
  var expected=elapsed*100;
  var current=f.progressPct||0;
  if(current>=expected-5)return 'ok';
  if(current>=expected-25)return 'warn';
  return 'risk';
}

// ── Aggregate progress from linked initiatives (if any) ────────────────
function rmComputeProgress(f){
  if(!f.linkedInitiativeIds || f.linkedInitiativeIds.length===0)return f.progressPct||0;
  var initiatives=f.linkedInitiativeIds.map(rmGetInitiative).filter(Boolean);
  if(initiatives.length===0)return f.progressPct||0;
  return Math.round(initiatives.reduce(function(s,i){return s+(i.progress||0);},0)/initiatives.length);
}

// ── Counts for status strip ────────────────────────────────────────────
function rmCounts(){
  var features=Object.values(rmLoadFeatures());
  var atRisk=features.filter(function(f){return rmHealthBand(f)==='risk' && f.status!=='Released';}).length;
  var shipped=features.filter(function(f){return f.status==='Released';}).length;
  // Forecast: on-track or released features targeted to current/next quarter / total
  var now=new Date(),y=now.getFullYear(),m=now.getMonth(),q='Q'+(Math.floor(m/3)+1)+' '+y;
  var current=features.filter(function(f){return f.targetQuarter===q;});
  var ok=current.filter(function(f){return f.status==='Released' || rmHealthBand(f)==='ok';}).length;
  var forecast=current.length?Math.round((ok/current.length)*100):0;
  return {total:features.length, atRisk:atRisk, forecast:forecast, currentQuarter:q, shipped:shipped};
}

    '<span class="rm-strip-sep">·</span>'+
    '<span class="rm-strip-item"><strong>'+counts.forecast+'%</strong> '+counts.currentQuarter+' on-track</span>'+
    '<span class="rm-strip-sep">·</span>'+
    '<span class="rm-strip-item rm-strip-ok"><strong>'+counts.shipped+'</strong> shipped</span>';
  wrap.appendChild(strip);

  // === Tabs ===
  var tabs=[{id:'nnl',label:'Now / Next / Later'},{id:'timeline',label:'Timeline'},{id:'releases',label:'Releases'}];
  var tabBar=document.createElement('div');tabBar.className='rm-tabs';

// ── NOW / NEXT / LATER ─────────────────────────────────────────────────
function rmRenderNNL(host){
  var themes=rmLoadThemes();
  var features=Object.values(rmLoadFeatures());
  if(features.length===0){
    var empty=document.createElement('div');empty.className='rm-empty';
    empty.innerHTML='<div class="rm-empty-ic">🎯</div><strong>No roadmap features yet.</strong><br>Start with a <strong>Theme</strong> (a strategic grouping) and add Features underneath.';
    host.appendChild(empty);return;
  }
  // Group by theme then horizon
  var themeIds=Object.keys(themes).sort(function(a,b){return (themes[a].order||0)-(themes[b].order||0);});
  themeIds.forEach(function(tid){
    var theme=themes[tid];
    var tf=features.filter(function(f){return f.themeId===tid;});
    if(tf.length===0)return;
    var sec=document.createElement('div');sec.className='rm-theme';
    var th=document.createElement('div');th.className='rm-theme-h';
    var st=rmState();var open=st.expandedThemes[tid]!==false;
    th.innerHTML='<button class="rm-caret">'+(open?'▾':'▸')+'</button>'+
      '<span class="rm-theme-dot" style="background:'+esc(theme.color||'#6c63ff')+'"></span>'+
      '<span class="rm-theme-label">'+esc(theme.title).toUpperCase()+'</span>'+
      '<span class="rm-theme-count">'+tf.length+' feature'+(tf.length===1?'':'s')+'</span>'+
      '<button class="rm-theme-edit" data-tid="'+esc(tid)+'">✎</button>';
    th.onclick=function(e){
      if(e.target.classList.contains('rm-theme-edit')){e.stopPropagation();rmOpenThemeEdit(tid);return;}
      var s=rmState();s.expandedThemes[tid]=!open;rmSetState({expandedThemes:s.expandedThemes});renderRoadmaps();
    };
    sec.appendChild(th);
    if(open){
      ['Now','Next','Later','Idea'].forEach(function(h){
        var hf=tf.filter(function(f){return f.horizon===h;});
        if(hf.length===0)return;
        var hsec=document.createElement('div');hsec.className='rm-horizon';
        hsec.innerHTML='<div class="rm-horizon-label">'+h.toUpperCase()+' <span class="rm-horizon-count">'+hf.length+'</span></div>';
        var list=document.createElement('div');list.className='rm-feature-list';
        hf.sort(function(a,b){return (b.impact/Math.max(1,b.effort))-(a.impact/Math.max(1,a.effort));}).forEach(function(f){
          list.appendChild(rmRenderFeatureCard(f));
        });
        hsec.appendChild(list);
        sec.appendChild(hsec);
      });
    }
    host.appendChild(sec);
  });
  // Unassigned features (no theme)
  var orphan=features.filter(function(f){return !f.themeId || !themes[f.themeId];});
  if(orphan.length){
    var sec=document.createElement('div');sec.className='rm-theme';
    sec.innerHTML='<div class="rm-theme-h"><span class="rm-theme-label" style="color:var(--yel)">UNASSIGNED ('+orphan.length+')</span></div>';
    var list=document.createElement('div');list.className='rm-feature-list';
    orphan.forEach(function(f){list.appendChild(rmRenderFeatureCard(f));});
    sec.appendChild(list);
    host.appendChild(sec);
  }
}

function rmRenderFeatureCard(f){
  var health=rmHealthBand(f);
  var prog=rmComputeProgress(f);
  var card=document.createElement('div');card.className='rm-feature-card health-'+health;
  var html=
    '<div class="rm-feat-top">'+
      '<span class="rm-dot dot-'+health+'"></span>'+
      '<div class="rm-feat-title">'+esc(f.title)+'</div>'+
      '<span class="rm-feat-id">'+f.id+'</span>'+
    '</div>'+
    '<div class="rm-feat-meta">'+
      '<span><strong>'+prog+'%</strong></span>'+
      '<span class="rm-feat-status">'+esc(f.status)+'</span>'+
      '<span>'+esc(f.confidence||'')+' conf</span>'+
      '<span>'+esc(f.targetQuarter||'unscheduled')+'</span>'+
      (f.ownerName||f.ownerEmail?'<span>'+esc(f.ownerName||f.ownerEmail)+'</span>':'')+
    '</div>';
  if(f.linkedKRId){
    var kr=tmGetKR(f.linkedKRId);
    if(kr)html+='<div class="rm-feat-kr">🎯 '+esc(kr.id)+' '+esc(kr.title.slice(0,52))+(kr.title.length>52?'…':'')+'</div>';
    else html+='<div class="rm-feat-kr">🎯 '+esc(f.linkedKRId)+'</div>';
  }
  if(f.risks && f.risks.length){
    html+='<div class="rm-feat-risk">⚠ '+esc(f.risks[0])+'</div>';
  }
  card.innerHTML=html;
  card.onclick=function(){rmOpenFeatureDrawer(f.id);};
  return card;
}

// ── TIMELINE ────────────────────────────────────────────────────────────
function rmRenderTimeline(host){
  var themes=rmLoadThemes();
  var features=Object.values(rmLoadFeatures());
  if(features.length===0){
    host.appendChild((function(){var e=document.createElement('div');e.className='rm-empty';e.innerHTML='<div class="rm-empty-ic">📅</div>Add features to see them on the timeline.';return e;})());
    return;
  }
  var tl=document.createElement('div');tl.className='rm-timeline';
  // Header row: quarters
  var hr=document.createElement('div');hr.className='rm-tl-row rm-tl-head';
  hr.appendChild((function(){var c=document.createElement('div');c.className='rm-tl-name';c.textContent='THEME';return c;})());
  RM_QUARTERS.forEach(function(q){var c=document.createElement('div');c.className='rm-tl-q';c.textContent=q;hr.appendChild(c);});
  tl.appendChild(hr);

  Object.keys(themes).sort(function(a,b){return (themes[a].order||0)-(themes[b].order||0);}).forEach(function(tid){
    var theme=themes[tid];
    var tf=features.filter(function(f){return f.themeId===tid;});
    if(tf.length===0)return;
    // Theme row label
    var trow=document.createElement('div');trow.className='rm-tl-row rm-tl-theme';
    trow.innerHTML='<div class="rm-tl-name"><span class="rm-theme-dot" style="background:'+esc(theme.color)+'"></span>'+esc(theme.title)+'</div>';
    RM_QUARTERS.forEach(function(){trow.appendChild((function(){var c=document.createElement('div');c.className='rm-tl-cell';return c;})());});
    tl.appendChild(trow);
    // Each feature as a row
    tf.forEach(function(f){
      var row=document.createElement('div');row.className='rm-tl-row';
      row.innerHTML='<div class="rm-tl-name rm-tl-feat-name">'+esc(f.title)+'</div>';
      RM_QUARTERS.forEach(function(q){
        var c=document.createElement('div');c.className='rm-tl-cell';
        if(f.targetQuarter===q){
          var band=rmHealthBand(f);
          var bar=document.createElement('div');bar.className='rm-tl-bar band-'+band;
          bar.innerHTML='<span class="rm-tl-bar-title">'+esc(f.title.slice(0,28))+(f.title.length>28?'…':'')+'</span>'+
            '<span class="rm-tl-bar-pct">'+rmComputeProgress(f)+'%</span>';
          bar.onclick=function(){rmOpenFeatureDrawer(f.id);};
          c.appendChild(bar);
        }
        row.appendChild(c);
      });
      tl.appendChild(row);
    });
  });
  host.appendChild(tl);
}
