/* ── Strategic Execution Architecture ───────────────────────────────── */
.strat-wrap{padding:24px;max-width:1700px;margin:0 auto}
.strat-hdr{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.strat-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.strat-sub{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;margin-bottom:18px}
.strat-fbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px 12px}
.strat-fbar select,.strat-fbar input{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:6px;padding:6px 10px;font-size:11px;font-family:inherit}

.strat-fbar .fl{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace}
.strat-layout{display:grid;grid-template-columns:1fr 360px;gap:18px}

.strat-tree{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:18px;min-height:600px}
.strat-side{display:flex;flex-direction:column;gap:14px}
.strat-card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:16px}
.strat-card-h{font-size:10px;font-weight:800;color:var(--mut);font-family:Roboto Mono,monospace;margin-bottom:10px;letter-spacing:1px}
.strat-stat{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.strat-stat-c{background:var(--surf2);border-radius:8px;padding:10px;text-align:center}
.strat-stat-v{font-size:22px;font-weight:800;line-height:1}

.strat-node{border:1px solid var(--brd);border-radius:10px;background:var(--surf2);margin-bottom:10px;transition:border-color .12s, transform .12s}

.strat-tier.L2{background:rgba(9,250,163,.18);color:var(--grn)}
.strat-tier.L3{background:rgba(251,191,36,.18);color:var(--yel)}
.strat-tier.L4{background:rgba(139,92,246,.2);color:#a78bfa}
.strat-tier.L5{background:rgba(255,107,107,.18);color:var(--red)}
.strat-tier.L6{background:rgba(39,120,196,.22);color:#5aa3e0}
.strat-tier.L7{background:rgba(150,150,160,.18);color:var(--mut)}
.strat-name{flex:1;font-size:13px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.strat-name.L5{font-size:12px;font-weight:500}
.strat-name.L6{font-size:11px;font-weight:500;color:var(--mut)}
.strat-name.L7{font-size:11px;font-weight:400;color:var(--mut)}

.strat-children{padding:0 14px 8px 28px;border-left:2px solid var(--brd);margin-left:18px}
.strat-scores{display:flex;gap:5px;flex-shrink:0}
.strat-score{font-size:9px;font-family:Roboto Mono,monospace;padding:2px 7px;border-radius:5px;cursor:default;font-weight:700;letter-spacing:.3px;border:1px solid transparent}
.strat-score.s-ok{background:rgba(9,250,163,.16);color:var(--grn);border-color:rgba(9,250,163,.3)}
.strat-score.s-warn{background:rgba(251,191,36,.16);color:var(--yel);border-color:rgba(251,191,36,.3)}
.strat-score.s-bad{background:rgba(255,107,107,.18);color:var(--red);border-color:rgba(255,107,107,.32)}
.strat-prog{height:4px;background:var(--surf);border-radius:2px;overflow:hidden;width:60px;flex-shrink:0}
.strat-prog-bar{height:100%;background:var(--acc);transition:width .25s}
.strat-caret{font-size:11px;color:var(--mut);width:12px;flex-shrink:0;transition:transform .12s;font-family:monospace}
.strat-caret.open{transform:rotate(90deg)}
.strat-empty{padding:40px 20px;text-align:center;color:var(--mut);font-size:12px}
.strat-empty-icon{font-size:28px;margin-bottom:10px}
.strat-insight{padding:10px;background:var(--surf2);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--acc);font-size:11px}
.strat-insight.sev-high{border-left-color:var(--red)}
.strat-insight.sev-med{border-left-color:var(--yel)}
.strat-insight.sev-low{border-left-color:var(--acc)}
.strat-insight-t{font-weight:700;font-size:10px;margin-bottom:4px;font-family:Roboto Mono,monospace;letter-spacing:.5px}
.strat-insight-b{font-size:11px;color:var(--txt);line-height:1.4}
.strat-insight-id{font-size:9px;color:var(--mut);font-family:Roboto Mono,monospace;margin-top:4px}
.strat-detail{position:fixed;top:0;right:0;width:480px;max-width:95vw;height:100vh;background:var(--surf);border-left:1px solid var(--brd);box-shadow:-8px 0 32px rgba(0,0,0,.45);z-index:9800;overflow-y:auto;padding:24px;display:none}
.strat-detail.open{display:block}
.strat-detail-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer}
.strat-detail-close:hover{color:var(--txt)}
.strat-detail h3{font-size:18px;font-weight:800;margin:0 0 8px 0;letter-spacing:-.3px;padding-right:32px}
.strat-detail-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.strat-detail-sect{margin-top:18px}
.strat-detail-sect h4{font-size:10px;font-weight:800;color:var(--mut);font-family:Roboto Mono,monospace;margin:0 0 8px 0;letter-spacing:1px}
.strat-link{font-size:11px;padding:6px 8px;background:var(--surf2);border-radius:6px;margin-bottom:4px;cursor:pointer;display:flex;align-items:center;gap:8px}
.strat-link:hover{background:var(--bg)}
.strat-link-empty{font-size:11px;color:var(--mut);font-style:italic}
.strat-score-explain{font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;line-height:1.5;background:var(--surf2);border-radius:6px;padding:8px;margin-top:4px}
.strat-banner{background:linear-gradient(90deg,rgba(108,99,255,.12),rgba(9,250,163,.08));border:1px solid rgba(108,99,255,.3);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--txt);display:flex;align-items:center;gap:10px}
.strat-banner-x{font-size:11px;color:var(--mut);cursor:pointer;margin-left:auto;padding:2px 8px;border-radius:5px}
.strat-banner-x:hover{background:var(--surf2);color:var(--txt)}
.strat-act{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.strat-act .hbtn{font-size:10px;padding:5px 10px}
.strat-tab{display:inline-block;padding:6px 12px;font-size:10px;border-radius:6px;cursor:pointer;font-family:Roboto Mono,monospace;font-weight:700;letter-spacing:.5px;color:var(--mut);border:1px solid var(--brd);background:var(--surf2);margin-right:6px}
.strat-tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
/* ── Strategy User Guide modal ───────────────────────────────────────── */
.strat-guide-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9500;display:none;align-items:center;justify-content:center;padding:24px}
.strat-guide-ov.open{display:flex}
.strat-guide-box{background:var(--surf);border:1px solid var(--brd);border-radius:14px;width:100%;max-width:1100px;max-height:90vh;display:grid;grid-template-columns:220px 1fr;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
@media (max-width:900px){.strat-guide-box{grid-template-columns:1fr}.strat-guide-toc{display:none}}
.strat-guide-toc{background:var(--surf2);border-right:1px solid var(--brd);padding:20px 14px;overflow-y:auto}
.strat-guide-toc-h{font-size:10px;font-weight:800;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:1px;margin-bottom:12px}
.strat-guide-toc a{display:block;padding:6px 10px;border-radius:6px;font-size:11px;color:var(--mut);text-decoration:none;margin-bottom:2px;font-family:Roboto Mono,monospace;cursor:pointer;border:1px solid transparent}
.strat-guide-toc a:hover{background:var(--surf);color:var(--txt)}
.strat-guide-toc a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.strat-guide-content{padding:28px 36px;overflow-y:auto;line-height:1.55;font-size:13px;color:var(--txt)}
.strat-guide-close{position:absolute;top:18px;right:22px;background:var(--surf2);border:1px solid var(--brd);color:var(--mut);width:30px;height:30px;border-radius:8px;font-size:18px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
.strat-guide-close:hover{color:var(--txt);background:var(--bg)}
.strat-guide-h1{font-size:22px;font-weight:800;letter-spacing:-.4px;margin:0 0 4px 0;color:var(--txt)}
.strat-guide-sub{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--brd)}
.strat-guide-section{margin-bottom:30px;scroll-margin-top:20px}
.strat-guide-section h2{font-size:14px;font-weight:800;color:var(--acc);font-family:Roboto Mono,monospace;letter-spacing:.5px;margin:0 0 10px 0;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--brd)}
.strat-guide-section h3{font-size:12px;font-weight:700;color:var(--txt);font-family:Roboto Mono,monospace;margin:14px 0 6px 0;letter-spacing:.3px}
.strat-guide-section p{margin:0 0 10px 0;color:var(--txt)}
.strat-guide-section ul{margin:6px 0 12px 0;padding-left:22px}
.strat-guide-section li{margin-bottom:5px;color:var(--txt)}
.strat-guide-section table{width:100%;border-collapse:collapse;margin:10px 0 14px 0;font-size:12px}
.strat-guide-section th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.5px;background:var(--surf2);border-bottom:1px solid var(--brd)}
.strat-guide-section td{padding:8px 10px;border-bottom:1px solid var(--brd);vertical-align:top;color:var(--txt)}
.strat-guide-section td:first-child{white-space:nowrap;font-family:Roboto Mono,monospace;font-size:11px}
.strat-guide-section code{background:var(--surf2);padding:1px 6px;border-radius:4px;font-family:Roboto Mono,monospace;font-size:11px;color:var(--acc)}
.strat-guide-section .ex{background:var(--surf2);border-left:3px solid var(--acc);border-radius:6px;padding:10px 14px;margin:8px 0;font-size:12px}
.strat-guide-section .ex-h{font-size:10px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.5px;margin-bottom:6px}
.strat-guide-section .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:6px 0}
.strat-guide-section .pill-row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.strat-guide-section .tip{background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.3);border-radius:8px;padding:10px 14px;margin:10px 0;font-size:12px;color:var(--txt)}
.strat-guide-section .warn{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:10px 14px;margin:10px 0;font-size:12px;color:var(--txt)}
.strat-guide-section .step{display:flex;gap:12px;margin:8px 0;align-items:flex-start}
.strat-guide-section .step-n{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--acc);color:#fff;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:Roboto Mono,monospace}
.strat-guide-section .step-b{flex:1;font-size:12px;line-height:1.5}
.strat-guide-btn{background:var(--surf2);border:1px solid var(--brd);color:var(--acc);padding:5px 11px;border-radius:6px;font-size:10px;font-weight:700;font-family:Roboto Mono,monospace;cursor:pointer;letter-spacing:.5px}
.strat-guide-btn:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
/* ── Strategic Mindmap v2 ────────────────────────────────────────────── */
.mm-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9600;display:none;align-items:stretch;justify-content:stretch;padding:0}
.mm-ov.open{display:flex}
.mm-box{flex:1;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative}
.mm-top{display:flex;align-items:center;gap:14px;padding:12px 22px;border-bottom:1px solid var(--brd);background:var(--surf);flex-wrap:wrap;z-index:5}
.mm-title{font-size:14px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;color:var(--txt)}
.mm-sel{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:6px;padding:6px 10px;font-size:11px;font-family:inherit;min-width:140px;max-width:240px}
.mm-btn{background:var(--surf2);border:1px solid var(--brd);color:var(--acc);padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;font-family:Roboto Mono,monospace;cursor:pointer;letter-spacing:.3px;min-width:34px}
.mm-btn:hover:not(:disabled){background:var(--acc);color:#fff;border-color:var(--acc)}
.mm-close{background:var(--surf2);border:1px solid var(--brd);color:var(--mut);width:34px;height:34px;border-radius:8px;font-size:20px;cursor:pointer;margin-left:auto;display:flex;align-items:center;justify-content:center}
.mm-close:hover{color:var(--txt);background:var(--bg)}
.mm-crumb{display:flex;align-items:center;gap:6px;padding:9px 22px;background:var(--surf2);border-bottom:1px solid var(--brd);flex-wrap:nowrap;overflow-x:auto;font-size:11px;scrollbar-width:thin;z-index:4}
.mm-crumb-item{display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:var(--mut);padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.mm-crumb-item:hover{background:var(--surf);color:var(--txt)}
.mm-crumb-item.active{color:var(--txt);font-weight:600;background:var(--surf)}
.mm-crumb-sep{color:var(--mut);font-size:14px;flex-shrink:0}
.mm-canvas{flex:1;overflow:hidden;background:radial-gradient(ellipse at center,rgba(108,99,255,.06),transparent 70%);position:relative;cursor:grab;user-select:none}
.mm-canvas:active{cursor:grabbing}
.mm-svg-host{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.mm-svg{width:100%;height:100%;max-height:calc(100vh - 170px);overflow:visible}
.mm-pan-group{transition:transform .12s ease-out}
.mm-node-g{transition:transform .15s, filter .15s;transform-origin:center}
.mm-node-g.clickable:hover{filter:brightness(1.18) drop-shadow(0 4px 12px rgba(108,99,255,.35))}
.mm-node-g.clickable:hover rect:first-of-type{stroke-width:3}
.mm-node-g.focus rect:first-of-type{filter:drop-shadow(0 0 18px rgba(108,99,255,.4))}
.mm-foot{padding:7px 22px;border-top:1px solid var(--brd);background:var(--surf);font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;text-align:center;letter-spacing:.3px}
/* ── Viewpoint toggle + 3 mode layouts ────────────────────────────────── */
.strat-vptbar{display:flex;align-items:stretch;gap:8px;margin-bottom:18px;padding:6px;background:var(--surf);border:1px solid var(--brd);border-radius:14px}
.strat-vpt{flex:1;display:flex;align-items:center;gap:10px;padding:12px 14px;background:transparent;border:none;border-radius:10px;cursor:pointer;color:var(--txt);text-align:left;font-family:inherit;transition:background .12s,transform .1s}
.strat-vpt:hover{background:var(--surf2)}
.strat-vpt.active{background:linear-gradient(135deg,rgba(108,99,255,.18),rgba(9,250,163,.1));box-shadow:inset 0 0 0 1px var(--acc)}
.strat-vpt-ic{font-size:22px;flex-shrink:0;filter:saturate(1.2)}
.strat-vpt-l{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.strat-vpt-t{font-size:13px;font-weight:700;color:var(--txt)}
.strat-vpt-s{font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.3px}
.strat-vpt.active .strat-vpt-t{color:var(--acc)}
.strat-vpt-actions{display:flex;align-items:center;gap:8px;padding-left:8px;border-left:1px solid var(--brd)}

.strat-vp-sec{margin:24px 0 12px 0}
.strat-vp-sec-h{font-size:12px;font-weight:800;font-family:Roboto Mono,monospace;color:var(--acc);letter-spacing:.5px;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--brd);margin-bottom:8px}
.strat-vp-sec-d{font-size:11px;color:var(--mut);margin-bottom:14px}

/* Hero cards (Company view) */
.strat-hero-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-bottom:8px}
.strat-hero-card{background:var(--surf);border:1px solid var(--brd);border-left:4px solid var(--acc);border-radius:12px;padding:18px 18px 14px 18px;display:flex;flex-direction:column;gap:10px}
.strat-hero-card.health-ok{border-left-color:var(--grn)}
.strat-hero-card.health-warn{border-left-color:var(--yel)}
.strat-hero-card.health-bad{border-left-color:var(--red)}
.strat-hero-card.health-unknown{border-left-color:var(--mut)}
.strat-hero-top{display:flex;align-items:center;gap:8px}
.strat-hero-title{font-size:15px;font-weight:700;color:var(--txt);line-height:1.35;min-height:40px}
.strat-hero-prog{display:flex;flex-direction:column;gap:4px}
.strat-hero-pct{font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace}
.strat-hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding-top:4px}
.strat-hero-stats .hs{background:var(--surf2);border-radius:6px;padding:6px 4px;text-align:center}
.strat-hero-stats .hs-v{font-size:16px;font-weight:800;line-height:1}
.strat-hero-stats .hs-l{font-size:8px;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.3px;margin-top:3px}
.strat-hero-owner{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;padding-top:6px;border-top:1px solid var(--brd)}
.strat-hero-acts{display:flex;gap:8px;padding-top:6px}
.strat-hero-acts .hbtn{font-size:10px;padding:5px 10px;flex:1}

/* Heatmap */
.strat-heatmap{display:flex;flex-direction:column;background:var(--surf);border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:14px}
.strat-hm-row{display:grid;grid-template-columns:200px repeat(auto-fit,minmax(150px,1fr));border-bottom:1px solid var(--brd)}
.strat-hm-row:last-child{border-bottom:none}
.strat-hm-cell-base{padding:12px 14px;border-right:1px solid var(--brd)}
.strat-hm-cell-base:last-child{border-right:none}
.strat-hm-corner{background:var(--surf2)}
.strat-hm-coh-cell{background:var(--surf2);text-align:center}
.strat-hm-coh{font-size:10px;color:var(--txt);font-weight:600;margin-top:4px;line-height:1.3}
.strat-hm-deph-cell{background:var(--surf2)}
.strat-hm-deph{font-size:12px;font-weight:700;color:var(--txt)}
.strat-hm-dept-sub{font-size:9px;color:var(--mut);font-family:Roboto Mono,monospace;margin-top:2px}
.strat-hm-cell{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;transition:background .1s}
.strat-hm-cell.empty{background:transparent}
.strat-hm-cell.ok{background:rgba(9,250,163,.08)}
.strat-hm-cell.warn{background:rgba(251,191,36,.08)}
.strat-hm-cell.bad{background:rgba(255,107,107,.08)}
.strat-hm-cell.unknown{background:rgba(150,150,160,.06)}
.strat-hm-cell:hover{filter:brightness(1.3)}
.strat-hm-cell-v{font-size:13px;font-weight:700;color:var(--txt)}
.strat-hm-cell-p{font-size:9px;color:var(--mut);font-family:Roboto Mono,monospace}
.strat-hm-empty{font-size:18px;color:var(--mut)}

/* Action cards grid */
.strat-actions-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:14px}
.strat-action-card{background:var(--surf);border:1px solid var(--brd);border-left:3px solid var(--acc);border-radius:10px;padding:12px}
.strat-action-card.sev-high{border-left-color:var(--red)}
.strat-action-card.sev-med{border-left-color:var(--yel)}
.strat-action-card.sev-low{border-left-color:var(--acc)}
.sac-type{font-size:10px;font-weight:800;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.5px;margin-bottom:6px}
.sac-body{font-size:11px;color:var(--txt);line-height:1.4;margin-bottom:8px}
.sac-acts{display:flex;gap:6px}
.sac-acts .hbtn.xs{font-size:9px;padding:4px 8px;flex:1}

/* Department picker + summary */
.strat-pick-row{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:12px 16px;margin-bottom:14px}
.strat-pick-l{font-size:12px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.strat-dept-summary{background:var(--surf);border:1px solid var(--brd);border-left:4px solid var(--acc);border-radius:12px;padding:18px 20px;margin-bottom:18px}
.strat-dept-summary.health-ok{border-left-color:var(--grn)}
.strat-dept-summary.health-warn{border-left-color:var(--yel)}
.strat-dept-summary.health-bad{border-left-color:var(--red)}
.sds-h{font-size:14px;font-weight:800;letter-spacing:.5px;margin-bottom:14px;font-family:Roboto Mono,monospace}
.sds-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.sds-stats .hs{background:var(--surf2);border-radius:8px;padding:10px 6px;text-align:center}
.sds-stats .hs-v{font-size:20px;font-weight:800;line-height:1}
.sds-stats .hs-l{font-size:9px;color:var(--mut);font-family:Roboto Mono,monospace;margin-top:4px;letter-spacing:.3px}
.sds-l1{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;padding-top:10px;border-top:1px solid var(--brd)}
.sds-l1 .strat-id{cursor:pointer;color:var(--acc)}

/* Objective card */
.strat-obj-card{background:var(--surf);border:1px solid var(--brd);border-left:3px solid var(--grn);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.strat-obj-card.health-ok{border-left-color:var(--grn)}
.strat-obj-card.health-warn{border-left-color:var(--yel)}
.strat-obj-card.health-bad{border-left-color:var(--red)}
.soc-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.soc-prog{margin-left:auto;font-size:14px;font-weight:800;color:var(--txt);font-family:Roboto Mono,monospace}
.soc-title{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:6px}
.soc-meta{font-size:11px;color:var(--mut);margin-bottom:10px}
.soc-up{font-size:11px;color:var(--mut)}
.soc-up .strat-id{color:var(--acc)}
.soc-prog-bar{margin-bottom:10px}
.soc-krs{display:flex;flex-direction:column;gap:4px;padding-top:8px;border-top:1px solid var(--brd);margin-top:4px}
.soc-kr{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;background:var(--surf2);font-size:11px;cursor:pointer;transition:background .12s}
.soc-kr:hover{background:var(--bg)}
.soc-kr-t{flex:1;min-width:0;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.soc-kr-owner{font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;min-width:90px}
.soc-kr-prog{font-size:11px;font-weight:700;color:var(--acc);font-family:Roboto Mono,monospace;min-width:36px;text-align:right}
.soc-init{font-size:9px;background:rgba(108,99,255,.16);color:var(--acc);padding:2px 6px;border-radius:4px;font-family:Roboto Mono,monospace}
.soc-warn{font-size:9px;background:rgba(255,107,107,.16);color:var(--red);padding:2px 6px;border-radius:4px;font-family:Roboto Mono,monospace}
.soc-empty{font-size:11px;color:var(--mut);padding:10px;text-align:center;background:var(--surf2);border-radius:6px}
.soc-acts{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--brd);margin-top:10px;flex-wrap:wrap}
.soc-acts .hbtn{font-size:10px;padding:5px 10px}

/* Individual scorecard */
.strat-ind-scorecard{background:var(--surf);border:1px solid var(--brd);border-left:4px solid var(--acc);border-radius:12px;padding:18px 20px;margin-bottom:18px}

.sis-stats .hs-v{font-size:20px;font-weight:800;line-height:1}
.sis-stats .hs-l{font-size:9px;color:var(--mut);font-family:Roboto Mono,monospace;margin-top:4px;letter-spacing:.3px}
.sis-l1{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;padding-top:10px;border-top:1px solid var(--brd);line-height:1.5}
.sis-l1 .strat-id{color:var(--acc)}

.strat-ind-kr{background:var(--surf);border:1px solid var(--brd);border-left:3px solid var(--red);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.sik-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sik-prog{margin-left:auto;font-size:13px;font-weight:800;color:var(--acc);font-family:Roboto Mono,monospace}
.sik-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:6px}
.sik-up{font-size:11px;color:var(--mut);margin-bottom:8px;line-height:1.6}
.sik-up .strat-tier{margin-right:4px}
.sik-stats{font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;margin-bottom:8px}
.sik-acts{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--brd);margin-top:6px}

.strat-task-list{display:flex;flex-direction:column;gap:4px;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:8px;margin-bottom:14px}
.strat-task-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surf2);border-radius:6px;font-size:11px;transition:background .12s}
.strat-task-row:hover{background:var(--bg)}
.hbtn.xs{font-size:9px;padding:3px 8px}

@media (max-width:900px){
  .strat-vptbar{flex-wrap:wrap}

  .sds-stats,.sis-stats{grid-template-columns:repeat(2,1fr)}
  .strat-hero-stats{grid-template-columns:repeat(2,1fr)}
}

/* ── Individual OKR setter modal ─────────────────────────────────────── */
.io-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9700;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity .2s;pointer-events:none}
.io-ov.open{opacity:1;pointer-events:auto}
.io-box{background:var(--surf);border:1px solid var(--brd);border-radius:14px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto;padding:28px 32px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.55);transform:translateY(10px);transition:transform .2s}
.io-ov.open .io-box{transform:translateY(0)}
.io-close{position:absolute;top:16px;right:18px;background:var(--surf2);border:1px solid var(--brd);color:var(--mut);width:32px;height:32px;border-radius:8px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.io-close:hover{color:var(--txt);background:var(--bg)}
.io-h{font-size:20px;font-weight:800;letter-spacing:-.3px;color:var(--txt);margin-bottom:4px;padding-right:40px}
.io-sub{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;margin-bottom:24px}
.io-form{display:flex;flex-direction:column;gap:16px}
.io-field{display:flex;flex-direction:column;gap:6px}
.io-field label{font-size:10px;font-weight:800;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.5px}
.io-field input[type="text"],.io-field textarea,.io-field select{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:10px 14px;font-size:13px;font-family:inherit;outline:none}
.io-field input[type="text"]:focus,.io-field textarea:focus,.io-field select:focus{border-color:var(--acc)}
.io-field textarea{min-height:64px;resize:vertical}
.io-krs-h{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-size:11px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.3px;padding-bottom:6px;border-bottom:1px solid var(--brd)}
.io-krs{display:flex;flex-direction:column;gap:14px}
.io-kr-row{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:14px}
.io-kr-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.io-kr-top input[type="text"]{flex:1;background:var(--bg);border:1px solid var(--brd);color:var(--txt);border-radius:6px;padding:8px 12px;font-size:12px;font-family:inherit;outline:none;font-weight:600}
.io-kr-top input[type="text"]:focus{border-color:var(--acc)}
.io-kr-del{background:none;border:none;color:var(--red);width:28px;height:28px;border-radius:6px;font-size:18px;cursor:pointer}
.io-kr-del:hover{background:rgba(255,107,107,.12)}
.io-kr-metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.io-mf{display:flex;flex-direction:column;gap:3px}
.io-mf label{font-size:8px;font-weight:800;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.4px}
.io-mf input,.io-mf select{background:var(--bg);border:1px solid var(--brd);color:var(--txt);border-radius:5px;padding:6px 8px;font-size:11px;font-family:inherit;outline:none}
.io-mf input:focus,.io-mf select:focus{border-color:var(--acc)}
.io-foot{display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--brd);margin-top:8px}
.io-foot .hbtn{font-size:12px;padding:8px 16px}
.io-foot .hbtn.xl{font-size:12px;padding:8px 18px;font-weight:700}
@media (max-width:700px){.io-kr-metrics{grid-template-columns:repeat(2,1fr)}}
/* IO KR inline display rows */
.io-kr-list{display:flex;flex-direction:column;gap:5px;padding-top:10px;border-top:1px solid var(--brd);margin-top:10px}
.io-kr-disp{display:grid;grid-template-columns:auto 1fr 180px 110px 90px;align-items:center;gap:10px;background:var(--surf2);border-radius:6px;padding:8px 12px;font-size:11px}
.io-kr-disp-l{display:flex;align-items:center;gap:6px;flex-shrink:0}
.io-kr-disp-title{color:var(--txt);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.io-kr-disp-metric{color:var(--mut);font-size:10px;font-family:Roboto Mono,monospace;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.io-kr-disp-prog{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;justify-content:flex-end}
.io-kr-disp-prog input{width:48px;background:var(--bg);border:1px solid var(--brd);color:var(--acc);border-radius:4px;padding:3px 6px;font-size:11px;font-weight:700;text-align:center;font-family:Roboto Mono,monospace;outline:none}
.io-kr-disp-prog input:focus{border-color:var(--acc)}
.io-kr-disp-conf{font-size:10px;font-family:Roboto Mono,monospace;text-align:right}
@media (max-width:800px){.io-kr-disp{grid-template-columns:1fr;gap:4px}.io-kr-disp-metric,.io-kr-disp-prog,.io-kr-disp-conf{text-align:left}}
.hbtn.xs{font-size:10px;padding:4px 10px}

/* ── Team roster on Department view ──────────────────────────────────── */
.strat-team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:14px}
.strat-team-card{background:var(--surf);border:1px solid var(--brd);border-left:3px solid var(--mut);border-radius:10px;padding:14px}
.strat-team-card.health-ok{border-left-color:var(--grn)}
.strat-team-card.health-warn{border-left-color:var(--yel)}
.strat-team-card.health-bad{border-left-color:var(--red)}
.strat-team-card.health-unknown{border-left-color:#a78bfa}
.stc-h{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.stc-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,rgba(108,99,255,.4),rgba(167,139,250,.4));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;font-family:Roboto Mono,monospace;flex-shrink:0}
.stc-name-wrap{flex:1;min-width:0}
.stc-name{font-size:13px;font-weight:700;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stc-role{font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stc-prog{font-size:14px;font-weight:800;color:var(--acc);font-family:Roboto Mono,monospace;flex-shrink:0}
.stc-stats{display:flex;gap:14px;padding:6px 0;font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);margin-bottom:10px}
.stc-stat-v{font-weight:800;color:var(--txt);font-size:14px}
.stc-stat-l{margin-left:3px;letter-spacing:.3px}
.stc-empty{font-size:10px;color:var(--mut);font-style:italic;padding:6px 0;text-align:center;font-family:Roboto Mono,monospace;margin-bottom:8px}
.stc-iolist{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.stc-iol{font-size:11px;background:var(--surf2);border-radius:5px;padding:6px 8px;cursor:pointer;display:flex;gap:6px;align-items:center;color:var(--txt);overflow:hidden}
.stc-iol:hover{background:var(--bg)}
.stc-iol .strat-id{flex-shrink:0;font-size:9px}
.stc-acts{display:flex;gap:6px}

/* Mindmap layout toggle */
.mm-layout-toggle{display:inline-flex;gap:0;margin:0 6px;border:1px solid var(--brd);border-radius:8px;overflow:hidden;background:var(--surf2)}
.mm-layout-btn{border-radius:0;border:none;padding:7px 12px;font-size:11px;background:transparent;color:var(--mut)}
.mm-layout-btn:not(:last-child){border-right:1px solid var(--brd)}
.mm-layout-btn.active{background:linear-gradient(135deg,rgba(108,99,255,.25),rgba(167,139,250,.18));color:var(--txt)}
.mm-layout-btn:hover:not(.active){background:var(--surf);color:var(--txt)}
.mm-node-g.dim{filter:saturate(.4)}

/* ── TODAY landing — deliberately simple ──────────────────────────────── */
.today-wrap{max-width:760px;margin:0 auto;padding:48px 24px 60px;font-family:inherit}
.today-hdr{margin-bottom:36px}
.today-title{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1;margin-bottom:8px;color:var(--txt)}
.today-sub{font-size:12px;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.3px}
.today-card{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:30px 34px;margin-bottom:18px}
.today-card-label{font-size:10px;font-weight:800;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:1.2px;margin-bottom:18px}
.today-card-body{display:flex;flex-direction:column}
.today-card-id{font-size:11px;color:var(--acc);font-family:Roboto Mono,monospace;margin-bottom:8px;letter-spacing:.3px}
.today-card-title{font-size:22px;font-weight:700;line-height:1.3;color:var(--txt);margin-bottom:10px;letter-spacing:-.2px}
.today-card-context{font-size:12px;color:var(--mut);margin-bottom:18px;font-style:italic}
.today-card-progress{margin-bottom:22px;margin-top:6px}
.today-progress-bar{height:6px;background:var(--surf2);border-radius:3px;overflow:hidden;margin-bottom:8px}
.today-progress-fill{height:100%;background:var(--acc);transition:width .3s}
.today-card-pct{font-size:12px;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.3px}
.today-card-action{margin-top:4px}
.today-action-btn{background:var(--acc);color:#fff;border:none;padding:11px 20px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.2px;transition:filter .12s,transform .12s}
.today-action-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.today-empty{font-size:15px;color:var(--txt);margin-bottom:10px;font-weight:500}
.today-empty-sub{font-size:12px;color:var(--mut);line-height:1.5}
.today-snap{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:30px 34px;margin-bottom:32px}
.today-snap-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:start}
.today-snap-stat{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.today-snap-dot{width:10px;height:10px;border-radius:50%;margin-bottom:8px}
.today-snap-val{font-size:38px;font-weight:800;line-height:1;font-family:Roboto Mono,monospace}
.today-snap-label{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.5px;margin-top:6px}
.today-foot{text-align:center;margin-top:28px}
.today-link{font-size:12px;color:var(--mut);font-family:Roboto Mono,monospace;cursor:pointer;padding:10px 18px;border-radius:6px;display:inline-block;letter-spacing:.3px;transition:color .12s,background .12s}
.today-link:hover{color:var(--acc);background:rgba(108,99,255,.08)}
.today-back{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;cursor:pointer;display:inline-block;padding:6px 0;margin-bottom:14px;letter-spacing:.3px;transition:color .12s}
.today-back:hover{color:var(--acc)}
@media (max-width:600px){
  .today-wrap{padding:32px 18px 40px}
  .today-card,.today-snap{padding:22px 20px}
  .today-snap-val{font-size:28px}
}

/* ════════════════════════════════════════════════════════════════════ */
/* STRATEGY V2 — 4-tab redesign                                          */
/* Three semantic colors only. No score chips. No ⓘ flood.               */
/* ════════════════════════════════════════════════════════════════════ */
.v2-wrap{max-width:920px;margin:0 auto;padding:32px 24px 60px;font-family:inherit}
.v2-hdr{display:flex;align-items:baseline;gap:14px;margin-bottom:24px}
.v2-title{font-size:24px;font-weight:700;letter-spacing:-.3px;color:var(--txt);line-height:1}
.v2-sub{font-size:12px;color:var(--mut);font-family:Roboto Mono,monospace}
.v2-deptpicker{margin-left:auto;background:transparent;border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:7px 12px;font-size:13px;font-family:inherit;outline:none;min-width:180px;cursor:pointer}
.v2-deptpicker:hover{border-color:var(--mut)}
.v2-tabs{display:flex;gap:2px;border-bottom:1px solid var(--brd);margin-bottom:24px}
.v2-tab{background:none;border:none;padding:10px 16px;font-size:13px;color:var(--mut);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;font-weight:500;transition:color .12s,border-color .12s;margin-bottom:-1px}
.v2-tab:hover{color:var(--txt)}
.v2-tab.active{color:var(--txt);border-bottom-color:var(--txt);font-weight:600}
.v2-content{display:flex;flex-direction:column;gap:18px}
.v2-section-label{font-size:10px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:1.2px;margin-bottom:14px;text-transform:uppercase}

/* Health card */
.v2-health-card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:24px 26px}
.v2-health-card.health-ok{border-left:4px solid #10b981}
.v2-health-card.health-warn{border-left:4px solid #f59e0b}
.v2-health-card.health-risk{border-left:4px solid #ef4444}
.v2-health-row{display:flex;align-items:baseline;gap:14px;margin-bottom:12px}
.v2-health-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;align-self:center}
.v2-health-card.health-ok .v2-health-dot{background:#10b981}
.v2-health-card.health-warn .v2-health-dot{background:#f59e0b}
.v2-health-card.health-risk .v2-health-dot{background:#ef4444}
.v2-health-pct{font-size:34px;font-weight:700;line-height:1;color:var(--txt);font-family:Roboto Mono,monospace}
.v2-health-label{font-size:14px;color:var(--mut);font-weight:500}
.v2-forecast{font-size:13px;color:var(--txt);margin-bottom:14px;line-height:1.5}
.v2-forecast strong{font-weight:600}
.v2-health-counts{display:flex;gap:18px;font-size:12px;color:var(--mut);font-family:Roboto Mono,monospace}
.v2-count{padding:0}

/* Attention Center */
.v2-attention{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:20px 22px}
.v2-attention-h{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--brd)}
.v2-attention-icon{font-size:16px;color:#f59e0b}
.v2-attention-title{font-size:14px;font-weight:600;color:var(--txt)}
.v2-attention-count{font-size:11px;font-weight:600;background:var(--surf2);color:var(--mut);padding:2px 10px;border-radius:10px;font-family:Roboto Mono,monospace}
.v2-attention-empty{font-size:13px;color:var(--mut);padding:20px;text-align:center}
.v2-attention-list{display:flex;flex-direction:column;gap:6px}
.v2-attention-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--brd)}
.v2-attention-row:last-child{border-bottom:none}
.v2-attention-bullet{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--mut)}
.v2-attention-row.sev-high .v2-attention-bullet{background:#ef4444}
.v2-attention-row.sev-medium .v2-attention-bullet{background:#f59e0b}
.v2-attention-row.sev-low .v2-attention-bullet{background:var(--mut)}
.v2-attention-body{flex:1;min-width:0}
.v2-attention-title-row{font-size:13px;color:var(--txt);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.v2-attention-meta{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;margin-top:2px}
.v2-attention-actions{display:flex;gap:6px;flex-shrink:0}
.v2-attention-more{font-size:12px;color:var(--mut);text-align:center;padding:12px;font-family:Roboto Mono,monospace}

/* Buttons */
.v2-btn{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;transition:background .12s,border-color .12s}
.v2-btn:hover{background:var(--surf);border-color:var(--mut)}
.v2-btn-ghost{background:transparent;color:var(--mut)}
.v2-btn-ghost:hover{color:var(--txt);background:var(--surf2)}

/* Collapsible */
.v2-collapsible{margin-top:8px}
.v2-collapse-btn{background:none;border:none;color:var(--mut);font-size:12px;cursor:pointer;padding:8px 0;font-family:Roboto Mono,monospace}
.v2-collapse-btn:hover{color:var(--txt)}

/* Heatmap (v2 styling — quieter) */
.v2-heatmap{background:var(--surf);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin-top:8px}
.v2-hm-row{display:grid;grid-template-columns:180px repeat(auto-fit,minmax(140px,1fr));border-bottom:1px solid var(--brd)}
.v2-hm-row:last-child{border-bottom:none}
.v2-hm-cell-base{padding:10px 12px;border-right:1px solid var(--brd)}
.v2-hm-cell-base:last-child{border-right:none}
.v2-hm-corner{background:var(--surf2)}
.v2-hm-coh-cell{background:var(--surf2);text-align:center}
.v2-hm-coh{font-size:11px;color:var(--txt);font-weight:500}
.v2-hm-deph-cell{background:var(--surf2)}
.v2-hm-deph{font-size:11px;font-weight:600;color:var(--txt)}
.v2-hm-cell{display:flex;flex-direction:column;justify-content:center;align-items:center}
.v2-hm-cell.empty{}
.v2-hm-cell.ok{background:rgba(16,185,129,.06)}
.v2-hm-cell.warn{background:rgba(245,158,11,.06)}
.v2-hm-cell.risk{background:rgba(239,68,68,.06)}
.v2-hm-cell-v{font-size:12px;color:var(--txt);font-weight:600}
.v2-hm-cell-p{font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;margin-top:2px}
.v2-hm-empty{color:var(--mut)}

/* Tree */
.v2-objs-meta{font-size:12px;color:var(--mut);font-family:Roboto Mono,monospace;padding:0 4px 12px}
.v2-tree-node{margin-bottom:2px}
.v2-tree-node.depth-1,.v2-tree-node.depth-2,.v2-tree-node.depth-3{margin-left:0}
.v2-tree-kids{margin-left:24px;padding-left:14px;border-left:1px solid var(--brd);margin-top:4px;margin-bottom:8px}
.v2-tree-head{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surf);border:1px solid var(--brd);border-radius:8px;cursor:pointer;transition:border-color .12s,background .12s}
.v2-tree-head:hover{border-color:var(--mut)}
.v2-caret{background:none;border:none;color:var(--mut);font-size:11px;cursor:pointer;width:16px;font-family:inherit;padding:0}
.v2-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.v2-dot.dot-ok{background:#10b981}
.v2-dot.dot-warn{background:#f59e0b}
.v2-dot.dot-risk{background:#ef4444}
.v2-dot.dot-neutral{background:var(--mut)}
.v2-tree-title{flex:1;font-size:13px;color:var(--txt);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.v2-tree-meta{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;flex-shrink:0}
.v2-tree-id{font-size:10px}
.v2-tree-owner{font-size:11px;color:var(--mut)}
.v2-tree-pct{font-weight:600;color:var(--txt);font-size:12px;font-family:Roboto Mono,monospace}
.v2-tree-status{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surf2);color:var(--mut)}
.v2-tree-status.status-ok{color:#10b981;background:rgba(16,185,129,.1)}
.v2-tree-status.status-warn{color:#f59e0b;background:rgba(245,158,11,.1)}
.v2-tree-status.status-risk{color:#ef4444;background:rgba(239,68,68,.1)}
.v2-empty{font-size:13px;color:var(--mut);padding:32px;text-align:center;background:var(--surf);border:1px dashed var(--brd);border-radius:10px}

/* Execution */
.v2-exec-sec{background:var(--surf);border:1px solid var(--brd);border-radius:10px;margin-bottom:14px;overflow:hidden}
.v2-exec-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid transparent;transition:background .12s}
.v2-exec-hdr:hover{background:var(--surf2)}
.v2-exec-label{font-size:11px;font-weight:700;color:var(--txt);font-family:Roboto Mono,monospace;letter-spacing:1px}
.v2-exec-count{margin-left:auto;font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace}
.v2-exec-row{display:flex;align-items:center;gap:10px;padding:10px 16px 10px 38px;border-top:1px solid var(--brd);cursor:pointer;transition:background .12s}
.v2-exec-row:hover{background:var(--surf2)}

/* People */
.v2-person-card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:18px 20px;margin-bottom:12px}
.v2-person-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.v2-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#a78bfa);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;font-family:Roboto Mono,monospace;flex-shrink:0}
.v2-person-name{flex:1}
.v2-person-role{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;margin-top:2px}
.v2-person-counts{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace}
.v2-person-section{margin-bottom:12px}
.v2-person-io,.v2-person-kr{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;color:var(--txt)}
.v2-person-footline{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;padding-top:10px;border-top:1px solid var(--brd);margin-bottom:10px}
.v2-person-acts{display:flex;gap:8px}

@media (max-width:640px){
  .v2-wrap{padding:20px 14px 40px}
  .v2-hdr{flex-wrap:wrap}
  .v2-deptpicker{margin-left:0;margin-top:8px;width:100%}
  .v2-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .v2-tab{white-space:nowrap;flex-shrink:0}
  .v2-tree-meta{flex-wrap:wrap;gap:6px}
  .v2-tree-owner,.v2-tree-id{display:none}
  .v2-attention-row{flex-wrap:wrap}
}

/* ── Phase 2A + 2B: status strip, triage, business impact ────────────── */
.v2-strip{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surf2);border:1px solid var(--brd);border-radius:8px;margin-bottom:18px;font-size:12px;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.3px;flex-wrap:wrap}
.v2-strip-dept{color:var(--txt);font-weight:700;letter-spacing:1px}
.v2-strip-sep{color:var(--mut);opacity:.5}
.v2-strip-item{color:var(--mut)}
.v2-strip-attn{color:#f59e0b;font-weight:600}

/* Business impact projection */
.v2-impact-h{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.5px;margin:14px 0 8px 0;font-weight:600}
.v2-impact-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.v2-impact-row{display:flex;align-items:center;gap:10px;padding:6px 10px;background:var(--surf2);border-radius:6px;font-size:12px}
.v2-impact-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--mut)}
.v2-impact-row.band-ok .v2-impact-dot{background:#10b981}
.v2-impact-row.band-warn .v2-impact-dot{background:#f59e0b}
.v2-impact-row.band-risk .v2-impact-dot{background:#ef4444}
.v2-impact-title{flex:1;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;font-weight:500}
.v2-impact-vals{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;flex-shrink:0}
.v2-impact-vals strong{color:var(--txt);font-weight:700}
.v2-impact-conf{font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;flex-shrink:0;padding-left:8px;border-left:1px solid var(--brd)}

/* Triage bands */
.v2-attn-band{padding-top:14px;margin-top:6px;border-top:1px dashed var(--brd)}
.v2-attn-band:first-of-type{border-top:none;margin-top:0;padding-top:0}
.v2-attn-band-h{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.v2-attn-band-label{font-size:10px;font-weight:800;letter-spacing:1.5px;font-family:Roboto Mono,monospace;padding:2px 10px;border-radius:10px}
.v2-attn-band.band-critical .v2-attn-band-label{color:#ef4444;background:rgba(239,68,68,.12)}
.v2-attn-band.band-high .v2-attn-band-label{color:#f59e0b;background:rgba(245,158,11,.12)}
.v2-attn-band.band-medium .v2-attn-band-label{color:var(--mut);background:var(--surf2)}
.v2-attn-band-list{display:flex;flex-direction:column;gap:8px}
.v2-attn-item{background:var(--surf2);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.v2-attn-item-issue{font-size:13px;color:var(--txt);font-weight:600;line-height:1.4}
.v2-attn-item-meta{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;line-height:1.5}
.v2-attn-item-meta strong{color:var(--txt);font-weight:600}
.v2-attn-item-acts{display:flex;gap:8px;margin-top:4px}
.v2-attn-more{background:none;border:1px dashed var(--brd);color:var(--mut);font-size:11px;padding:8px 10px;border-radius:6px;cursor:pointer;width:100%;font-family:inherit;letter-spacing:.3px;margin-top:4px}
.v2-attn-more:hover{color:var(--txt);border-color:var(--mut)}

/* Tree micro-indicators */
.v2-tree-insights{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace}
.v2-tree-insights strong{color:var(--txt);font-weight:700}
.v2-mi{padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600}
.v2-mi-risk{color:#ef4444;background:rgba(239,68,68,.1)}
.v2-mi-warn{color:#f59e0b;background:rgba(245,158,11,.1)}

@media (max-width:640px){
  .v2-strip{font-size:11px;gap:6px}
  .v2-impact-vals,.v2-impact-conf{display:none}
}

/* ════════════════════════════════════════════════════════════════════ */
/* TASK MANAGER V2 — focused execution layer, not a spreadsheet         */
/* ════════════════════════════════════════════════════════════════════ */
.tm-wrap{max-width:960px;margin:0 auto;padding:32px 24px 60px;font-family:inherit}
.tm-hdr{display:flex;align-items:baseline;gap:14px;margin-bottom:14px}
.tm-title{font-size:24px;font-weight:700;letter-spacing:-.3px;color:var(--txt);line-height:1}
.tm-deptpicker{margin-left:auto;background:transparent;border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:7px 12px;font-size:13px;font-family:inherit;outline:none;min-width:180px;cursor:pointer}
.tm-deptpicker:hover{border-color:var(--mut)}
.tm-strip{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surf2);border:1px solid var(--brd);border-radius:8px;margin-bottom:18px;font-size:12px;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.3px;flex-wrap:wrap}
.tm-strip-item strong{color:var(--txt);font-weight:600}
.tm-strip-sep{color:var(--mut);opacity:.5}
.tm-strip-overdue strong{color:#ef4444}
.tm-strip-blocked strong{color:#525252}
.tm-tabs{display:flex;gap:2px;border-bottom:1px solid var(--brd);margin-bottom:24px}
.tm-tab{background:none;border:none;padding:10px 16px;font-size:13px;color:var(--mut);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;font-weight:500;transition:color .12s,border-color .12s;margin-bottom:-1px}
.tm-tab:hover{color:var(--txt)}
.tm-tab.active{color:var(--txt);border-bottom-color:var(--txt);font-weight:600}
.tm-content{display:flex;flex-direction:column;gap:16px}
.tm-section-label{font-size:10px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:1.2px;margin-bottom:12px;text-transform:uppercase}

/* Health dot */
.tm-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:8px;vertical-align:middle}
.tm-dot.dot-ok{background:#10b981}
.tm-dot.dot-soon{background:#f59e0b}
.tm-dot.dot-overdue{background:#ef4444}
.tm-dot.dot-blocked{background:#525252}
.tm-dot.dot-done{background:#a3a3a3}

/* Focus card */
.tm-focus{background:var(--surf);border:1px solid var(--brd);border-left:4px solid var(--acc);border-radius:12px;padding:20px 22px}
.tm-focus-body{display:flex;flex-direction:column;gap:8px}
.tm-focus-title{font-size:18px;font-weight:700;color:var(--txt);display:flex;align-items:center;line-height:1.3}
.tm-focus-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--mut);font-family:Roboto Mono,monospace}
.tm-focus-acts{display:flex;gap:8px;margin-top:10px}
.tm-focus-empty{display:flex;align-items:center;gap:14px;color:var(--mut);font-size:13px;padding:8px 0}
.tm-focus-empty-icon{font-size:22px}

/* Priority chips */
.tm-pri{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;font-family:Roboto Mono,monospace;letter-spacing:.3px;background:var(--surf2);color:var(--mut)}
.tm-pri.pri-urgent{background:rgba(239,68,68,.12);color:#ef4444}
.tm-pri.pri-this-week{background:rgba(245,158,11,.12);color:#f59e0b}
.tm-pri.pri-planned{background:rgba(108,99,255,.12);color:var(--acc)}
.tm-pri.pri-backlog{background:var(--surf2);color:var(--mut)}

/* Buttons */
.tm-btn{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;transition:background .12s,border-color .12s}
.tm-btn:hover{background:var(--surf);border-color:var(--mut)}
.tm-btn-primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.tm-btn-primary:hover{filter:brightness(1.15);border-color:var(--acc);background:var(--acc);color:#fff}
.tm-btn-danger{background:transparent;color:#ef4444;border-color:rgba(239,68,68,.4)}
.tm-btn-danger:hover{background:rgba(239,68,68,.08);border-color:#ef4444}

/* Quick Add */
.tm-quick{margin:6px 0 16px 0}
.tm-quick-input{width:100%;background:var(--surf);border:1px solid var(--brd);color:var(--txt);border-radius:10px;padding:12px 16px;font-size:14px;font-family:inherit;outline:none;transition:border-color .12s}
.tm-quick-input:focus{border-color:var(--acc)}
.tm-quick-input::placeholder{color:var(--mut)}

/* Groups */
.tm-group{margin-bottom:8px}
.tm-group-h{display:flex;align-items:center;gap:10px;padding:8px 4px;cursor:pointer;user-select:none}
.tm-group-label{font-size:11px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:1.2px}
.tm-group-count{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace}
.tm-caret{background:none;border:none;color:var(--mut);font-size:11px;cursor:pointer;width:16px;font-family:inherit;padding:0}

/* Card */
.tm-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surf);border:1px solid var(--brd);border-radius:8px;margin-bottom:4px;cursor:pointer;transition:border-color .12s,background .12s}
.tm-card:hover{border-color:var(--mut);background:var(--surf2)}
.tm-card-main{flex:1;min-width:0}
.tm-card-title{font-size:13px;font-weight:500;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tm-card-meta{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;margin-top:2px;display:flex;gap:10px}
.tm-card-id{font-size:10px}
.tm-card-right{display:flex;align-items:center;gap:12px;flex-shrink:0;font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace}
.tm-card-due{min-width:90px;text-align:right}
.tm-card-prog{font-weight:600;color:var(--txt);min-width:36px;text-align:right}

/* Empty / placeholder */
.tm-empty,.tm-placeholder{font-size:13px;color:var(--mut);padding:36px 24px;text-align:center;background:var(--surf);border:1px dashed var(--brd);border-radius:10px;line-height:1.5}
.tm-empty-ic{font-size:24px;margin-bottom:8px}

/* Team grouping picker */
.tm-grouping{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace}
.tm-grouping-label{margin-right:8px}
.tm-group-pick{background:transparent;border:1px solid var(--brd);color:var(--mut);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
.tm-group-pick:hover{color:var(--txt);border-color:var(--mut)}
.tm-group-pick.active{background:var(--txt);color:var(--surf);border-color:var(--txt)}

/* Kanban Board */
.tm-board{display:grid;grid-template-columns:repeat(4,minmax(220px,1fr));gap:12px;align-items:flex-start}
.tm-board-col{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px;min-height:200px}
.tm-board-col-h{display:flex;align-items:center;justify-content:space-between;padding:0 4px 10px 4px;border-bottom:1px solid var(--brd);margin-bottom:10px}
.tm-board-col-label{font-size:11px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.8px}
.tm-board-col-count{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace}
.tm-board-list{display:flex;flex-direction:column;gap:6px}
.tm-board-card{background:var(--surf2);border:1px solid var(--brd);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color .12s}
.tm-board-card:hover{border-color:var(--mut)}
.tm-board-card-h{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.tm-board-card-title{font-size:12px;font-weight:500;color:var(--txt);line-height:1.4;margin-bottom:6px}
.tm-board-card-meta{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace}
.tm-board-more{font-size:11px;color:var(--mut);text-align:center;padding:6px;font-family:Roboto Mono,monospace}

/* Drawer */
.tm-drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9900;display:flex;align-items:stretch;justify-content:flex-end}
.tm-drawer{width:480px;max-width:96vw;background:var(--surf);border-left:1px solid var(--brd);padding:28px 32px;overflow-y:auto;box-shadow:-8px 0 32px rgba(0,0,0,.45);position:relative}
.tm-drawer-close{position:absolute;top:14px;right:18px;background:var(--surf2);border:1px solid var(--brd);color:var(--mut);width:30px;height:30px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tm-drawer-close:hover{color:var(--txt)}
.tm-drawer-h{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-right:40px}
.tm-drawer-title{font-size:18px;font-weight:700;color:var(--txt);line-height:1.3}
.tm-drawer-id{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;margin-top:2px}
.tm-drawer-status{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);margin-bottom:18px;font-size:12px;color:var(--mut);font-family:Roboto Mono,monospace}
.tm-health-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.tm-health-pill.h-ok{background:rgba(16,185,129,.12);color:#10b981}
.tm-health-pill.h-soon{background:rgba(245,158,11,.12);color:#f59e0b}
.tm-health-pill.h-overdue{background:rgba(239,68,68,.12);color:#ef4444}
.tm-health-pill.h-blocked{background:rgba(82,82,82,.18);color:var(--mut)}
.tm-health-pill.h-done{background:rgba(163,163,163,.18);color:var(--mut)}
.tm-drawer-form{display:grid;grid-template-columns:120px 1fr;gap:12px 14px;align-items:center;margin-bottom:24px}
.tm-drawer-form label{font-size:10px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.6px}
.tm-drawer-field{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:6px;padding:8px 10px;font-size:12px;font-family:inherit;outline:none}
.tm-drawer-field:focus{border-color:var(--acc)}
.tm-drawer-form textarea.tm-drawer-field{min-height:80px;resize:vertical;font-family:inherit}
.tm-drawer-foot{display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--brd)}

@media (max-width:720px){
  .tm-wrap{padding:18px 14px 40px}
  .tm-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tm-tab{white-space:nowrap;flex-shrink:0}
  .tm-board{grid-template-columns:1fr;gap:8px}
  .tm-card-right{flex-direction:column;align-items:flex-end;gap:4px}
  .tm-card-due,.tm-card-prog{min-width:0}
  .tm-drawer{width:100%;padding:20px}
  .tm-drawer-form{grid-template-columns:1fr}
}

/* + New task — global header button + modal */
.tm-new-btn{margin-left:auto;background:#10b981;color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.2px;display:inline-flex;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(16,185,129,.35),0 1px 2px rgba(16,185,129,.4);transition:transform .12s,box-shadow .12s,background .12s}
.tm-new-btn:hover{background:#0f9e6f;transform:translateY(-1px);box-shadow:0 6px 20px rgba(16,185,129,.45),0 2px 4px rgba(16,185,129,.5)}
.tm-new-btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(16,185,129,.35)}
.tm-new-btn kbd{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:4px;padding:1px 6px;font-size:10px;font-family:Roboto Mono,monospace;font-weight:700;letter-spacing:.5px;margin-left:6px}
.tm-deptpicker{margin-left:8px}
.tm-new-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9950;display:flex;align-items:center;justify-content:center;padding:24px}
.tm-new-box{background:var(--surf);border:1px solid var(--brd);border-radius:14px;width:100%;max-width:560px;padding:28px 32px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.tm-new-close{position:absolute;top:14px;right:18px;background:var(--surf2);border:1px solid var(--brd);color:var(--mut);width:30px;height:30px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tm-new-close:hover{color:var(--txt)}
.tm-new-h{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:6px;padding-right:32px}
.tm-new-sub{font-size:12px;color:var(--mut);margin-bottom:18px;line-height:1.5}
.tm-new-name{width:100%;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:10px;padding:14px 16px;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;box-sizing:border-box}
.tm-new-name:focus{border-color:var(--acc)}
.tm-new-toggle{background:none;border:none;color:var(--mut);font-size:12px;cursor:pointer;padding:8px 0;font-family:inherit;margin-bottom:8px}

.tm-new-row{display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:center;margin-bottom:10px}

.tm-new-foot{display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--brd);margin-top:18px}

/* OKR link chip + drawer linked block */
.tm-link-chip{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(108,99,255,.14);color:var(--acc);font-family:Roboto Mono,monospace;font-weight:600;letter-spacing:.2px}
.tm-linked-block{background:rgba(108,99,255,.06);border:1px solid rgba(108,99,255,.2);border-radius:8px;padding:12px 14px;margin-bottom:18px}

.tm-linked-chain{font-size:13px;color:var(--txt);line-height:1.4;margin-bottom:4px}
.tm-linked-chain strong{color:var(--acc);font-family:Roboto Mono,monospace;margin-right:4px}
.tm-linked-up{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace}

/* Owner-preserve / KR picker / bigger Notes */
.tm-progress-cell{display:flex;align-items:center;gap:6px}
.tm-progress-cell .tm-drawer-field{width:80px}
.tm-pct{color:var(--mut);font-size:11px;font-family:Roboto Mono,monospace}

.tm-kr-cell{position:relative}
.tm-kr-pick{display:flex;align-items:center;gap:8px;width:100%;background:var(--surf2);border:1px solid var(--brd);border-radius:8px;padding:9px 12px;color:var(--txt);font-family:inherit;font-size:12px;cursor:pointer;text-align:left;transition:border-color .12s}

.tm-kr-popover{z-index:10000;background:var(--surf);border:1px solid var(--brd);border-radius:10px;box-shadow:0 12px 36px rgba(0,0,0,.5);padding:12px;display:flex;flex-direction:column;gap:10px;max-height:480px}
.tm-kr-search{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none}
.tm-kr-search:focus{border-color:var(--acc)}
.tm-kr-list{overflow-y:auto;max-height:340px;display:flex;flex-direction:column;gap:8px}
.tm-kr-empty{padding:24px;text-align:center;color:var(--mut);font-size:13px}
.tm-kr-grp-h{font-size:9px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:1px;padding:4px 4px}
.tm-kr-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .1s}

.tm-kr-row.active{background:rgba(108,99,255,.1)}
.tm-kr-row-l{display:flex;align-items:center;gap:6px;flex-shrink:0;min-width:90px}
.tm-kr-active-mark{color:var(--acc);font-weight:700}
.tm-kr-row-body{flex:1;min-width:0}
.tm-kr-row-title{font-size:12px;color:var(--txt);font-weight:500;line-height:1.35}
.tm-kr-row-sub{font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;margin-top:2px}
.tm-kr-foot{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--brd)}

/* Notes block - full width below the form grid */
.tm-notes-block{margin-bottom:24px}
.tm-notes-area{width:100%;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:12px 14px;font-size:13px;font-family:inherit;outline:none;min-height:140px;resize:vertical;box-sizing:border-box;line-height:1.5}
.tm-notes-area:focus{border-color:var(--acc)}
.tm-notes-area::placeholder{color:var(--mut)}

/* ROADMAPS — Phase 1+2+5                                                */
/* ════════════════════════════════════════════════════════════════════ */
.rm-wrap{max-width:1100px;margin:0 auto;padding:32px 24px 60px;font-family:inherit}
.rm-hdr{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.rm-title{font-size:24px;font-weight:700;letter-spacing:-.3px;color:var(--txt);line-height:1;margin-right:auto}
.rm-new-btn{background:#10b981;color:#fff;border:none;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(16,185,129,.32);transition:transform .12s,box-shadow .12s,background .12s}
.rm-new-btn:hover{background:#0f9e6f;transform:translateY(-1px);box-shadow:0 6px 20px rgba(16,185,129,.42)}
.rm-new-theme-btn{background:transparent;color:var(--mut);border:1px solid var(--brd);padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:color .12s,border-color .12s}
.rm-new-theme-btn:hover{color:var(--txt);border-color:var(--mut)}
.rm-strip{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surf2);border:1px solid var(--brd);border-radius:8px;margin-bottom:18px;font-size:12px;color:var(--mut);font-family:Roboto Mono,monospace;flex-wrap:wrap}
.rm-strip-item strong{color:var(--txt);font-weight:600}
.rm-strip-sep{color:var(--mut);opacity:.5}
.rm-strip-risk strong{color:#ef4444}
.rm-strip-ok strong{color:#10b981}
.rm-tabs{display:flex;gap:2px;border-bottom:1px solid var(--brd);margin-bottom:24px}
.rm-tab{background:none;border:none;padding:10px 16px;font-size:13px;color:var(--mut);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;font-weight:500;transition:color .12s,border-color .12s;margin-bottom:-1px}
.rm-tab:hover{color:var(--txt)}
.rm-tab.active{color:var(--txt);border-bottom-color:var(--txt);font-weight:600}
.rm-content{display:flex;flex-direction:column;gap:14px}
.rm-section-label{font-size:10px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:1.2px;margin-bottom:8px;text-transform:uppercase}
.rm-section-hint{font-size:9px;color:var(--mut);font-weight:400;letter-spacing:.3px;text-transform:none;margin-left:4px}

/* Health dot */
.rm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.rm-dot.dot-ok{background:#10b981}
.rm-dot.dot-warn{background:#f59e0b}
.rm-dot.dot-risk{background:#ef4444}

/* Themes */
.rm-theme{margin-bottom:14px}
.rm-theme-h{display:flex;align-items:center;gap:10px;padding:8px 6px;cursor:pointer;user-select:none}
.rm-theme-h:hover{background:var(--surf2);border-radius:6px}
.rm-caret{background:none;border:none;color:var(--mut);font-size:11px;cursor:pointer;width:16px;font-family:inherit;padding:0}
.rm-theme-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rm-theme-label{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--txt);font-family:Roboto Mono,monospace}
.rm-theme-count{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;margin-left:auto;margin-right:6px}

/* Horizon buckets */
.rm-horizon{margin-bottom:14px;padding-left:24px}
.rm-horizon-label{font-size:10px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:1.2px;margin-bottom:8px}
.rm-horizon-count{margin-left:6px;font-weight:500}
.rm-feature-list{display:flex;flex-direction:column;gap:8px}

/* Feature card */
.rm-feature-card{background:var(--surf);border:1px solid var(--brd);border-left:3px solid var(--mut);border-radius:8px;padding:12px 14px;cursor:pointer;transition:border-color .12s,background .12s}

.rm-feature-card.health-warn{border-left-color:#f59e0b}
.rm-feature-card.health-risk{border-left-color:#ef4444}
.rm-feat-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rm-feat-title{flex:1;font-size:13px;font-weight:600;color:var(--txt);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rm-feat-id{font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace}
.rm-feat-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace}
.rm-feat-meta strong{color:var(--txt);font-weight:600}
.rm-feat-status{color:var(--acc)}
.rm-feat-kr{margin-top:6px;font-size:11px;color:var(--acc);font-family:Roboto Mono,monospace;background:rgba(108,99,255,.08);padding:3px 8px;border-radius:5px;display:inline-block}

.rm-empty{font-size:13px;color:var(--mut);padding:36px 24px;text-align:center;background:var(--surf);border:1px dashed var(--brd);border-radius:10px;line-height:1.6}
.rm-empty-ic{font-size:32px;margin-bottom:8px}
.rm-empty-inline{font-size:12px;color:var(--mut);font-style:italic;padding:8px 0}

/* Timeline */
.rm-timeline{background:var(--surf);border:1px solid var(--brd);border-radius:10px;overflow-x:auto}
.rm-tl-row{display:grid;grid-template-columns:220px repeat(6, minmax(120px, 1fr));border-bottom:1px solid var(--brd);min-height:42px;align-items:stretch}
.rm-tl-row:last-child{border-bottom:none}
.rm-tl-row.rm-tl-head{background:var(--surf2);font-size:10px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:1px}
.rm-tl-row.rm-tl-theme{background:var(--surf2)}
.rm-tl-name{padding:10px 12px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--brd);font-size:12px;color:var(--txt)}
.rm-tl-feat-name{padding-left:24px;font-size:11px;color:var(--mut)}
.rm-tl-q{padding:10px 8px;text-align:center;border-right:1px solid var(--brd);font-size:10px}
.rm-tl-cell{padding:8px;border-right:1px solid var(--brd);display:flex;align-items:center;min-height:32px}
.rm-tl-cell:last-child{border-right:none}
.rm-tl-bar{flex:1;display:flex;justify-content:space-between;align-items:center;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:filter .12s}
.rm-tl-bar:hover{filter:brightness(1.15)}
.rm-tl-bar.band-ok{background:rgba(16,185,129,.18);color:#10b981}
.rm-tl-bar.band-warn{background:rgba(245,158,11,.18);color:#f59e0b}
.rm-tl-bar.band-risk{background:rgba(239,68,68,.18);color:#ef4444}
.rm-tl-bar-title{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:6px}
.rm-tl-bar-pct{font-family:Roboto Mono,monospace;font-weight:700;flex-shrink:0}

/* Feature drawer */
.rm-drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9900;display:flex;align-items:stretch;justify-content:flex-end}
.rm-drawer{width:560px;max-width:96vw;background:var(--surf);border-left:1px solid var(--brd);padding:24px 28px;overflow-y:auto;box-shadow:-8px 0 32px rgba(0,0,0,.45);position:relative}
.rm-drawer-close{position:absolute;top:14px;right:18px;background:var(--surf2);border:1px solid var(--brd);color:var(--mut);width:30px;height:30px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rm-drawer-close:hover{color:var(--txt)}
.rm-drawer-h{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-right:40px}
.rm-drawer-title{font-size:18px;font-weight:700;color:var(--txt);line-height:1.3}
.rm-drawer-sub{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace;margin-top:2px}
.rm-drawer-status{display:flex;align-items:center;gap:8px;padding:12px 0;border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);margin-bottom:18px;flex-wrap:wrap}
.rm-pill{font-size:10px;padding:3px 8px;border-radius:10px;background:var(--surf2);color:var(--mut);font-family:Roboto Mono,monospace;font-weight:600}
.rm-pill-prog{background:var(--acc);color:#fff}
.rm-linked{background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2);border-radius:8px;padding:12px 14px;margin-bottom:18px}
.rm-linked-line{font-size:13px;color:var(--txt);margin-bottom:4px}
.rm-linked-line strong{color:var(--acc);font-family:Roboto Mono,monospace;margin-right:4px}
.rm-linked-sub{font-size:11px;color:var(--mut);font-family:Roboto Mono,monospace}
.rm-drawer-form{display:grid;grid-template-columns:120px 1fr;gap:10px 12px;align-items:center;margin-bottom:20px}
.rm-drawer-form label{font-size:10px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.6px}
.rm-field{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:6px;padding:8px 10px;font-size:12px;font-family:inherit;outline:none}
.rm-field:focus{border-color:var(--acc)}
.rm-field-small{max-width:70px}
.rm-hint{font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace;margin-left:6px}

.rm-block{margin-bottom:18px}
.rm-textarea{width:100%;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:10px 12px;font-size:12px;font-family:inherit;outline:none;min-height:80px;resize:vertical;box-sizing:border-box}
.rm-textarea:focus{border-color:var(--acc)}

/* Initiatives list inside drawer */
.rm-init-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surf2);border-radius:6px;margin-bottom:4px;font-size:11px}
.rm-init-id{color:var(--acc);font-family:Roboto Mono,monospace;font-weight:600;flex-shrink:0;min-width:80px}
.rm-init-title{flex:1;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.rm-init-prog{font-family:Roboto Mono,monospace;color:var(--mut);min-width:36px;text-align:right}
.rm-init-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 4px}

/* Risks list */
.rm-risk-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(245,158,11,.08);border-radius:6px;margin-bottom:4px;font-size:11px}
.rm-risk-icon{color:#f59e0b}
.rm-risk-txt{flex:1;color:var(--txt)}
.rm-risk-del{background:none;border:none;color:var(--mut);cursor:pointer;font-size:14px}
.rm-risk-add{display:flex;gap:6px;margin-top:8px}
.rm-risk-add input{flex:1;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;outline:none}

.rm-drawer-foot{display:flex;gap:10px;justify-content:flex-end;padding-top:14px;border-top:1px solid var(--brd)}
.rm-btn{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);padding:8px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:background .12s,border-color .12s}
.rm-btn:hover{background:var(--surf);border-color:var(--mut)}
.rm-btn-primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.rm-btn-primary:hover{filter:brightness(1.15);color:#fff;background:var(--acc)}
.rm-btn-danger{background:transparent;color:#ef4444;border-color:rgba(239,68,68,.4)}
.rm-btn-danger:hover{background:rgba(239,68,68,.08);border-color:#ef4444}

/* New feature / theme modal */
.rm-new-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9950;display:flex;align-items:center;justify-content:center;padding:24px}
.rm-new-box{background:var(--surf);border:1px solid var(--brd);border-radius:14px;width:100%;max-width:560px;padding:28px 32px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.rm-new-close{position:absolute;top:14px;right:18px;background:var(--surf2);border:1px solid var(--brd);color:var(--mut);width:30px;height:30px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rm-new-h{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:6px;padding-right:32px}
.rm-new-sub{font-size:12px;color:var(--mut);margin-bottom:18px;line-height:1.5}
.rm-new-name{width:100%;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;box-sizing:border-box}
.rm-new-name:focus{border-color:var(--acc)}
.rm-new-row{display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:center;margin-bottom:10px}
.rm-new-row label{font-size:10px;font-weight:700;color:var(--mut);font-family:Roboto Mono,monospace;letter-spacing:.6px}
.rm-new-row select,.rm-new-row input{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:6px;padding:8px 10px;font-size:12px;font-family:inherit;outline:none}
.rm-new-foot{display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--brd);margin-top:16px}

/* Color swatch picker */
.rm-color-row{display:flex;gap:6px;align-items:center}
.rm-color-swatch{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0}
.rm-color-swatch.active{border-color:var(--txt);transform:scale(1.15)}

/* Initiative picker mini-modal */
.rm-init-picker-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;padding:24px}
.rm-init-picker{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:14px;width:100%;max-width:480px;max-height:70vh;display:flex;flex-direction:column;gap:10px}
.rm-init-search{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none}
.rm-init-list-wrap{overflow-y:auto;flex:1}
.rm-init-pick-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px}
.rm-init-pick-row:hover{background:var(--surf2)}
.rm-init-pick-title{flex:1;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

@media (max-width:720px){
  .rm-wrap{padding:18px 14px 40px}
  .rm-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .rm-tab{white-space:nowrap;flex-shrink:0}
  .rm-tl-row{grid-template-columns:180px repeat(6, minmax(100px, 1fr))}
  .rm-drawer{width:100%;padding:18px}
  .rm-drawer-form,.rm-new-row{grid-template-columns:1fr}
}

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
async function hashPwd(email,pwd){return sha256(email.toLowerCase()+'::'+pwd);}
function getPwdStore(){try{return JSON.parse(localStorage.getItem('rl_pwd_store')||'{}');}catch(e){return {};}}
function setPwdStore(store){localStorage.setItem('rl_pwd_store',JSON.stringify(store));}
async function verifyPassword(email,pwd){var store=getPwdStore(),hash=store[email.toLowerCase()];if(!hash)return false;var attempt=await hashPwd(email,pwd);return attempt===hash;}
async function setPassword(email,pwd){var store=getPwdStore();store[email.toLowerCase()]=await hashPwd(email,pwd);setPwdStore(store);}
function hasPassword(email){return !!getPwdStore()[email.toLowerCase()];}

}

function upd(dept,id,field,val){
  var t=data[dept].filter(function(x){return x.id===id;})[0];if(!t)return;
  var old=t[field];t[field]=val;t.lastUpdated=new Date().toISOString().split('T')[0];
  if(field==='status'){
        logEntry(id+' status to '+val+(old?' (was '+old+')':''),val==='Done'?'done':'edit');
        if(val==='Done'){if(t.progress!==100)t.progress=100;if(!t.completedAt)t.completedAt=new Date().toISOString();}
        else{t.completedAt=null;}}
  else if(field==='priority'){logEntry(id+' priority to '+val,'edit');}
  else if(field==='progress'&&val!==old){
        logEntry(id+' progress '+val+'%','edit');
        if(val===100&&t.status!=='Done'){
          t.status='Done';
          t.completedAt=t.completedAt||new Date().toISOString();
          t.lastUpdated=new Date().toISOString().split('T')[0];
          logEntry(id+' auto-completed (100%)','done');
        }
      }
  autoSave();if(field==='status'||field==='priority')render();
}
