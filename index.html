function getUpcoming(){
  var now=new Date();now.setHours(0,0,0,0);
  var all=[];DEPTS.forEach(function(d){data[d].forEach(function(t){all.push(Object.assign({},t,{dept:d}));});});
  return all.filter(function(t){
    if(!t.due||t.status==='Done')return false;
    if(!t.due)return;
    var due=new Date(t.due);if(isNaN(due.getTime()))return;
    due.setHours(0,0,0,0);
    var diff=Math.round((due-now)/864e5);
    return diff>=0&&diff<=3;
  }).sort(function(a,b){var da=new Date(a.due||0),db=new Date(b.due||0);return da-db;});
}
function daysLabel(diff){
  if(diff===0)return{label:'DUE TODAY',cls:'d0'};
  if(diff===1)return{label:'1 DAY LEFT',cls:'d1'};
  if(diff===2)return{label:'2 DAYS LEFT',cls:'d2'};
  return{label:'3 DAYS LEFT',cls:'d3'};
}
function checkReminders(){
  if(Notification.permission!=='granted')return;
  var now=new Date();now.setHours(0,0,0,0);
  var dk=now.toISOString().slice(0,10);
  var fired={};try{fired=JSON.parse(localStorage.getItem('rl_nr_'+dk)||'{}');}catch(e){}
  getUpcoming().forEach(function(t){
    var due=new Date(t.due);due.setHours(0,0,0,0);
    var diff=Math.round((due-now)/864e5);
    var fk=t.id+'_d'+diff;
    if(fired[fk])return;
    var lbl=daysLabel(diff).label;
    var n=new Notification('Reloadly Task Reminder',{
      body:lbl+': '+t.name+' ('+t.dept+')',
      tag:fk,requireInteraction:diff===0
    });
    n.onclick=function(){window.focus();go(t.dept);n.close();};
    fired[fk]=true;
  });
  localStorage.setItem('rl_nr_'+dk,JSON.stringify(fired));
  Object.keys(localStorage).forEach(function(k){if(k.startsWith('rl_nr_')&&k!=='rl_nr_'+dk)localStorage.removeItem(k);});
}

function renderReminders(){
  var upcoming=getUpcoming(),np=Notification.permission,nb='';
  if(np==='default')nb='<div class="notif-bar">Enable browser notifications for reminders. <button class="notif-btn" onclick="requestNotifPerms()">Enable</button></div>';
  else if(np==='denied')nb='<div class="notif-bar" style="border-color:rgba(255,107,107,.3)">Notifications blocked in settings.</div>';
  else nb='<div class="notif-bar" style="border-color:rgba(74,222,128,.3);color:var(--grn)">Notifications active</div>';
  var h='<div class="ptitle">Reminders</div><div class="psub">Tasks due within the next 3 days</div>'+nb;
  if(!upcoming.length){
    h+='<div class="remind-panel" style="border-color:rgba(74,222,128,.3)"><div class="remind-panel-t" style="color:var(--grn)">All clear</div><div class="remind-panel-s">No tasks due in the next 3 days.</div></div>';
  }else{
    var now2=new Date();now2.setHours(0,0,0,0);
    h+='<div id="rlist" class="remind-panel"><div class="remind-panel-t">'+upcoming.length+' task'+(upcoming.length>1?'s':'')+' coming up</div><div class="remind-panel-s">Click a task to jump to its department</div>';
    upcoming.forEach(function(t){
      var due=new Date(t.due);due.setHours(0,0,0,0);
      var diff=Math.round((due-now2)/864e5);
      var dl=daysLabel(diff);
      h+='<div class="remind-row" data-dept="'+t.dept+'">'
        +'<span class="remind-chip '+dl.cls+'">'+dl.label+'</span>'
        +'<div class="remind-info"><div class="remind-name">'+esc(t.name)+'</div>'
        +'<div class="remind-meta">'+t.id+' &middot; '+t.dept+' &middot; '+esc((t.assignee||'').trim()||'Unassigned')+'</div></div>'
        +'<span class="badge '+t.priority+'">'+t.priority+'</span></div>';
    });
    h+='</div>';
  }
  document.getElementById('main').innerHTML=h;
  var rl=document.getElementById('rlist');
  if(rl)rl.addEventListener('click',function(e){var r=e.target.closest('[data-dept]');if(r)go(r.getAttribute('data-dept'));});

function exportExcel(){
  if(typeof XLSX==='undefined'){toast('XLSX not loaded','err');return;}
  if(!currentUser||EXPORT_EMAILS.indexOf(currentUser.email)<0){toast('Export restricted','err');return;}
  var wb=XLSX.utils.book_new();
  var sum=[['Department','Total','Not Started','In Progress','Blocked','Under Review','Done','%']];
  DEPTS.forEach(function(d){var s=stats(d);sum.push([d,s.total,s.ns,s.ip,s.bl,s.ur,s.dn,s.total?Math.round(s.dn/s.total*100)+'%':'0%']);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sum),'Summary');
  DEPTS.forEach(function(dept){
    var rows=[['ID','Task','DRI','Priority','Status','Progress%','Due','Start','Notes','Updated']];
    sorted(data[dept]).forEach(function(t){rows.push([t.id,t.name,t.assignee||'',t.priority,t.status,t.progress||0,t.due||'',t.startDate||'',t.notes||'',t.lastUpdated||'']);});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),dept);
  });
  var lr=[['Timestamp','User','Action','Tag']];
  actLog.forEach(function(e){lr.push([e.ts,e.user||'',e.msg,e.tag]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(lr),'Activity Log');
  XLSX.writeFile(wb,'Reloadly_Tasks_'+new Date().toISOString().slice(0,10)+'.xlsx');
  logEntry('Excel exported by '+currentUser.name+' <'+currentUser.email+'>','edit');
  autoSave();toast('Excel downloaded','ok');
}
function renderDash(){
  var all=[];DEPTS.forEach(function(d){data[d].forEach(function(t){all.push(Object.assign({},t,{dept:d}));});});
  var tot=all.length,dn=all.filter(function(t){return t.status==='Done';}).length;
  var ip=all.filter(function(t){return t.status==='In Progress';}).length;
  var bl=all.filter(function(t){return t.status==='Blocked';}).length;
  var crit=all.filter(function(t){return t.priority==='Critical'&&t.status!=='Done';});
  var dueList=all.filter(function(t){
    if(!t.due||t.status==='Done')return false;
    var d=Math.ceil((new Date(t.due)-new Date())/864e5);
    return d>=0&&d<=7;
  }).sort(function(a,b){return new Date(a.due)-new Date(b.due);});
  var today=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var cards='';
  DEPTS.forEach(function(dept){
    var s=stats(dept),c=CFG[dept],pct=s.total?Math.round(s.dn/s.total*100):0;
    cards+='<div class="sc '+c.cls+'" data-go="'+dept+'">'
      +'<div class="sc-lbl">'+dept.toUpperCase()+'</div>'
      +'<div class="sc-num" style="color:'+c.col+'">'+s.total+'</div>'
      +'<div class="sc-sub">'+pct+'% done &middot; '+s.bl+' blocked</div>'
      +'<div class="sc-bar"><div style="width:'+(s.total?s.dn/s.total*100:0)+'%;background:var(--grn)"></div>'
      +'<div style="width:'+(s.total?s.ip/s.total*100:0)+'%;background:var(--acc)"></div>'
      +'<div style="width:'+(s.total?s.ur/s.total*100:0)+'%;background:var(--yel)"></div>'
      +'<div style="width:'+(s.total?s.bl/s.total*100:0)+'%;background:var(--red)"></div></div>'
      +'<div style="margin-top:8px;display:flex;gap:8px">'
      +'<span style="font-size:9px;color:var(--mut)">'+s.ns+' pending</span>'
      +'<span style="font-size:9px;color:var(--acc)">'+s.ip+' active</span>'

  });
  var h='<div class="ptitle">Dashboard</div><div class="psub">'+today+'</div>'
    +'<div class="ov-row">'
    +'<div class="ov-card"><div class="ov-l">TOTAL TASKS</div><div class="ov-n">'+tot+'</div><div class="ov-s">across 4 departments</div></div>'
    +'<div class="ov-card" style="border-color:rgba(74,222,128,.3)"><div class="ov-l">COMPLETED</div><div class="ov-n" style="color:var(--grn)">'+dn+'</div><div class="ov-s">'+(tot?Math.round(dn/tot*100):0)+'% done</div></div>'
    +'<div class="ov-card" style="border-color:rgba(255,107,107,.3)"><div class="ov-l">BLOCKED</div><div class="ov-n" style="color:var(--red)">'+bl+'</div><div class="ov-s">'+ip+' active</div></div>'
    +'</div>'
    +'<div id="sc-grid" class="sc-grid">'+cards+'</div>'
    +'<div class="charts-grid">'
    +'<div class="cc"><div class="cc-t">Status by Department</div><div class="cc-s">All statuses stacked</div><div class="cw"><canvas id="ch-s"></canvas></div></div>'
    +'<div class="cc"><div class="cc-t">Priority Distribution</div><div class="cc-s">Across all tasks</div><div class="cw"><canvas id="ch-p"></canvas></div></div>'
    +'<div class="cc"><div class="cc-t">Completion Rate</div><div class="cc-s">% done per dept</div><div class="cw"><canvas id="ch-c"></canvas></div></div>'
    +'<div class="cc"><div class="cc-t">Active vs Blocked</div><div class="cc-s">In Progress vs Blocked</div><div class="cw"><canvas id="ch-ab"></canvas></div></div>'
    +'</div>';
  if(crit.length){
    h+='<div class="sh"><div><div class="sh-t">Critical Tasks</div><div class="sh-s">'+crit.length+' needing attention</div></div></div>'
      +'<div id="crit-tbl" class="tw"><table><thead><tr><th>ID</th><th>TASK</th><th>DEPT</th><th>DRI</th><th>STATUS</th><th>DUE</th></tr></thead><tbody>';
    crit.forEach(function(t){
      h+='<tr class="clickrow" data-go="'+t.dept+'">'
        +'<td class="tid">'+t.id+'</td><td>'+esc(t.name)+'</td>'
        +'<td>'+bpill(t.dept)+'</td><td>'+esc((t.assignee||'').trim())+'</td>'
        +'<td>'+spill(t.status)+'</td>'
        +'<td style="font-family:Roboto Mono,monospace;font-size:10px;color:var(--mut)">'+(t.due||'&mdash;')+'</td></tr>';
    });
    h+='</tbody></table></div>';
  }
  if(dueList.length){
    h+='<div class="sh"><div><div class="sh-t">Due This Week</div><div class="sh-s">'+dueList.length+' tasks</div></div></div>'
      +'<div id="due-tbl" class="tw"><table><thead><tr><th>ID</th><th>TASK</th><th>DEPT</th><th>PRIORITY</th><th>STATUS</th><th>DUE</th></tr></thead><tbody>';

function refreshLogList(main, fState){
  var existing = main.querySelector('.log-panel');if(existing) existing.remove();
  var filtered = filterLog(fState);
  var lp=document.createElement('div');lp.className='log-panel';
  var hd=document.createElement('div');hd.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px';
  hd.innerHTML='<div style="font-size:13px;font-weight:700">Recent Activity</div><div style="font-family:Roboto Mono,monospace;font-size:9px;color:var(--mut)">'+filtered.length+' of '+actLog.length+' \u00b7 newest first</div>';
  lp.appendChild(hd);
  if(filtered.length===0){var em=document.createElement('div');em.className='log-empty';em.textContent='No matches.';lp.appendChild(em);}
  else{filtered.forEach(function(e){var le=document.createElement('div');le.className='log-entry';le.innerHTML='<span class="log-time">'+e.ts+'</span><span style="font-family:Roboto Mono,monospace;font-size:9px;color:var(--acc);min-width:100px;white-space:nowrap;padding-top:1px">'+(e.user||'')+'</span><span class="log-msg">'+esc(e.msg)+'<span class="log-tag '+e.tag+'">'+e.tag+'</span></span>';lp.appendChild(le);});}
  main.appendChild(lp);
}
function filterLog(f){return actLog.filter(function(e){if(f.q && (e.msg||'').toLowerCase().indexOf(f.q.toLowerCase())<0) return false;if(f.user && e.user!==f.user) return false;if(f.tag && e.tag!==f.tag) return false;if(f.from || f.to){var d=new Date(e.ts);if(f.from && d < new Date(f.from)) return false;if(f.to && d > new Date(f.to+'T23:59:59')) return false;}return true;});}
function clearLog(){actLog=[];autoSave();render();toast('Log cleared','ok');}

function computeMetrics(email){
  var allTasks=[];DEPTS.forEach(function(d){(data[d]||[]).forEach(function(t){allTasks.push(Object.assign({},t,{dept:d}));});});
  var mine=allTasks.filter(function(t){var a=(t.assignee||'').toLowerCase(),u=USER_REGISTRY[email];if(!u)return false;return a===u.name.toLowerCase()||a===email.toLowerCase()||a===u.name.split(' ')[0].toLowerCase();});
  var total=mine.length,done=mine.filter(function(t){return t.status==='Done';}).length,blocked=mine.filter(function(t){return t.status==='Blocked';}).length;
  var overdue=mine.filter(function(t){return!t.due||t.status==='Done'?false:new Date(t.due)<new Date();}).length;
  var inProgress=mine.filter(function(t){return t.status==='In Progress';}).length;
  var avgProg=total>0?Math.round(mine.reduce(function(s,t){return s+(t.progress||0);},0)/total):0;
  var okrLinks2=JSON.parse(localStorage.getItem('rl_okr_links')||'{}');
  var myIds=mine.map(function(t){return t.id;});
  var okrCount=Object.keys(okrLinks2).filter(function(k){return(okrLinks2[k]||[]).some(function(id){return myIds.indexOf(id)>-1;});}).length;
  var doneRate=total>0?done/total:0;
  var bs=0;if(overdue>2)bs+=30;if(blocked>1)bs+=20;if(doneRate<0.3&&total>3)bs+=30;if(inProgress/Math.max(1,total)>0.6)bs+=20;
  var br=bs>60?'High':bs>30?'Medium':'Low';
  var ct=mine.filter(function(t){return t.status==='Done'&&t.createdAt&&t.completedAt;});
  var acd=ct.length>0?Math.round(ct.reduce(function(s,t){return s+(new Date(t.completedAt)-new Date(t.createdAt))/86400000;},0)/ct.length):0;
  return{total:total,done:done,blocked:blocked,overdue:overdue,inProgress:inProgress,avgProgress:avgProg,okrContributions:okrCount,doneRate:Math.round(doneRate*100),burnoutRisk:br,burnoutScore:bs,avgCompletionDays:acd,tasks:mine};

// ── Migration: existing OKR + task data -> typed nodes + edges ────────
NS.migrate=function(){
  var migrated=loadMig();
  var allQuarters=[];
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.indexOf('rl_okr_Q')===0)allQuarters.push(k.replace('rl_okr_',''));
  }
  if(allQuarters.length===0)allQuarters.push(getActiveOKRKey());
  var allNodes=loadNodes(),allEdges=loadEdges();
  var changed=false;
  allQuarters.forEach(function(qk){
    if(migrated[qk]&&allNodes[qk])return; // idempotent
    var okr=loadOKRForQuarter(qk);
    if(!okr||!okr.depts)return;
    var qnodes={},qedges=[];
    // Identify Company tier (dept name "Company") vs Department tier
    Object.keys(okr.depts).forEach(function(deptName){
      var deptBlock=okr.depts[deptName];
      if(!deptBlock||!deptBlock.objectives)return;
      var isCompany=(deptName==='Company');
      deptBlock.objectives.forEach(function(obj){
        var nid=(isCompany?'CO-':'DO-')+obj.id;
        qnodes[nid]={
          id:nid, type:isCompany?'CompanyObjective':'DepartmentObjective',
          title:obj.title||'(untitled)', dept:deptName, quarter:qk,
          ownerEmail:'', state:obj.progress>=100?'Done':(obj.progress>0?'Active':'Draft'),
          progressPct:obj.progress||0, sourceOkrObjId:obj.id,
          createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()
        };
        (obj.krs||[]).forEach(function(kr){
          var kid='KR-'+kr.id;
          qnodes[kid]={
            id:kid, type:'KeyResult', title:kr.title||'(untitled)',
            dept:deptName, quarter:qk,
            ownerEmail:'', ownerName:kr.owner||'',
            state:kr.progress>=100?'Done':(kr.confidence==='Off Track'?'AtRisk':(kr.progress>0?'Active':'Draft')),
            progressPct:kr.progress||0, confidence:kr.confidence||'Not started',
            metric:{name:'',baseline:null,target:null,unit:'',direction:''},
            sourceKrId:kr.id, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()
          };
          qedges.push({p:nid,c:kid,w:1.0,pr:true});
        });
      });
    });
    // Auto-cascade: link each Department Objective to a best-guess Company Objective in same quarter
    var coNodes=Object.values(qnodes).filter(function(n){return n.type==='CompanyObjective';});
    var doNodes=Object.values(qnodes).filter(function(n){return n.type==='DepartmentObjective';});
    doNodes.forEach(function(dn){
      var best=null,bestScore=0;
      coNodes.forEach(function(cn){
        var score=tokenOverlap(dn.title,cn.title);
        if(score>bestScore){bestScore=score;best=cn;}
      });
      if(best&&bestScore>0.12){
        qedges.push({p:best.id,c:dn.id,w:1.0,pr:true});
      }
    });
    // L6 auto-initiatives wrapping linked tasks
    var okrLinks={};
    try{okrLinks=JSON.parse(localStorage.getItem('rl_okr_links')||'{}');}catch(e){}
    Object.keys(okrLinks).forEach(function(krId){
      var taskIds=okrLinks[krId]||[];
      if(!taskIds.length)return;
      var krNodeId='KR-'+krId;
      if(!qnodes[krNodeId])return;
      var initId='IN-AUTO-'+krId;
      qnodes[initId]={
        id:initId, type:'Initiative', title:'Tasks linked to '+krId,
        dept:qnodes[krNodeId].dept, quarter:qk, ownerEmail:'',
        state:'Active', progressPct:0, workloadEstimateDays:taskIds.length*2,
        autoGenerated:true, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()
      };
      qedges.push({p:krNodeId,c:initId,w:1.0,pr:true});
      taskIds.forEach(function(tid){
        qedges.push({p:initId,c:'TA-'+tid,w:1.0,pr:true});
      });
    });
    allNodes[qk]=qnodes;
    allEdges[qk]=qedges;
    migrated[qk]=new Date().toISOString();
    changed=true;
  });
  if(changed){saveNodes(allNodes);saveEdges(allEdges);saveMig(migrated);}
};

// ── Token overlap (simple alignment helper) ───────────────────────────
function tokenOverlap(a,b){
  if(!a||!b)return 0;
  var stop={the:1,a:1,an:1,and:1,or:1,of:1,to:1,for:1,in:1,on:1,by:1,with:1,from:1,at:1,is:1,be:1,as:1};
  function toks(s){return String(s).toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(function(t){return t&&t.length>2&&!stop[t];});}
  var ta=toks(a),tb=toks(b);
  if(!ta.length||!tb.length)return 0;
  var sa={};ta.forEach(function(t){sa[t]=1;});
  var inter=0;tb.forEach(function(t){if(sa[t])inter++;});
  return inter/Math.max(ta.length,tb.length);
}

// ── Live linking to tasks ─────────────────────────────────────────────
NS.getTask=function(taId){
  if(!taId||taId.indexOf('TA-')!==0)return null;
  var raw=taId.slice(3);
  for(var i=0;i<DEPTS.length;i++){
    var d=DEPTS[i];if(!data[d])continue;
    for(var j=0;j<data[d].length;j++){if(data[d][j].id===raw)return Object.assign({},data[d][j],{dept:d});}
  }
  return null;
};

// ── Score engine ──────────────────────────────────────────────────────
function bandClass(score){return score>=80?'s-ok':(score>=50?'s-warn':'s-bad');}
NS.bandClass=bandClass;

NS.alignmentScore=function(node,edges,allNodes){
  var s=0;var parents=edges.filter(function(e){return e.c===node.id;});
  // 40: has at least one parent traceable upward (or node itself is L1)
  if(node.type==='CompanyObjective'||parents.length>0)s+=40;
  // 20: parents are in same quarter
  if(node.type==='CompanyObjective'||parents.every(function(e){var pn=allNodes[e.p];return pn&&pn.quarter===node.quarter;}))s+=20;
  // 20: owner set
  if(node.ownerEmail||node.ownerName)s+=20;
  // 20: title meaningfully shares tokens with at least one parent (or is L1)
  if(node.type==='CompanyObjective')s+=20;
  else{
    var ok=parents.some(function(e){var pn=allNodes[e.p];return pn&&tokenOverlap(node.title,pn.title)>0.15;});
    if(ok)s+=20;
  }
  return Math.min(100,s);
};

NS.execReadinessScore=function(node,edges,allNodes){
  var s=0;
  var children=edges.filter(function(e){return e.p===node.id;});
  var requiredMin=(node.type==='CompanyObjective'||node.type==='DepartmentObjective'||node.type==='TeamObjective'||node.type==='IndividualObjective')?1
    :(node.type==='KeyResult')?1
    :(node.type==='Initiative')?1:0;
  if(node.type==='Task')return 100;
  // 25: enough children
  if(children.length>=requiredMin)s+=25;
  // 25: all children have owner (name or email)
  var withOwner=children.filter(function(e){var cn=allNodes[e.c];if(!cn)return false;return cn.ownerEmail||cn.ownerName;});
  if(children.length===0||withOwner.length===children.length)s+=25;
  // 20: due dates (Initiative/Task only; KR uses quarter so auto-pass)
  if(node.type==='KeyResult'||node.type==='CompanyObjective'||node.type==='DepartmentObjective')s+=20;
  else{
    var withDue=children.filter(function(e){var cn=allNodes[e.c];return cn&&(cn.dueDate||cn.due);});
    if(children.length===0||withDue.length===children.length)s+=20;
  }
  // 15: workload estimate
  if(node.type==='KeyResult'||node.type==='CompanyObjective'||node.type==='DepartmentObjective')s+=15;
  else if(node.workloadEstimateDays)s+=15;
  // 15: metric defined (KR-only; others auto-pass)
  if(node.type==='KeyResult'){
    var m=node.metric||{};
    if(m.target!=null&&m.target!==''&&m.unit&&m.direction)s+=15;
  }else s+=15;
  return Math.min(100,s);
};

NS.riskLevel=function(node,edges,allNodes){
  // Heuristic risk: progress vs. expected, blocked tasks, confidence
  var penalties=0;
  if(node.state==='Blocked')penalties+=2;
  if(node.confidence==='Off Track'||node.confidence==='At Risk')penalties+=2;
  if(node.progressPct!=null){
    var qInfo=node.quarter?quarterDates(node.quarter):null;
    if(qInfo){
      var now=new Date(),s=new Date(qInfo.startDate),e=new Date(qInfo.endDate);
      var pct=Math.max(0,Math.min(1,(now-s)/(e-s+1)));
      var expected=Math.round(pct*100);
      if(node.progressPct<expected-25)penalties+=2;
      else if(node.progressPct<expected-10)penalties+=1;
    }
  }
  // Stalled task: lastUpdated > 14 days
  if(node.type==='Task'){
    var t=NS.getTask(node.id);
    if(t&&t.lastUpdated){
      var age=(Date.now()-new Date(t.lastUpdated))/86400000;
      if(age>14)penalties+=1;
    }
  }
  return penalties>=3?'High':(penalties>=1?'Medium':'Low');
};

// ── Heuristic insights ────────────────────────────────────────────────
NS.computeInsights=function(quarter){
  var nodes=(loadNodes()[quarter])||{};
  var edges=(loadEdges()[quarter])||[];
  var ins=[];
  // edges enrichment: include live tasks as virtual nodes
  var liveTaskNodes={};
  Object.keys(nodes).forEach(function(nid){
    if(nid.indexOf('IN-')===0){
      edges.filter(function(e){return e.p===nid;}).forEach(function(e){
        if(e.c.indexOf('TA-')===0&&!liveTaskNodes[e.c]){
          var t=NS.getTask(e.c);
          if(t){liveTaskNodes[e.c]={id:e.c,type:'Task',title:t.name,dept:t.dept,quarter:quarter,
            ownerName:t.assignee,progressPct:t.progress||0,state:t.status,due:t.due};}
        }
      });
    }
  });
  Object.assign(nodes,liveTaskNodes);

  // 1) Orphan KR: KR with 0 initiatives and 0 task children
  Object.values(nodes).forEach(function(n){
    if(n.type!=='KeyResult')return;
    var kids=edges.filter(function(e){return e.p===n.id;});
    if(kids.length===0){
      ins.push({sev:'high',type:'ORPHAN KR',body:'"'+truncate(n.title,80)+'" has no execution — no initiatives or tasks attached.',nodeId:n.id});
    }
  });
  // 2) Disconnected dept objective
  Object.values(nodes).forEach(function(n){
    if(n.type!=='DepartmentObjective')return;
    var parents=edges.filter(function(e){return e.c===n.id;});
    if(parents.length===0){
      ins.push({sev:'med',type:'UNALIGNED DO',body:'"'+truncate(n.title,80)+'" is not linked to any Company Objective.',nodeId:n.id});
    }
  });
  // 3) Weak metric on KR
  Object.values(nodes).forEach(function(n){
    if(n.type!=='KeyResult')return;
    var m=n.metric||{};
    if(!m.target||!m.unit||!m.direction){
      ins.push({sev:'low',type:'WEAK METRIC',body:'"'+truncate(n.title,80)+'" is missing a measurable metric (baseline/target/unit).',nodeId:n.id});
    }
  });
  // 4) Missing owner on active node
  Object.values(nodes).forEach(function(n){
    if(n.type==='Task')return;
    if(!n.ownerEmail&&!n.ownerName&&n.state!=='Draft'&&n.state!=='Cancelled'){
      ins.push({sev:'med',type:'NO OWNER',body:'"'+truncate(n.title,80)+'" is active but has no owner.',nodeId:n.id});
    }
  });
  // 5) At-risk KR (low progress, confidence flagged)
  Object.values(nodes).forEach(function(n){
    if(n.type!=='KeyResult')return;
    if(n.confidence==='Off Track'||n.confidence==='At Risk'){
      ins.push({sev:'high',type:'AT RISK',body:'"'+truncate(n.title,80)+'" — confidence flagged '+(n.confidence||'')+'.',nodeId:n.id});
    }
  });
  // 6) Overloaded owner (sum of active KRs/initiatives per owner)
  var owl={};
  Object.values(nodes).forEach(function(n){
    var o=(n.ownerEmail||n.ownerName||'').trim();
    if(!o)return;
    if(n.type==='KeyResult'||n.type==='Initiative'){
      owl[o]=(owl[o]||0)+1;
    }
  });
  Object.keys(owl).forEach(function(o){
    if(owl[o]>=8){
      ins.push({sev:'med',type:'OVERLOADED',body:o+' owns '+owl[o]+' KRs/initiatives this quarter — capacity check recommended.'});
    }
  });
  // 7) Stalled initiatives (no task progress in 14d)
  Object.values(nodes).forEach(function(n){
    if(n.type!=='Initiative')return;
    var kids=edges.filter(function(e){return e.p===n.id;}).map(function(e){return e.c;});
    var maxTouch=0;
    kids.forEach(function(tid){
      var t=NS.getTask(tid);
      if(t&&t.lastUpdated){maxTouch=Math.max(maxTouch,new Date(t.lastUpdated).getTime());}
    });
    if(maxTouch>0&&(Date.now()-maxTouch)/86400000>14){
      ins.push({sev:'med',type:'STALLED',body:'"'+truncate(n.title,80)+'" — no task movement in 14+ days.',nodeId:n.id});
    }
  });
  // 8) Duplicate initiatives in same dept
  var initsByDept={};
  Object.values(nodes).forEach(function(n){if(n.type==='Initiative'){(initsByDept[n.dept]=initsByDept[n.dept]||[]).push(n);}});
  Object.keys(initsByDept).forEach(function(d){
    var list=initsByDept[d];
    for(var i=0;i<list.length;i++)for(var j=i+1;j<list.length;j++){
      if(tokenOverlap(list[i].title,list[j].title)>0.6){
        ins.push({sev:'low',type:'POSSIBLE DUP',body:'"'+truncate(list[i].title,50)+'" and "'+truncate(list[j].title,50)+'" look similar in '+d+'.',nodeId:list[i].id});
      }
    }
  });
  return ins;
};
function truncate(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s;}

// ── Hydration helper used by all modes ─────────────────────────────────
function _stratHydrate(quarter){
  var allNodes=loadNodes()[quarter]||{};
  var allEdges=loadEdges()[quarter]||[];
  var liveTasks={};
  allEdges.forEach(function(e){
    if(e.c.indexOf('TA-')===0&&!liveTasks[e.c]){
      var t=NS.getTask(e.c);
      if(t)liveTasks[e.c]={id:e.c,type:'Task',title:t.name,dept:t.dept,quarter:quarter,
        ownerName:t.assignee,progressPct:t.progress||0,state:t.status,due:t.due,priority:t.priority,live:true};
    }
  });
  return {nodes:Object.assign({},allNodes,liveTasks),edges:allEdges,rawNodes:allNodes};
}

// ── Rollup: gather all descendant nodes of a root (BFS) ───────────────
function _stratDescendants(rootId,edges,nodesMap){
  var stack=[rootId],seen={},out=[],safety=2000;
  while(stack.length&&safety-->0){
    var id=stack.pop();if(seen[id])continue;seen[id]=1;
    if(id!==rootId){var n=nodesMap[id];if(n)out.push(n);}
    edges.filter(function(e){return e.p===id;}).forEach(function(e){stack.push(e.c);});
  }
  return out;
}

function _stratHealthBand(progressPct,quarter){
  if(progressPct==null)return 'unknown';
  var q=quarterDates(quarter);
  var now=Date.now(),sd=new Date(q.startDate).getTime(),ed=new Date(q.endDate).getTime();
  var expected=Math.round(Math.max(0,Math.min(1,(now-sd)/(ed-sd)))*100);
  var diff=progressPct-expected;
  if(progressPct>=90||diff>=-5)return 'ok';
  if(diff>=-25)return 'warn';
  return 'bad';
}

// ── Action item shortlist for a node and its descendants ──────────────
function _stratActionsForRoot(rootId,edges,nodesMap){
  var actions=[];
  var root=nodesMap[rootId];if(!root)return actions;
  var descendants=_stratDescendants(rootId,edges,nodesMap);
  var pool=[root].concat(descendants);
  pool.forEach(function(n){
    if(n.type==='KeyResult'){
      var kids=edges.filter(function(e){return e.p===n.id;});
      if(kids.length===0)actions.push({sev:'high',type:'ADD INITIATIVE',nodeId:n.id,body:'"'+truncate(n.title,70)+'" has no execution',action:'add-initiative'});
      var m=n.metric||{};
      if(!m.target||!m.unit||!m.direction)actions.push({sev:'low',type:'SET METRIC',nodeId:n.id,body:'"'+truncate(n.title,70)+'" needs baseline/target/unit',action:'edit-okr'});
      if(n.confidence==='Off Track'||n.confidence==='At Risk')actions.push({sev:'high',type:'KR AT RISK',nodeId:n.id,body:'"'+truncate(n.title,70)+'" — flagged '+n.confidence,action:'review'});
    }
    if(n.type!=='Task'&&!n.ownerEmail&&!n.ownerName&&n.state!=='Draft'&&n.state!=='Cancelled')
      actions.push({sev:'med',type:'ASSIGN OWNER',nodeId:n.id,body:'"'+truncate(n.title,70)+'" has no owner',action:'set-owner'});
    if(n.type==='DepartmentObjective'){
      var parents=edges.filter(function(e){return e.c===n.id;});
      if(parents.length===0)actions.push({sev:'med',type:'LINK TO COMPANY',nodeId:n.id,body:'"'+truncate(n.title,70)+'" is unaligned',action:'link-parent'});
    }
  });
  var order={high:0,med:1,low:2};
  actions.sort(function(a,b){return order[a.sev]-order[b.sev];});
  return actions;
}

function _stratHealthDot(band){
  var col=band==='ok'?'var(--grn)':band==='warn'?'var(--yel)':band==='bad'?'var(--red)':'var(--mut)';
  return '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+col+';box-shadow:0 0 6px '+col+'"></span>';
}
function _bandLabel(band){return band==='ok'?'On track':band==='warn'?'Trending behind':band==='bad'?'At risk':'No data';}

      if(krs.length===0){inner+='<div class="soc-empty">○ No KRs — open OKR Tracker to add</div>';}
      else{

          +'<button class="hbtn" onclick="event.stopPropagation();go(\'okr\');">✎ Edit in OKR Tracker</button>'

  // Dept-level action items

      var memberKRs=Object.values(H.nodes).filter(function(n){return n.type==='KeyResult'&&((n.ownerName||'')===uu.name||(n.ownerEmail||'')===em);});

    wrap.appendChild(grid);
  }

  main.appendChild(wrap);

};

// ── INDIVIDUAL VIEW ────────────────────────────────────────────────────
NS._renderIndividualMode=function(){
  var main=document.getElementById('main');if(!main)return;main.innerHTML='';
  var st=getState();
  var H=_stratHydrate(st.quarter);
  var wrap=document.createElement('div');wrap.className='strat-wrap';

  // Member picker — default to current user
  var person=st.mmMember||(currentUser?currentUser.email:'');

  var u=USER_REGISTRY[person]||{};

  var pickRow=document.createElement('div');pickRow.className='strat-pick-row';
  var pLabel=document.createElement('div');pLabel.className='strat-pick-l';pLabel.innerHTML='<span class="strat-vpt-ic" style="font-size:14px">🎯</span> Individual:';
  pickRow.appendChild(pLabel);
  var pSel=document.createElement('select');pSel.className='mm-sel';pSel.style.cssText='font-size:14px;font-weight:700;padding:8px 14px;min-width:240px';
  Object.keys(USER_REGISTRY).forEach(function(em){
    var uu=USER_REGISTRY[em];
    var o=document.createElement('option');o.value=em;o.textContent=uu.name+' · '+uu.role;if(em===person)o.selected=true;pSel.appendChild(o);
  });
  pSel.onchange=function(){setState({mmMember:this.value});NS.renderStrategy();};
  pickRow.appendChild(pSel);
  wrap.appendChild(pickRow);

  // Find owned + contributed nodes
  var name=u.name||person;
  var ownedKRs=Object.values(H.nodes).filter(function(n){return n.type==='KeyResult'&&((n.ownerName||'')===name||(n.ownerEmail||'')===person);});
  var ownedInits=Object.values(H.nodes).filter(function(n){return n.type==='Initiative'&&((n.ownerName||'')===name||(n.ownerEmail||'')===person);});
  var ownedTasks=DEPTS.reduce(function(acc,d){return acc.concat((data[d]||[]).filter(function(t){return(t.assignee||'').trim()===name||(t.assignee||'').toLowerCase()===name.toLowerCase()||(t.assignee||'').split(' ')[0]===name.split(' ')[0];}).map(function(t){return Object.assign({},t,{dept:d});}));},[]);

  // Tasks due this week
  var now=new Date(),weekFromNow=new Date(now.getTime()+7*86400000);
  var dueSoon=ownedTasks.filter(function(t){if(!t.due||t.status==='Done')return false;var d=new Date(t.due);return d<=weekFromNow;}).sort(function(a,b){return new Date(a.due)-new Date(b.due);});
  var stalled=ownedTasks.filter(function(t){if(t.status==='Done'||t.status==='Blocked')return false;if(!t.lastUpdated)return false;return (Date.now()-new Date(t.lastUpdated))/86400000>14;});
  var blocked=ownedTasks.filter(function(t){return t.status==='Blocked';});

  // Walk up from owned KRs to find Company Objectives they contribute to
  var contributesTo={};
  ownedKRs.forEach(function(kr){
    var chain=buildAncestorChain(kr.id,H.edges,H.nodes);
    chain.forEach(function(n){if(n.type==='CompanyObjective')contributesTo[n.id]=n;});
  });

  // Scorecard
  var sc=document.createElement('div');sc.className='strat-ind-scorecard';
  sc.innerHTML='<div class="sis-h">'+esc(name).toUpperCase()+' — '+esc(u.role||'')+' · '+esc(u.dept||'')+_thi('Personal accountability for this quarter: KRs owned across all depts; Tasks due in next 7 days; Tasks stalled 14+ days; Tasks Blocked; # of L1 Company Objectives this person contributes to via owned KRs. If L1 contributions = 0, the work is not feeding company strategy.')+'</div>'
    +'<div class="sis-stats">'
      +'<div class="hs"><div class="hs-v">'+ownedKRs.length+'</div><div class="hs-l">KRs OWNED</div></div>'
      +'<div class="hs"><div class="hs-v" style="color:var(--acc)">'+dueSoon.length+'</div><div class="hs-l">DUE THIS WEEK</div></div>'
      +'<div class="hs"><div class="hs-v" style="color:'+(stalled.length>0?'var(--yel)':'var(--mut)')+'">'+stalled.length+'</div><div class="hs-l">STALLED 14+ DAYS</div></div>'
      +'<div class="hs"><div class="hs-v" style="color:'+(blocked.length>0?'var(--red)':'var(--mut)')+'">'+blocked.length+'</div><div class="hs-l">BLOCKED</div></div>'
      +'<div class="hs"><div class="hs-v">'+Object.keys(contributesTo).length+'</div><div class="hs-l">L1 CONTRIBUTIONS</div></div>'
    +'</div>'
    +'<div class="sis-l1">Contributing to: '
    +(Object.keys(contributesTo).length?Object.keys(contributesTo).map(function(id){return '<span class="strat-id" style="cursor:pointer" onclick="STRAT._drillCO(\''+id+'\')">'+id+'</span> '+esc(truncate(contributesTo[id].title,30));}).join(' · ')

  if(ownedIOs.length===0){

    wrap.appendChild(empIo);

      var avgProg=krs.length?Math.round(krs.reduce(function(s,k){return s+(k.progressPct||0);},0)/krs.length):0;
      var band=_stratHealthBand(avgProg,st.quarter);
      var card=document.createElement('div');card.className='strat-ind-kr health-'+band;card.style.borderLeftColor='#a78bfa';

    wrap.appendChild(emp);
  }else{
    ownedKRs.forEach(function(kr){
      var initCount=H.edges.filter(function(e){return e.p===kr.id;}).length;
      var taskCount=_stratDescendants(kr.id,H.edges,H.nodes).filter(function(n){return n.type==='Task';}).length;
      var parents=buildAncestorChain(kr.id,H.edges,H.nodes).slice(0,-1);
      var card=document.createElement('div');card.className='strat-ind-kr';
      card.innerHTML='<div class="sik-top"><span class="strat-tier L5">L5</span><span class="strat-id">'+kr.id+'</span><span class="sik-prog">'+(kr.progressPct||0)+'%</span><span style="color:var(--mut);font-size:10px;font-family:Roboto Mono,monospace">'+esc(kr.confidence||'')+'</span></div>'
        +'<div class="sik-title">'+esc(kr.title)+'</div>'
        +'<div class="sik-up">↑ '+parents.map(function(p){return '<span class="strat-tier '+tierFor(p.type)+'" style="font-size:8px">'+tierFor(p.type)+'</span> <span style="cursor:pointer" onclick="STRAT._drillCO(\''+p.id+'\')">'+esc(truncate(p.title,40))+'</span>';}).join(' › ')+'</div>'
        +'<div class="sik-stats"><span>'+initCount+' initiative'+(initCount===1?'':'s')+'</span> · <span>'+taskCount+' task'+(taskCount===1?'':'s')+'</span></div>'
        +'<div class="sik-acts">'
          +(initCount===0?'<span class="soc-warn">⚠ This KR has no execution — add an initiative</span>':'')
          +'<button class="hbtn" onclick="go(\'okr\');">✎ Edit in OKR Tracker</button>'
          +'<button class="hbtn" onclick="STRAT._openMindmapFocus(\''+kr.id+'\')">🗺️ Mindmap</button>'
        +'</div>';
      wrap.appendChild(card);
    });
  }

  // Tasks due this week
  if(dueSoon.length){
    var tSec=document.createElement('div');tSec.className='strat-vp-sec';
    tSec.innerHTML='<div class="strat-vp-sec-h">YOUR TASKS DUE THIS WEEK ('+dueSoon.length+')'+_thi('Open tasks (not Done) assigned to this person with due dates in the next 7 days. Color-coded: red = overdue, amber = due within 2 days, grey = later this week. Click any row to jump to the dept board to edit directly.')+'</div>';
    wrap.appendChild(tSec);
    var tList=document.createElement('div');tList.className='strat-task-list';
    dueSoon.forEach(function(t){
      var dDate=new Date(t.due),days=Math.round((dDate-Date.now())/86400000);
      var col=days<0?'var(--red)':days<=2?'var(--yel)':'var(--mut)';
      var row=document.createElement('div');row.className='strat-task-row';
      row.innerHTML='<span class="strat-id">'+t.id+'</span>'
        +'<span style="flex:1">'+esc(t.name)+'</span>'
        +'<span style="font-size:9px;padding:2px 6px;border-radius:4px;background:var(--surf2);color:var(--mut)">'+esc(t.dept)+'</span>'
        +'<span style="font-size:9px;padding:2px 6px;border-radius:4px;background:var(--surf2);color:var(--mut)">'+esc(t.status)+'</span>'
        +'<span style="font-size:10px;color:'+col+';font-family:Roboto Mono,monospace">'+(days<0?Math.abs(days)+'d overdue':days===0?'today':days+'d')+'</span>';
      row.style.cursor='pointer';
      row.onclick=function(){go(t.dept);};
      tList.appendChild(row);
    });
    wrap.appendChild(tList);
  }

  // Stalled
  if(stalled.length){
    var sSec=document.createElement('div');sSec.className='strat-vp-sec';
    sSec.innerHTML='<div class="strat-vp-sec-h" style="color:var(--yel)">⚠ STALLED TASKS — no updates in 14+ days ('+stalled.length+')'+_thi('Open tasks assigned to this person where lastUpdated is older than 14 days. Stale work signals execution risk: blocked silently, no longer relevant, or forgotten. Click to jump to the dept board and update status, mark complete, or close.')+'</div>';
    wrap.appendChild(sSec);
    var sList=document.createElement('div');sList.className='strat-task-list';
    stalled.forEach(function(t){
      var row=document.createElement('div');row.className='strat-task-row';
      var age=Math.round((Date.now()-new Date(t.lastUpdated))/86400000);
      row.innerHTML='<span class="strat-id">'+t.id+'</span><span style="flex:1">'+esc(t.name)+'</span><span style="font-size:10px;color:var(--yel);font-family:Roboto Mono,monospace">'+age+' days stale</span>';
      row.style.cursor='pointer';
      row.onclick=function(){go(t.dept);};
      sList.appendChild(row);
    });
    wrap.appendChild(sList);
  }

  // What they contribute (KRs where assignee but not owner)
  // For first version: KRs in their dept they don't own
  if(u.dept){
    var deptOnlyKRs=Object.values(H.nodes).filter(function(n){
      if(n.type!=='KeyResult'||n.dept!==u.dept)return false;
      var o=n.ownerName||'';return o!==name&&o!==person;
    }).slice(0,5);
    if(deptOnlyKRs.length){
      var cSec=document.createElement('div');cSec.className='strat-vp-sec';
      cSec.innerHTML='<div class="strat-vp-sec-h">OTHER '+u.dept.toUpperCase()+' KRs (FOR CONTEXT)'+_thi('Up to 5 KRs in this person\'s department that they don\'t own — situational awareness of what colleagues are working on. Click any row to open its detail drawer.')+'</div>'
        +'<div class="strat-vp-sec-d">What your colleagues are working on this quarter</div>';
      wrap.appendChild(cSec);
      deptOnlyKRs.forEach(function(kr){
        var row=document.createElement('div');row.className='strat-task-row';
        row.innerHTML='<span class="strat-tier L5" style="font-size:8px">L5</span><span class="strat-id">'+kr.id+'</span><span style="flex:1">'+esc(kr.title)+'</span><span class="strat-owner">'+esc(kr.ownerName||kr.ownerEmail||'no owner')+'</span><span style="font-size:10px;color:var(--mut);font-family:Roboto Mono,monospace">'+(kr.progressPct||0)+'%</span>';
        row.style.cursor='pointer';
        row.onclick=function(){STRAT._drillKR(kr.id);};
        wrap.appendChild(row);
      });
    }
  }

  main.appendChild(wrap);
  _ensureDetailPanel();
};

NS.openIndividualOKRModal=function(personEmail,existingIOId){
  var st=getState();
  var H=_stratHydrate(st.quarter);
  var u=USER_REGISTRY[personEmail]||{};
  var existing=existingIOId?H.nodes[existingIOId]:null;
  var existingParent=null;
  var existingKRs=[];
  if(existing){
    existingParent=H.edges.filter(function(e){return e.c===existing.id;}).map(function(e){return H.nodes[e.p];}).filter(Boolean)[0];
    existingKRs=H.edges.filter(function(e){return e.p===existing.id;}).map(function(e){return H.nodes[e.c];}).filter(function(n){return n&&n.type==='KeyResult';});
  }

  // Remove any prior modal
  var prior=document.getElementById('io-modal-ov');if(prior)prior.remove();
  var ov=document.createElement('div');ov.id='io-modal-ov';ov.className='io-ov';
  var box=document.createElement('div');box.className='io-box';
  ov.appendChild(box);
  document.body.appendChild(ov);
  setTimeout(function(){ov.classList.add('open');},10);

  // Build form HTML
  var personName=u.name||personEmail;
  var personDept=u.dept||'';
  // Candidate parents: this dept's DOs first, then all COs, then other DOs
  var parentOptions=[];
  var dos=Object.values(H.nodes).filter(function(n){return n.type==='DepartmentObjective';});
  var cos=Object.values(H.nodes).filter(function(n){return n.type==='CompanyObjective';});
  var sameDept=dos.filter(function(n){return n.dept===personDept;});
  var otherDept=dos.filter(function(n){return n.dept!==personDept;});
  if(sameDept.length)parentOptions.push({group:personDept+' Department Objectives',items:sameDept});
  if(cos.length)parentOptions.push({group:'Company Objectives',items:cos});
  if(otherDept.length)parentOptions.push({group:'Other Department Objectives',items:otherDept});

  var html=
    '<button class="io-close" onclick="this.closest(\'.io-ov\').classList.remove(\'open\');setTimeout(function(){var p=document.getElementById(\'io-modal-ov\');if(p)p.remove();},250);">&times;</button>'
    +'<div class="io-h">'+(existing?'Edit Individual Objective':'Set Individual Objective')+'</div>'
    +'<div class="io-sub">For <strong>'+esc(personName)+'</strong> · '+esc(u.role||'')+' · '+esc(personDept)+' · '+quarterLabel(st.quarter)+'</div>'
    +'<div class="io-form">'
      +'<div class="io-field">'
        +'<label>OBJECTIVE TITLE</label>'
        +'<input type="text" id="io-title" placeholder="e.g. Own escalated ticket backlog and drive resolution velocity" value="'+esc(existing?existing.title:'')+'">'
      +'</div>'
      +'<div class="io-field">'
        +'<label>WHY THIS MATTERS (optional)</label>'
        +'<textarea id="io-desc" placeholder="What does success look like? Why is this the right commitment for the quarter?">'+esc(existing&&existing.description?existing.description:'')+'</textarea>'
      +'</div>'
      +'<div class="io-field">'
        +'<label>ALIGN TO PARENT — which Company or Department Objective does this support?</label>'
        +'<select id="io-parent">'
        +'<option value="">— select a parent objective —</option>';
  parentOptions.forEach(function(g){
    html+='<optgroup label="'+esc(g.group)+'">';
    g.items.forEach(function(it){
      var sel=existingParent&&existingParent.id===it.id?' selected':'';
      html+='<option value="'+esc(it.id)+'"'+sel+'>['+it.id+'] '+esc(truncate(it.title,80))+'</option>';
    });
    html+='</optgroup>';
  });
  html+='</select></div>'
    +'<div class="io-krs-h"><span>KEY RESULTS — what measurable outcomes prove this objective is achieved?</span><button type="button" class="hbtn xs" onclick="STRAT._ioAddKrRow()">+ Add KR</button></div>'
    +'<div class="io-krs" id="io-krs"></div>'
    +'<div class="io-foot">'
      +'<button class="hbtn" onclick="this.closest(\'.io-ov\').classList.remove(\'open\');setTimeout(function(){var p=document.getElementById(\'io-modal-ov\');if(p)p.remove();},250);">Cancel</button>'
      +(existing?'<button class="hbtn" style="border-color:var(--red);color:var(--red)" onclick="STRAT._ioDelete(\''+existing.id+'\')">Delete</button>':'')
      +'<button class="hbtn xl" style="background:var(--acc);color:#fff;border-color:var(--acc)" onclick="STRAT._ioSave(\''+esc(personEmail)+'\','+(existing?'\''+existing.id+'\'':'null')+')">'+(existing?'Save changes':'Create Individual OKR')+'</button>'
    +'</div>'
    +'</div>';

  box.innerHTML=html;

  // Populate KRs
  var krsContainer=box.querySelector('#io-krs');
  if(existingKRs.length){
    existingKRs.forEach(function(kr){_ioAppendKrRow(krsContainer,kr);});
  }else{
    _ioAppendKrRow(krsContainer);
    _ioAppendKrRow(krsContainer);
  }

  // Click outside / ESC closes
  ov.onclick=function(e){if(e.target===ov){ov.classList.remove('open');setTimeout(function(){ov.remove();},250);}};
  function escClose(e){if(e.key==='Escape'){ov.classList.remove('open');setTimeout(function(){ov.remove();},250);document.removeEventListener('keydown',escClose);}}
  document.addEventListener('keydown',escClose);

NS._ioSave=function(personEmail,existingId){
  var box=document.getElementById('io-modal-ov');if(!box)return;
  var title=(box.querySelector('#io-title').value||'').trim();
  var desc=(box.querySelector('#io-desc').value||'').trim();
  var parentId=box.querySelector('#io-parent').value;
  if(!title){toast('Objective title is required','err');return;}
  if(!parentId){toast('Choose a parent objective for alignment','err');return;}

  var st=getState();
  var u=USER_REGISTRY[personEmail]||{};
  var personName=u.name||personEmail;
  var personDept=u.dept||'';

  // Collect KR rows
  var krRows=Array.from(box.querySelectorAll('.io-kr-row'));
  var krs=krRows.map(function(r){
    return {
      id:r.querySelector('.io-kr-id').value||null,
      title:(r.querySelector('.io-kr-title').value||'').trim(),
      baseline:(r.querySelector('.io-kr-base').value||'').trim(),
      target:(r.querySelector('.io-kr-target').value||'').trim(),
      unit:(r.querySelector('.io-kr-unit').value||'').trim(),
      direction:r.querySelector('.io-kr-dir').value,
      confidence:r.querySelector('.io-kr-conf').value,
      progress:parseInt(r.querySelector('.io-kr-prog').value)||0
    };
  }).filter(function(k){return k.title;});
  if(krs.length===0){toast('At least one Key Result with a title is required','err');return;}

  // Read store
  var allNodes=loadNodes();var allEdges=loadEdges();
  var qNodes=allNodes[st.quarter]=allNodes[st.quarter]||{};
  var qEdges=allEdges[st.quarter]=allEdges[st.quarter]||[];

  // Generate or reuse IO id
  var ioId=existingId;
  if(!ioId){
    var firstName=(personName.split(' ')[0]||'X').replace(/[^A-Za-z]/g,'');
    var existing=Object.keys(qNodes).filter(function(id){return id.indexOf('IO-'+firstName+'-')===0;});
    var seq=existing.length+1;
    while(qNodes['IO-'+firstName+'-'+seq])seq++;
    ioId='IO-'+firstName+'-'+seq;
  }

  var nowIso=new Date().toISOString();
  var avgProg=krs.reduce(function(s,k){return s+k.progress;},0)/Math.max(1,krs.length);

  // Upsert IO node
  qNodes[ioId]={
    id:ioId, type:'IndividualObjective',
    title:title, description:desc, dept:personDept, quarter:st.quarter,
    ownerEmail:personEmail, ownerName:personName,
    state:avgProg>=100?'Done':(avgProg>0?'Active':'Active'),
    progressPct:Math.round(avgProg),
    createdAt:(qNodes[ioId]&&qNodes[ioId].createdAt)||nowIso,
    updatedAt:nowIso,
    userCreated:true
  };

  // Remove old parent edges for this IO, add new
  qEdges=qEdges.filter(function(e){return e.c!==ioId;});
  qEdges.push({p:parentId,c:ioId,w:1.0,pr:true});

  // Handle KRs: remove old edges from IO that no longer match, add/update each KR
  var keepKrIds={};
  krs.forEach(function(kr,idx){
    var kid=kr.id||('KR-'+ioId+'-'+(idx+1));
    while(!kr.id&&qNodes[kid]){kid='KR-'+ioId+'-'+(idx+1)+'-'+Math.random().toString(36).slice(2,5);}
    keepKrIds[kid]=true;
    qNodes[kid]={
      id:kid, type:'KeyResult', title:kr.title,
      dept:personDept, quarter:st.quarter,
      ownerEmail:personEmail, ownerName:personName,
      state:kr.progress>=100?'Done':(kr.confidence==='Off Track'?'AtRisk':(kr.progress>0?'Active':'Active')),
      progressPct:kr.progress, confidence:kr.confidence,
      metric:{baseline:kr.baseline,target:kr.target,unit:kr.unit,direction:kr.direction,name:kr.title},
      createdAt:(qNodes[kid]&&qNodes[kid].createdAt)||nowIso,
      updatedAt:nowIso,
      userCreated:true
    };
  });
  // Drop any IO→KR edges whose KR is no longer in the form, and the orphaned KR nodes themselves
  var droppedKrIds=qEdges.filter(function(e){return e.p===ioId&&e.c.indexOf('KR-')===0&&!keepKrIds[e.c];}).map(function(e){return e.c;});
  qEdges=qEdges.filter(function(e){return !(e.p===ioId&&e.c.indexOf('KR-')===0&&!keepKrIds[e.c]);});
  droppedKrIds.forEach(function(id){if(qNodes[id]&&qNodes[id].userCreated)delete qNodes[id];});
  // Add edges for current KRs (skip if edge already exists)
  Object.keys(keepKrIds).forEach(function(kid){
    if(!qEdges.some(function(e){return e.p===ioId&&e.c===kid;}))qEdges.push({p:ioId,c:kid,w:1.0,pr:true});
  });

  allNodes[st.quarter]=qNodes;
  allEdges[st.quarter]=qEdges;
  saveNodes(allNodes);saveEdges(allEdges);

  logEntry('Individual OKR '+(existingId?'updated':'created')+' for '+personName+': '+title,(existingId?'edit':'add'));
  toast('Individual OKR '+(existingId?'updated':'created'),'ok');

  // Close modal
  var ovEl=document.getElementById('io-modal-ov');if(ovEl){ovEl.classList.remove('open');setTimeout(function(){ovEl.remove();},250);}
  NS.renderStrategy();
};

NS._ioDelete=function(ioId){
  if(!confirm('Delete this Individual Objective and all its KRs? This cannot be undone.'))return;
  var st=getState();
  var allNodes=loadNodes();var allEdges=loadEdges();
  var qNodes=allNodes[st.quarter]||{};var qEdges=allEdges[st.quarter]||[];
  // Find KR children
  var krChildren=qEdges.filter(function(e){return e.p===ioId;}).map(function(e){return e.c;});
  delete qNodes[ioId];
  krChildren.forEach(function(id){if(qNodes[id]&&qNodes[id].userCreated)delete qNodes[id];});
  qEdges=qEdges.filter(function(e){return e.p!==ioId&&e.c!==ioId&&krChildren.indexOf(e.c)<0&&krChildren.indexOf(e.p)<0;});
  allNodes[st.quarter]=qNodes;allEdges[st.quarter]=qEdges;
  saveNodes(allNodes);saveEdges(allEdges);
  logEntry('Individual OKR deleted: '+ioId,'del');
  toast('Individual OKR deleted','ok');
  var ovEl=document.getElementById('io-modal-ov');if(ovEl){ovEl.classList.remove('open');setTimeout(function(){ovEl.remove();},250);}
  NS.renderStrategy();
};

NS._ioInlineProgress=function(nodeId,newPct){
  newPct=Math.min(100,Math.max(0,parseInt(newPct)||0));
  var st=getState();
  var allNodes=loadNodes();var allEdges=loadEdges();
  var qNodes=allNodes[st.quarter]||{};var qEdges=allEdges[st.quarter]||[];
  var n=qNodes[nodeId];if(!n)return;
  n.progressPct=newPct;n.updatedAt=new Date().toISOString();
  if(newPct>=100)n.state='Done';
  // If KR under an IO, recompute IO progress
  var parents=qEdges.filter(function(e){return e.c===nodeId;}).map(function(e){return qNodes[e.p];}).filter(Boolean);
  parents.forEach(function(p){
    if(p&&p.type==='IndividualObjective'){
      var krs=qEdges.filter(function(e){return e.p===p.id;}).map(function(e){return qNodes[e.c];}).filter(function(n){return n&&n.type==='KeyResult';});
      var avg=krs.length?Math.round(krs.reduce(function(s,k){return s+(k.progressPct||0);},0)/krs.length):0;
      p.progressPct=avg;p.updatedAt=new Date().toISOString();
      if(avg>=100)p.state='Done';
    }
  });
  allNodes[st.quarter]=qNodes;saveNodes(allNodes);
  logEntry('Progress updated: '+nodeId+' → '+newPct+'%','edit');
  NS.renderStrategy();
};

  hdr.appendChild(deptSel);

// ── Compute forecast for a single KR ────────────────────────────────────
function _v2Forecast(kr, quarter){
  var q=quarterDates(quarter);
  var now=Date.now(), sd=new Date(q.startDate).getTime(), ed=new Date(q.endDate).getTime();
  var pct=Math.max(0,Math.min(1,(now-sd)/(ed-sd)));
  var current=kr.progressPct||0;
  var confidenceAdj={'On track':0,'Not started':-5,'At Risk':-15,'Off Track':-30}[kr.confidence||'']||0;
  var daysLeft=Math.max(0,Math.floor((ed-now)/86400000));
  var totalDays=Math.max(1,Math.floor((ed-sd)/86400000));
  var daysElapsed=Math.max(1,totalDays-daysLeft);
  var velocity=current/daysElapsed;
  var projectedEnd=current + velocity*daysLeft + confidenceAdj;
  projectedEnd=Math.max(0, projectedEnd);
  var projectedDelta=projectedEnd - current;
  var band, label;
  if(projectedEnd>=100){band='ok';label='on track';}
  else if(projectedEnd>=70){band='warn';label='trending behind';}
  else{band='risk';label='at risk';}
  return {band:band, label:label, projectedEnd:Math.round(projectedEnd), projectedDelta:projectedDelta};
}

// ── Status strip (persistent 1-line dept summary) ───────────────────────
function _v2BuildStatusStrip(st, H){
  var strip=document.createElement('div');strip.className='v2-strip';
  var deptFilter=st.dept;
  var krs=Object.values(H.nodes).filter(function(n){return n.type==='KeyResult' && (deptFilter==='All'||n.dept===deptFilter);});
  var avgProg=krs.length?Math.round(krs.reduce(function(s,k){return s+(k.progressPct||0);},0)/krs.length):0;
  var atts=_v2BuildAttention(st, H);
  var blocked=_v2BlockedCount(st);
  var thisWeek=_v2DueThisWeekCount(st);
  var deptLabel=deptFilter==='All'?'COMPANY':deptFilter.toUpperCase();
  strip.innerHTML=
    '<span class="v2-strip-dept">'+deptLabel+'</span>'+
    '<span class="v2-strip-sep">·</span>'+

    '<span class="v2-strip-sep">·</span>'+

    '<span class="v2-strip-sep">·</span>'+

    '<span class="v2-strip-sep">·</span>'+

  return strip;
}
function _v2BlockedCount(st){
  var c=0;
  DEPTS.forEach(function(d){
    if(st.dept!=='All' && d!==st.dept)return;
    (data[d]||[]).forEach(function(t){if(t.status==='Blocked')c++;});
  });
  return c;
}
function _v2DueThisWeekCount(st){
  var c=0;var weekFromNow=Date.now()+7*86400000;
  DEPTS.forEach(function(d){
    if(st.dept!=='All' && d!==st.dept)return;
    (data[d]||[]).forEach(function(t){
      if(t.status==='Done'||!t.due)return;
      if(new Date(t.due).getTime()<=weekFromNow)c++;
    });
  });
  return c;
}

// ── Severity scoring per §6.3 ───────────────────────────────────────────
// score = base + impact + age. band = >=95 CRITICAL, >=70 HIGH, else MEDIUM
function _v2BuildAttention(st, H){
  var items=[];
  var deptFilter=st.dept;
  var snoozed=st.snoozed||{};var now=Date.now();
  // Pre-compute downstream counts for impact weighting
  function downstreamObjs(nodeId){
    var seen={},stack=[nodeId],count=0;
    while(stack.length){var id=stack.pop();if(seen[id])continue;seen[id]=1;
      var n=H.nodes[id];if(n&&(n.type==='DepartmentObjective'||n.type==='CompanyObjective'))count++;
      H.edges.filter(function(e){return e.c===id;}).forEach(function(e){stack.push(e.p);});
    }
    return count;
  }
  function ancestorAtRisk(nodeId){
    var seen={},stack=[nodeId];
    while(stack.length){var id=stack.pop();if(seen[id])continue;seen[id]=1;
      var n=H.nodes[id];
      if(n && n.type==='KeyResult' && (n.confidence==='Off Track'||n.confidence==='At Risk'))return true;
      H.edges.filter(function(e){return e.c===id;}).forEach(function(e){stack.push(e.p);});
    }
    return false;
  }
  function revenueKR(node){
    var t=(node.title||'').toLowerCase();
    return /revenue|margin|csat|sla|retention|churn|nps|conversion|pipeline|arr|mrr/.test(t);
  }
  function score(base, node, type){
    var impact=0, age=0;
    if(node){
      // Impact: blocks >=2 downstream objectives
      var ds=downstreamObjs(node.id);
      if(ds>=2)impact+=25;
      // Impact: revenue / retention / cost / sla KR
      if(node.type==='KeyResult' && revenueKR(node))impact+=15;
      // Impact: ancestor already at risk
      if(ancestorAtRisk(node.id))impact+=20;
      // Impact: forecasts negative
      if(node.type==='KeyResult'){
        var f=_v2Forecast(node, st.quarter);
        if(f.band==='risk')impact+=30;
        else if(f.band==='warn')impact+=10;
      }
      // Past quarter midpoint
      var q=quarterDates(st.quarter);
      var pct=(Date.now()-new Date(q.startDate).getTime())/(new Date(q.endDate).getTime()-new Date(q.startDate).getTime()+1);
      if(pct>0.5)age+=10;
      if(pct>0.75)age+=10;
    }
    return Math.min(base + impact + age, 120);
  }

  Object.values(H.nodes).forEach(function(n){
    if(deptFilter!=='All' && n.dept && n.dept!==deptFilter) return;
    var children=H.edges.filter(function(e){return e.p===n.id;});

    if(n.type==='KeyResult' && children.length===0){
      var sev=score(70, n, 'missing_execution');
      items.push({id:n.id+'::no-exec', sev:sev, type:'Missing execution plan', title:n.title, owner:n.ownerName||n.ownerEmail||'unassigned', impact:_v2ImpactSentence(n,H,st)||'KR cannot be delivered without an initiative', nodeId:n.id, action:'plan', actionLabel:'Create Initiative'});
    }
    if(n.type!=='Task' && !n.ownerName && !n.ownerEmail && n.state!=='Draft' && n.state!=='Cancelled'){
      var sev2=score(60, n, 'missing_owner');
      items.push({id:n.id+'::no-owner', sev:sev2, type:'No owner assigned', title:n.title, owner:'unassigned', impact:'Accountability gap blocks planning and review', nodeId:n.id, action:'assign', actionLabel:'Assign owner'});
    }
    if(n.type==='DepartmentObjective' && H.edges.filter(function(e){return e.c===n.id;}).length===0){
      var sev3=score(50, n, 'unaligned_dept_objective');
      items.push({id:n.id+'::unaligned', sev:sev3, type:'Not linked to a Company Objective', title:n.title, owner:n.ownerName||n.ownerEmail||'unassigned', impact:'Departmental work not visibly contributing to company strategy', nodeId:n.id, action:'link', actionLabel:'Link to Company OKR'});
    }
    if(n.type==='KeyResult' && (n.confidence==='Off Track' || n.confidence==='At Risk')){
      var sev4=score(65, n, 'confidence_at_risk');
      items.push({id:n.id+'::risk', sev:sev4, type:'KR flagged '+n.confidence, title:n.title, owner:n.ownerName||n.ownerEmail||'unassigned', impact:_v2ImpactSentence(n,H,st)||'Parent objective forecast may slip', nodeId:n.id, action:'review', actionLabel:'Review KR'});
    }
    if(n.type==='KeyResult'){
      var m=n.metric||{};
      if(!m.target || !m.unit){
        var sev5=score(30, n, 'weak_metric');
        items.push({id:n.id+'::no-metric', sev:sev5, type:'Metric undefined', title:n.title, owner:n.ownerName||n.ownerEmail||'unassigned', impact:'Cannot forecast outcome — no measurable target', nodeId:n.id, action:'define', actionLabel:'Define metric'});
      }
    }
  });

  // Stalled tasks per dept
  DEPTS.forEach(function(d){
    if(deptFilter!=='All' && d!==deptFilter)return;
    (data[d]||[]).forEach(function(t){
      if(t.status==='Done'||t.status==='Blocked')return;
      if(!t.lastUpdated)return;
      var age=(Date.now()-new Date(t.lastUpdated).getTime())/86400000;
      if(age>14){
        var sev6=score(40, null, 'stalled');
        items.push({id:t.id+'::stalled', sev:sev6, type:'Stalled task ('+Math.round(age)+'d)', title:t.name, owner:t.assignee||'unassigned', impact:'Initiative timeline slipping', nodeId:null, action:'open', actionLabel:'Open task board'});
      }
    });
  });

  // Filter snoozed
  items=items.filter(function(it){return !snoozed[it.id] || snoozed[it.id]<now;});
  // Assign band
  items.forEach(function(it){
    it.band = it.sev>=95?'critical':it.sev>=70?'high':'medium';
  });
  items.sort(function(a,b){return b.sev-a.sev;});
  return items;
}

function _v2ImpactSentence(node, H, st){
  if(!node)return '';
  // Walk up to find parent CO / DO and project the impact
  var parents=H.edges.filter(function(e){return e.c===node.id;}).map(function(e){return H.nodes[e.p];}).filter(Boolean);
  var pCO=null,pDO=null;
  parents.forEach(function(p){if(p.type==='CompanyObjective')pCO=p;else if(p.type==='DepartmentObjective')pDO=p;});
  if(!pCO && pDO){
    var pp=H.edges.filter(function(e){return e.c===pDO.id;}).map(function(e){return H.nodes[e.p];}).filter(Boolean);
    pCO=pp.find(function(n){return n.type==='CompanyObjective';});
  }
  if(pCO) return truncate(pCO.title,60)+' objective at risk';
  if(pDO) return truncate(pDO.title,60)+' at risk';
  return '';
}

// ── OVERVIEW TAB ────────────────────────────────────────────────────────
function _v2RenderOverview(host, st, H){
  var deptFilter=st.dept;
  var krs=Object.values(H.nodes).filter(function(n){
    if(n.type!=='KeyResult')return false;
    if(deptFilter!=='All' && n.dept!==deptFilter)return false;
    return true;
  });
  var objs=Object.values(H.nodes).filter(function(n){
    if(deptFilter==='All') return n.type==='CompanyObjective'||n.type==='DepartmentObjective';
    return n.type==='DepartmentObjective' && n.dept===deptFilter;
  });

  var forecasts=krs.map(function(kr){return _v2Forecast(kr, st.quarter);});
  var onTrack=forecasts.filter(function(f){return f.band==='ok';}).length;
  var behind=forecasts.filter(function(f){return f.band==='warn';}).length;
  var atRisk=forecasts.filter(function(f){return f.band==='risk';}).length;
  var avgProgress=krs.length?Math.round(krs.reduce(function(s,k){return s+(k.progressPct||0);},0)/krs.length):0;
  var overallBand=atRisk>0?'risk':(behind>onTrack?'warn':'ok');

  var forecastSentence;
  if(krs.length===0){
    forecastSentence='No Key Results in this scope yet.';
  }else if(atRisk>0){
    forecastSentence='Likely to miss quarterly target — '+atRisk+' KR'+(atRisk===1?'':'s')+' at risk based on velocity and confidence.';
  }else if(behind>onTrack){
    forecastSentence='Trending behind plan — most KRs not pacing to hit target on current velocity.';
  }else{
    forecastSentence='On pace to hit quarterly target across the scope.';
  }

  // === Business Impact Projections ===
  // Pick top 4 KRs ranked by gap (forecast minus target) for outcomes display
  var impactKRs=krs.map(function(kr){
    var f=_v2Forecast(kr, st.quarter);
    var target=100;
    var projected=Math.max(0,Math.min(100,(kr.progressPct||0)+f.projectedDelta));
    var conf=_v2ConfLabel(kr);
    var gap=target-projected;
    return {kr:kr, f:f, projected:projected, target:target, gap:gap, conf:conf};
  }).sort(function(a,b){return b.gap - a.gap;}).slice(0,4);

  // === Health Card ===
  var hc=document.createElement('div');hc.className='v2-health-card health-'+overallBand;
  var html=
    '<div class="v2-section-label">'+esc(st.dept==='All'?'COMPANY':st.dept.toUpperCase())+' · DEPARTMENT HEALTH</div>'+
    '<div class="v2-health-row">'+
      '<div class="v2-health-dot"></div>'+
      '<div class="v2-health-pct">'+avgProgress+'%</div>'+
      '<div class="v2-health-label">'+_v2BandLabel(overallBand)+'</div>'+
    '</div>'+
    '<div class="v2-forecast">Forecast: <strong>'+esc(forecastSentence)+'</strong>'+_thi('Computed from progress, time elapsed, KR confidence flags, and velocity over the last 21 days.')+'</div>';

  if(impactKRs.length){
    html += '<div class="v2-impact-h">Projected business impact:</div>';
    html += '<div class="v2-impact-list">';
    impactKRs.forEach(function(it){
      var band = it.f.band;
      html += '<div class="v2-impact-row band-'+band+'">'+
        '<span class="v2-impact-dot"></span>'+
        '<span class="v2-impact-title">'+esc(truncate(it.kr.title,52))+'</span>'+
        '<span class="v2-impact-vals"><strong>'+Math.round(it.projected)+'%</strong> projected · target '+Math.round(it.target)+'%</span>'+
        '<span class="v2-impact-conf">'+esc(it.conf)+' confidence</span>'+
      '</div>';
    });
    html += '</div>';
  }

  html +=
    '<div class="v2-health-counts">'+
      '<span class="v2-count">'+objs.length+' objective'+(objs.length===1?'':'s')+'</span>'+
      '<span class="v2-count">'+atRisk+' at risk</span>'+
      '<span class="v2-count">'+_v2BlockedCount(st)+' blocked items</span>'+
    '</div>';
  hc.innerHTML=html;
  host.appendChild(hc);

  // === Attention Center (TRIAGED) ===
  var items=_v2BuildAttention(st, H);
  host.appendChild(_v2RenderAttentionTriaged(items, st, H));

  // === Optional contribution breakdown (collapsed) ===
  if(st.dept==='All' || items.length===0){
    var cb=document.createElement('div');cb.className='v2-collapsible';
    var cbBtn=document.createElement('button');cbBtn.className='v2-collapse-btn';
    cbBtn.textContent=(st.heatmapOpen?'▾':'▸')+' Show contribution breakdown';
    cbBtn.onclick=function(){_v2SetState({heatmapOpen:!st.heatmapOpen});NS.renderStrategy();};
    cb.appendChild(cbBtn);
    host.appendChild(cb);
    if(st.heatmapOpen)host.appendChild(_v2BuildHeatmap(H, st));
  }
}

function _v2ConfLabel(kr){
  if(!kr.confidence || kr.confidence==='Not started')return 'low';
  if(kr.confidence==='Off Track')return 'low';
  if(kr.confidence==='At Risk')return 'low';
  if(kr.confidence==='On track')return (kr.progressPct||0)>=60?'high':'medium';
  return 'medium';
}

// ── Banded Attention Center renderer ────────────────────────────────────
function _v2RenderAttentionTriaged(items, st, H){
  var c=document.createElement('div');c.className='v2-attention';
  c.innerHTML=
    '<div class="v2-attention-h">'+
      '<span class="v2-attention-icon">⚠</span>'+
      '<span class="v2-attention-title">Attention Center</span>'+
      '<span class="v2-attention-count">'+items.length+'</span>'+
    '</div>';
  if(items.length===0){
    var empty=document.createElement('div');empty.className='v2-attention-empty';
    empty.textContent='○ All clear — no items need attention.';
    c.appendChild(empty);
    return c;
  }
  var bands=['critical','high','medium'];
  var visibleCaps={critical:2, high:2, medium:1};
  var ui=_v2State();
  bands.forEach(function(b){
    var bItems=items.filter(function(it){return it.band===b;});
    if(bItems.length===0)return;
    var expanded=!!ui.expanded['attn::'+b];
    var visible=expanded?bItems:bItems.slice(0, visibleCaps[b]);
    var sec=document.createElement('div');sec.className='v2-attn-band band-'+b;
    var label=b.toUpperCase()+' ( '+bItems.length+' )';
    sec.innerHTML='<div class="v2-attn-band-h"><span class="v2-attn-band-label">'+label+'</span></div>';
    var list=document.createElement('div');list.className='v2-attn-band-list';
    visible.forEach(function(it){
      var row=document.createElement('div');row.className='v2-attn-item';
      row.innerHTML=
        '<div class="v2-attn-item-issue">'+esc(it.type)+' — '+esc(truncate(it.title,68))+'</div>'+
        '<div class="v2-attn-item-meta">Owner: <strong>'+esc(it.owner)+'</strong> · Impact: '+esc(it.impact)+'</div>'+
        '<div class="v2-attn-item-acts">'+
          '<button class="v2-btn v2-btn-ghost" data-action="snooze" data-id="'+esc(it.id)+'">Snooze</button>'+
          '<button class="v2-btn" data-action="open" data-id="'+esc(it.id)+'" data-node="'+esc(it.nodeId||'')+'">'+esc(it.actionLabel||'Open')+'</button>'+
        '</div>';
      list.appendChild(row);
    });
    if(bItems.length>visibleCaps[b]){
      var more=document.createElement('button');more.className='v2-attn-more';
      more.textContent=expanded?('− Collapse '+b+' band'):('+ Show '+(bItems.length-visibleCaps[b])+' more in '+b);
      more.onclick=function(){
        var e=_v2State().expanded;e['attn::'+b]=!expanded;_v2SetState({expanded:e});NS.renderStrategy();
      };
      list.appendChild(more);
    }
    sec.appendChild(list);
    c.appendChild(sec);
  });
  // Wire button clicks
  c.addEventListener('click', function(e){
    var btn=e.target.closest('button[data-action]');if(!btn)return;
    var action=btn.getAttribute('data-action');
    var id=btn.getAttribute('data-id');
    if(action==='snooze'){
      var snoozed=_v2State().snoozed;snoozed[id]=Date.now()+7*86400000;
      _v2SetState({snoozed:snoozed});NS.renderStrategy();
    }else if(action==='open'){
      var nodeId=btn.getAttribute('data-node');
      if(nodeId){
        _v2SetState({tab:'objectives', expanded:Object.assign({}, _v2State().expanded, _v2BuildAncestorExpand(nodeId, H))});
        NS.renderStrategy();
      }
    }
  });
  return c;
}

function _v2BandLabel(b){return b==='ok'?'on track':b==='warn'?'trending behind':'at risk';}
function _v2ActionLabel(a){return ({plan:'Plan execution', assign:'Assign owner', link:'Link to Company', review:'Review KR', define:'Define metric'})[a]||'Open';}
function _v2BuildAncestorExpand(nodeId, H){
  var out={};var cur=nodeId;var safety=10;
  while(cur && safety-->0){
    out[cur]=true;
    var p=H.edges.filter(function(e){return e.c===cur;}).map(function(e){return e.p;})[0];
    cur=p;
  }
  return out;
}
function _v2BuildHeatmap(H, st){
  var c=document.createElement('div');c.className='v2-heatmap';
  var cos=Object.values(H.nodes).filter(function(n){return n.type==='CompanyObjective';});
  var depts=['Operations','Engineering','Finance','Sales','Management'];

  hRow.appendChild(_v2HmCell('','v2-hm-corner'));
  cos.forEach(function(co){hRow.appendChild(_v2HmCell('<div class="v2-hm-coh">'+esc(truncate(co.title,32))+'</div>','v2-hm-coh-cell'));});
  c.appendChild(hRow);
  depts.forEach(function(d){
    var row=document.createElement('div');row.className='v2-hm-row';
    row.appendChild(_v2HmCell('<div class="v2-hm-deph">'+d+'</div>','v2-hm-deph-cell'));
    cos.forEach(function(co){
      var deptDOs=Object.values(H.nodes).filter(function(n){return n.type==='DepartmentObjective' && n.dept===d;});
      var linkedDOs=deptDOs.filter(function(doN){return H.edges.some(function(e){return e.c===doN.id && e.p===co.id;});});
      var krs=linkedDOs.reduce(function(acc,doN){return acc.concat(H.edges.filter(function(e){return e.p===doN.id;}).map(function(e){return H.nodes[e.c];}).filter(function(n){return n && n.type==='KeyResult';}));},[]);
      var avg=krs.length?Math.round(krs.reduce(function(s,k){return s+(k.progressPct||0);},0)/krs.length):null;
      var band=avg==null?'empty':_v2HealthBand(avg, st.quarter);
      var cell=document.createElement('div');cell.className='v2-hm-cell '+band;
      if(linkedDOs.length===0){cell.innerHTML='<span class="v2-hm-empty">—</span>';}
      else{cell.innerHTML='<div class="v2-hm-cell-v">'+krs.length+' KR'+(krs.length===1?'':'s')+'</div><div class="v2-hm-cell-p">'+avg+'%</div>';}
      row.appendChild(cell);
    });
    c.appendChild(row);
  });
  return c;
}
function _v2HmCell(html, cls){var d=document.createElement('div');d.className=(cls||'')+' v2-hm-cell-base';d.innerHTML=html;return d;}
function _v2HealthBand(p, q){return p>=80?'ok':p>=50?'warn':'risk';}

// ── OBJECTIVES TAB — strategy tree, all collapsed ───────────────────────
function _v2RenderObjectives(host, st, H){
  var deptFilter=st.dept;
  // Roots: Company Objectives, optionally filtered to those that have descendants in dept
  var cos=Object.values(H.nodes).filter(function(n){return n.type==='CompanyObjective';});
  if(deptFilter!=='All'){
    cos=cos.filter(function(co){
      return Object.values(H.nodes).some(function(n){return n.type==='DepartmentObjective' && n.dept===deptFilter && H.edges.some(function(e){return e.p===co.id && e.c===n.id;});});
    });
  }
  // Also surface unaligned DOs in the chosen dept
  var unalignedDOs=[];
  if(deptFilter!=='All'){
    unalignedDOs=Object.values(H.nodes).filter(function(n){
      if(n.type!=='DepartmentObjective' || n.dept!==deptFilter)return false;
      return H.edges.filter(function(e){return e.c===n.id;}).length===0;
    });
  }
  var krCount=Object.values(H.nodes).filter(function(n){
    if(n.type!=='KeyResult')return false;
    if(deptFilter!=='All' && n.dept!==deptFilter)return false;
    return true;
  }).length;

  var meta=document.createElement('div');meta.className='v2-objs-meta';
  meta.innerHTML='<span>'+cos.length+' objective'+(cos.length===1?'':'s')+' · '+krCount+' key results</span>';
  host.appendChild(meta);

  if(cos.length===0 && unalignedDOs.length===0){
    var empty=document.createElement('div');empty.className='v2-empty';
    empty.textContent='No objectives in this scope. Use OKR Tracker to add one.';
    host.appendChild(empty);
    return;
  }

  cos.forEach(function(co){host.appendChild(_v2RenderTreeNode(co, H, st, 0, deptFilter));});

  if(unalignedDOs.length){
    var ua=document.createElement('div');ua.className='v2-section-label';ua.style.cssText='margin-top:24px';
    ua.textContent='UNALIGNED DEPARTMENT OBJECTIVES';
    host.appendChild(ua);
    unalignedDOs.forEach(function(doN){host.appendChild(_v2RenderTreeNode(doN, H, st, 0, deptFilter));});
  }
}

function _v2RenderTreeNode(node, H, st, depth, deptFilter){
  var children=H.edges.filter(function(e){return e.p===node.id;}).map(function(e){return H.nodes[e.c];}).filter(Boolean);
  if(deptFilter!=='All' && node.type==='CompanyObjective'){
    children=children.filter(function(c){
      if(c.type==='KeyResult') return c.dept===deptFilter;
      if(c.type==='DepartmentObjective') return c.dept===deptFilter;
      return true;
    });
  }
  var expanded=!!st.expanded[node.id];
  var band=_v2NodeHealth(node, st.quarter);

  var row=document.createElement('div');row.className='v2-tree-node depth-'+depth;
  var head=document.createElement('div');head.className='v2-tree-head';
  // Compute objective insight signals
  var insights='';
  if(node.type==='CompanyObjective' || node.type==='DepartmentObjective' || node.type==='IndividualObjective'){
    var desc=_stratDescendants(node.id, H.edges, H.nodes);
    var nodeKRs=desc.filter(function(n){return n.type==='KeyResult';});
    var atRiskKR=nodeKRs.filter(function(k){var f=_v2Forecast(k,st.quarter);return f.band==='risk';}).length;
    var missingExec=nodeKRs.filter(function(k){return H.edges.filter(function(e){return e.p===k.id;}).length===0;}).length;
    var krCount=nodeKRs.length;
    var pieces=[];
    if(krCount)pieces.push(krCount+' KR'+(krCount===1?'':'s'));
    if(atRiskKR)pieces.push('<span class="v2-mi v2-mi-risk">'+atRiskKR+' at risk</span>');
    if(missingExec)pieces.push('<span class="v2-mi v2-mi-warn">'+missingExec+' missing init</span>');
    insights=pieces.join(' · ');
  }else if(node.type==='KeyResult'){
    // Forecast + confidence inline
    var f=_v2Forecast(node, st.quarter);
    var conf=_v2ConfLabel(node);
    var proj=Math.max(0,Math.min(100,(node.progressPct||0)+(f.projectedDelta||0)));
    insights='forecast <strong>'+Math.round(proj)+'%</strong> · '+conf+' conf';
  }
  head.innerHTML=
    '<button class="v2-caret">'+(children.length?(expanded?'▾':'▸'):'•')+'</button>'+
    '<span class="v2-dot dot-'+band+'"></span>'+
    '<div class="v2-tree-title">'+esc(node.title)+'</div>'+
    '<div class="v2-tree-meta">'+
      '<span class="v2-tree-id">'+node.id+'</span>'+
      (insights?'<span class="v2-tree-insights">'+insights+'</span>':'')+
      '<span class="v2-tree-owner">'+esc(node.ownerName||node.ownerEmail||'unassigned')+'</span>'+
      '<span class="v2-tree-pct">'+(node.progressPct||0)+'%</span>'+
      '<span class="v2-tree-status status-'+band+'">'+_v2BandLabel(band)+'</span>'+
    '</div>';
  head.onclick=function(){
    if(!children.length)return;
    var exp=_v2State().expanded;
    exp[node.id]=!exp[node.id];
    _v2SetState({expanded:exp});
    NS.renderStrategy();
  };
  row.appendChild(head);

  if(expanded && children.length){
    var kids=document.createElement('div');kids.className='v2-tree-kids';
    // For KR rows, show metric line if available
    children.forEach(function(c){kids.appendChild(_v2RenderTreeNode(c, H, st, depth+1, deptFilter));});
    row.appendChild(kids);
  }
  return row;
}

function _v2NodeHealth(node, quarter){
  if(node.type==='Task')return 'neutral';
  if(node.confidence==='Off Track' || node.confidence==='At Risk') return 'risk';
  if(node.type==='KeyResult'){
    var f=_v2Forecast(node, quarter);
    return f.band;
  }
  // Roll-up for non-KR
  var p=node.progressPct||0;
  if(p>=80) return 'ok';
  if(p>=50) return 'warn';
  return 'risk';
}

// ── EXECUTION TAB ───────────────────────────────────────────────────────
function _v2RenderExecution(host, st, H){
  var deptFilter=st.dept;
  var allTasks=[];
  DEPTS.forEach(function(d){
    if(deptFilter!=='All' && d!==deptFilter)return;
    (data[d]||[]).forEach(function(t){
      if(t.status==='Done')return;
      allTasks.push(Object.assign({}, t, {dept:d}));
    });
  });

  var now=Date.now();
  var weekFromNow=now+7*86400000;
  var thisWeek=allTasks.filter(function(t){if(!t.due)return false;return new Date(t.due).getTime()<=weekFromNow;}).sort(function(a,b){return new Date(a.due)-new Date(b.due);});
  var blocked=allTasks.filter(function(t){return t.status==='Blocked';});
  var stalled=allTasks.filter(function(t){if(t.status==='Blocked')return false;if(!t.lastUpdated)return false;return (now-new Date(t.lastUpdated).getTime())/86400000>14;});

  var meta=document.createElement('div');meta.className='v2-objs-meta';
  meta.innerHTML='<span>'+blocked.length+' blocked · '+stalled.length+' stalled · '+thisWeek.length+' due this week</span>';
  host.appendChild(meta);

  _v2RenderTaskSection(host, 'THIS WEEK', thisWeek, false);
  _v2RenderTaskSection(host, 'BLOCKED', blocked, blocked.length===0);
  _v2RenderTaskSection(host, 'STALLED', stalled, true);
}
function _v2RenderTaskSection(host, label, list, collapsedDefault){
  if(!list.length)return;
  var st=_v2State();
  var key='exec::'+label;
  var open=st.expanded[key];
  if(open===undefined) open=!collapsedDefault;

  var sec=document.createElement('div');sec.className='v2-exec-sec';
  var hdr=document.createElement('div');hdr.className='v2-exec-hdr';
  hdr.innerHTML='<button class="v2-caret">'+(open?'▾':'▸')+'</button><div class="v2-exec-label">'+label+'</div><div class="v2-exec-count">'+list.length+'</div>';
  hdr.onclick=function(){var exp=_v2State().expanded;exp[key]=!open;_v2SetState({expanded:exp});NS.renderStrategy();};
  sec.appendChild(hdr);
  if(open){
    list.forEach(function(t){
      var row=document.createElement('div');row.className='v2-exec-row';
      var due=t.due?new Date(t.due):null;
      var dueText='';
      if(due){
        var d=Math.round((due-Date.now())/86400000);
        if(d<0)dueText=Math.abs(d)+'d overdue';
        else if(d===0)dueText='due today';
        else if(d===1)dueText='due tomorrow';
        else dueText='due '+d+'d';
      }
      var dotBand=t.status==='Blocked'?'risk':(t.priority==='Critical'?'warn':'neutral');
      row.innerHTML=
        '<span class="v2-dot dot-'+dotBand+'"></span>'+
        '<span class="v2-tree-id">'+t.id+'</span>'+
        '<div class="v2-tree-title">'+esc(t.name)+'</div>'+
        '<span class="v2-tree-owner">'+esc(t.assignee||'unassigned')+'</span>'+
        '<span class="v2-tree-pct">'+(t.progress||0)+'%</span>'+
        '<span class="v2-tree-status">'+esc(dueText||t.status)+'</span>';
      row.onclick=function(){go(t.dept);};
      sec.appendChild(row);
    });
  }
  host.appendChild(sec);
}
