<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reloadly Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#09090e;--surf:#111118;--surf2:#18181f;--brd:#252533;--acc:#6c63ff;--grn:#4ade80;--red:#ff6b6b;--yel:#fbbf24;--txt:#e4e4f0;--mut:#64647a;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;min-height:100vh}
.hdr{height:56px;background:var(--surf);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px}
.hex{width:26px;height:26px;background:var(--acc);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);flex-shrink:0}
.logo-t{font-size:13px;font-weight:800;letter-spacing:.06em}
.logo-s{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.1em}
.hdr-r{display:flex;gap:8px;align-items:center}
.ts{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut)}
.hbtn{font-family:'DM Mono',monospace;font-size:10px;padding:5px 12px;border-radius:5px;border:1px solid var(--brd);background:transparent;color:var(--mut);cursor:pointer;display:flex;align-items:center;gap:5px;transition:.2s;white-space:nowrap}
.hbtn:hover{border-color:var(--acc);color:var(--acc)}
.hbtn.ok{border-color:var(--grn);color:var(--grn)}
.hbtn.warn{border-color:var(--yel);color:var(--yel)}
.hbtn.xl{border-color:rgba(74,222,128,.4);color:var(--grn)}
.hbtn.xl:hover{border-color:var(--grn);background:rgba(74,222,128,.08)}
.hdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.pulse{animation:p 1.2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.15}}
.wrap{display:flex;height:calc(100vh - 56px)}
.sb{width:200px;min-width:200px;background:var(--surf);border-right:1px solid var(--brd);padding:16px 0;overflow-y:auto;display:flex;flex-direction:column}
.sb-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.14em;padding:0 18px;margin-bottom:4px;margin-top:14px}
.sb-lbl:first-child{margin-top:0}
.ni{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:600;border-left:2px solid transparent;transition:.15s;gap:6px;margin:1px 0}
.ni:hover{background:var(--surf2)}
.ni.active{background:var(--surf2);border-left-color:var(--acc)}
.ni-l{display:flex;align-items:center;gap:8px}
.dd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cnt{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);background:var(--bg);padding:1px 5px;border-radius:3px}
.main{flex:1;overflow-y:auto;padding:24px 28px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
.ptitle{font-size:20px;font-weight:800;margin-bottom:2px}
.psub{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);margin-bottom:20px}
.sc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.sc{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:14px;position:relative;overflow:hidden;cursor:pointer;transition:.15s}
.sc:hover{border-color:var(--acc)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.mgt::before{background:var(--acc)}
.sc.ops::before{background:var(--grn)}
.sc.fin::before{background:var(--yel)}
.sc.eng::before{background:var(--red)}
.sc-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.1em;margin-bottom:6px}
.sc-num{font-size:28px;font-weight:800;line-height:1;margin-bottom:2px}
.sc-sub{font-size:10px;color:var(--mut)}
.sc-bar{display:flex;gap:2px;margin-top:8px;height:3px;background:var(--bg);border-radius:2px;overflow:hidden}
.sc-bar div{height:100%}
.ov-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.ov-card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:14px}
.ov-l{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.1em;margin-bottom:6px}
.ov-n{font-size:34px;font-weight:800;line-height:1}
.ov-s{font-size:10px;color:var(--mut);margin-top:3px}
.charts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.dept-charts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.cc{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:16px}
.cc-t{font-size:12px;font-weight:700;margin-bottom:2px}
.cc-s{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);margin-bottom:12px}
.cw{position:relative;height:190px}
.atb{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 110px 110px 120px auto;gap:8px;align-items:end}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.07em}
input,select,textarea{background:var(--bg);border:1px solid var(--brd);color:var(--txt);font-family:'Syne',sans-serif;font-size:12px;padding:6px 8px;border-radius:5px;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus{border-color:var(--acc)}
select option{background:var(--surf2)}
.add-btn{background:var(--acc);color:#fff;border:none;border-radius:5px;padding:6px 14px;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer;height:32px;white-space:nowrap;transition:opacity .15s}
.add-btn:hover{opacity:.85}
.fb{display:flex;gap:5px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.fc{font-family:'DM Mono',monospace;font-size:9px;padding:3px 9px;border-radius:20px;border:1px solid var(--brd);background:transparent;color:var(--mut);cursor:pointer;transition:.15s}
.fc:hover,.fc.active{border-color:var(--acc);color:var(--txt);background:rgba(108,99,255,.1)}
.si{height:26px;padding:2px 8px;font-size:11px;max-width:160px}
.tw{background:var(--surf);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surf2);font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.08em;padding:9px 12px;text-align:left;border-bottom:1px solid var(--brd)}
tbody tr{border-bottom:1px solid var(--brd);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surf2)}
tbody tr.done-row{opacity:.55}
td{padding:8px 12px;font-size:12px;vertical-align:middle}
.tid{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);white-space:nowrap}
.badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-family:'DM Mono',monospace;font-size:9px;white-space:nowrap}
.badge.Critical{background:rgba(255,68,68,.12);color:#ff4444;border:1px solid rgba(255,68,68,.2)}
.badge.High{background:rgba(255,140,66,.12);color:#ff8c42;border:1px solid rgba(255,140,66,.2)}
.badge.Medium{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.badge.Low{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.sp{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.sp.ns{background:rgba(100,100,122,.12);color:var(--mut)}
.sp.ip{background:rgba(108,99,255,.12);color:var(--acc)}
.sp.bl{background:rgba(255,107,107,.12);color:var(--red)}
.sp.dn{background:rgba(74,222,128,.12);color:var(--grn)}
.sp.ur{background:rgba(251,191,36,.12);color:var(--yel)}
.sdot{width:4px;height:4px;border-radius:50%;background:currentColor}
.ie{background:transparent;border:none;font-size:12px;color:var(--txt);font-family:'Syne',sans-serif;width:100%}
.ie:focus{background:var(--bg);border:1px solid var(--acc);padding:3px 6px;border-radius:4px;outline:none}
.isel{background:transparent;border:none;color:inherit;font-family:inherit;font-size:inherit;font-weight:inherit;cursor:pointer;padding:0;outline:none;width:100%}
.pw{width:55px;background:var(--bg);border-radius:2px;height:3px;flex-shrink:0}
.pf{height:100%;border-radius:2px;background:var(--acc)}
.del{background:none;border:none;color:var(--mut);cursor:pointer;padding:2px 6px;border-radius:3px;font-size:14px;opacity:0;transition:.15s}
tbody tr:hover .del{opacity:1}
.del:hover{background:rgba(255,68,68,.1);color:#ff4444}
.empty{text-align:center;padding:40px 20px;color:var(--mut);font-family:'DM Mono',monospace;font-size:11px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sh-t{font-size:15px;font-weight:700}
.sh-s{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);margin-top:1px}
.toast{position:fixed;bottom:18px;right:18px;background:var(--surf2);border:1px solid var(--brd);border-radius:8px;padding:9px 14px;font-family:'DM Mono',monospace;font-size:11px;z-index:9999;animation:su .2s ease;max-width:260px;pointer-events:none}
@keyframes su{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.toast.ok{border-color:var(--grn);color:var(--grn)}
.toast.err{border-color:var(--red);color:var(--red)}
.as-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:4px;opacity:0;transition:opacity .3s}
.as-dot.show{opacity:1}
.done-divider td{padding:4px 12px;font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.1em;background:var(--surf2);border-top:1px solid var(--brd)}
.log-panel{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:16px;margin-bottom:20px}
.log-entry{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--brd);font-size:11px}
.log-entry:last-child{border-bottom:none}
.log-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);white-space:nowrap;min-width:110px;padding-top:1px}
.log-msg{flex:1;line-height:1.4}
.log-tag{font-family:'DM Mono',monospace;font-size:8px;padding:1px 5px;border-radius:3px;white-space:nowrap;margin-left:6px}
.log-tag.add{background:rgba(108,99,255,.15);color:var(--acc)}
.log-tag.edit{background:rgba(251,191,36,.15);color:var(--yel)}
.log-tag.del{background:rgba(255,107,107,.15);color:var(--red)}
.log-tag.done{background:rgba(74,222,128,.15);color:var(--grn)}
.gate-overlay{position:fixed;inset:0;background:rgba(9,9,14,.92);backdrop-filter:blur(6px);z-index:9999;display:flex;align-items:center;justify-content:center}
.gate-box{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:36px 40px;width:380px;text-align:center}
.gate-hex{width:36px;height:36px;background:var(--acc);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);margin:0 auto 16px}
.gate-title{font-size:18px;font-weight:800;margin-bottom:4px}
.gate-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);margin-bottom:24px}
.gate-input{width:100%;margin-bottom:12px;text-align:center}
.gate-btn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:6px;padding:9px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .15s}
.gate-btn:hover{opacity:.85}
.gate-err{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);margin-top:10px;min-height:16px}
.user-pill{font-family:'DM Mono',monospace;font-size:9px;background:rgba(108,99,255,.12);border:1px solid rgba(108,99,255,.2);color:var(--acc);padding:2px 8px;border-radius:20px;cursor:pointer}
.user-pill:hover{background:rgba(108,99,255,.2)}
.remind-panel{background:var(--surf);border:1px solid rgba(255,107,107,.3);border-radius:10px;padding:16px;margin-bottom:20px}
.remind-panel-t{font-size:13px;font-weight:700;margin-bottom:2px;color:var(--red)}
.remind-panel-s{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);margin-bottom:14px}
.remind-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd);cursor:pointer}
.remind-row:last-child{border-bottom:none}
.remind-row:hover{background:var(--surf2);margin:0 -16px;padding:8px 16px}
.remind-chip{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.remind-chip.d0{background:rgba(255,107,107,.2);color:var(--red);border:1px solid rgba(255,107,107,.3)}
.remind-chip.d1{background:rgba(255,140,66,.2);color:#ff8c42;border:1px solid rgba(255,140,66,.3)}
.remind-chip.d2{background:rgba(251,191,36,.2);color:var(--yel);border:1px solid rgba(251,191,36,.3)}
.remind-chip.d3{background:rgba(108,99,255,.2);color:var(--acc);border:1px solid rgba(108,99,255,.3)}
.remind-info{flex:1;min-width:0}
.remind-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.remind-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);margin-top:1px}
.notif-bar{display:flex;align-items:center;gap:8px;background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2);border-radius:8px;padding:8px 12px;margin-bottom:16px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut)}
.notif-btn{font-family:'DM Mono',monospace;font-size:9px;padding:3px 10px;border-radius:4px;border:1px solid var(--acc);background:transparent;color:var(--acc);cursor:pointer}
.notif-btn:hover{background:rgba(108,99,255,.1)}
.log-empty{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);text-align:center;padding:20px}
</style>
</head>
<body>
<div class="gate-overlay" id="gate" style="display:none">
  <div class="gate-box">
    <div class="gate-hex"></div>
    <div class="gate-title">Reloadly Task Manager</div>
    <div class="gate-sub">Enter your @reloadly.com email to access</div>
    <input class="gate-input" id="gate-email" type="email" placeholder="you@reloadly.com" onkeydown="if(event.key==='Enter')gateLogin()">
    <button class="gate-btn" onclick="gateLogin()">Access Dashboard</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>
<div class="hdr">
  <div class="logo"><div class="hex"></div><div><div class="logo-t">RELOADLY</div><div class="logo-s">TASK MANAGER</div></div></div>
  <div class="hdr-r">
    <div class="ts" id="ts"></div>
    <span class="as-dot" id="as-dot"></span>
    <span id="as-lbl" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--mut)"></span>
    <button class="hbtn xl" id="export-btn" onclick="exportExcel()" style="display:none">&#11015; EXPORT XLS</button>
    <button class="hbtn" onclick="go('reminders')" id="remind-hdr-btn" style="position:relative">&#128276; <span id="remind-hdr-cnt" style="display:none;position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:8px;font-family:'DM Mono',monospace;font-weight:700;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center"></span></button>
    <button class="hbtn" onclick="go('log')">&#128203; LOG</button>
  </div>
</div>
<div class="wrap">
  <div class="sb">
    <div class="sb-lbl">OVERVIEW</div>
    <div class="ni active" id="nav-dashboard" onclick="go('dashboard')"><div class="ni-l"><div class="dd" style="background:var(--mut)"></div>Dashboard</div></div>
    <div class="sb-lbl">DEPARTMENTS</div>
    <div class="ni" id="nav-Management" onclick="go('Management')"><div class="ni-l"><div class="dd" style="background:var(--acc)"></div>Management</div><div class="cnt" id="c-Management">0</div></div>
    <div class="ni" id="nav-Operations" onclick="go('Operations')"><div class="ni-l"><div class="dd" style="background:var(--grn)"></div>Operations</div><div class="cnt" id="c-Operations">0</div></div>
    <div class="ni" id="nav-Finance" onclick="go('Finance')"><div class="ni-l"><div class="dd" style="background:var(--yel)"></div>Finance</div><div class="cnt" id="c-Finance">0</div></div>
    <div class="ni" id="nav-Engineering" onclick="go('Engineering')"><div class="ni-l"><div class="dd" style="background:var(--red)"></div>Engineering</div><div class="cnt" id="c-Engineering">0</div></div>
    <div style="flex:1"></div>
    <div class="sb-lbl">TOOLS</div>
    <div class="ni" id="nav-reminders" onclick="go('reminders')"><div class="ni-l"><div class="dd" style="background:var(--red)"></div>Reminders</div><div class="cnt" id="c-reminders"></div></div>
    <div class="ni" id="nav-log" onclick="go('log')"><div class="ni-l"><div class="dd" style="background:var(--mut)"></div>Activity Log</div><div class="cnt" id="c-log">0</div></div>
  </div>
  <div class="main" id="main"></div>
</div>
<div id="toast" style="display:none" class="toast"></div>
<script>
const DEPTS=['Management','Operations','Finance','Engineering'];
const EXPORT_EMAILS_MAP={'dlubovci@reloadly.com':'Dren Lubovci','mfrancis@reloadly.com':'Michel Francis','ehirlemann@reloadly.com':'Enrique Hirlemann','epiard@reloadly.com':'Emmanuel Piard'};
const EXPORT_EMAILS=Object.keys(EXPORT_EMAILS_MAP);
let currentUser=null;
const CFG={Management:{p:'MGT',col:'#6c63ff',cls:'mgt'},Operations:{p:'OPS',col:'#4ade80',cls:'ops'},Finance:{p:'FIN',col:'#fbbf24',cls:'fin'},Engineering:{p:'ENG',col:'#ff6b6b',cls:'eng'}};
const STATUSES=['Not Started','In Progress','Blocked','Under Review','Done'];
const PRIORITIES=['Critical','High','Medium','Low'];

tot?Math.round(dn/tot*100):0)+'% completion rate</div></div><div class="ov-card" style="border-color:rgba(255,107,107,.3)"><div class="ov-l">BLOCKED</div><div class="ov-n" style="color:var(--red)">'+bl+'</div><div class="ov-s">'+ip+' currently active</div></div></div><div class="sc-grid">'+cards+'</div><div class="charts-grid"><div class="cc"><div class="cc-t">Status by Department</div><div class="cc-s">Stacked · all statuses</div><div class="cw"><canvas id="ch-s"></canvas></div></div><div class="cc"><div class="cc-t">Priority Distribution</div><div class="cc-s">Across all departments</div><div class="cw"><canvas id="ch-p"></canvas></div></div><div class="cc"><div class="cc-t">Completion Rate</div><div class="cc-s">% done per department</div><div class="cw"><canvas id="ch-c"></canvas></div></div><div class="cc"><div class="cc-t">Active vs Blocked</div><div class="cc-s">In Progress vs Blocked</div><div class="cw"><canvas id="ch-ab"></canvas></div></div></div>';if(crit.length)h+='<div class="sh"><div><div class="sh-t">🔴 Critical Tasks</div><div class="sh-s">'+crit.length+' needing immediate attention</div></div></div><div class="tw"><table><thead><tr><th>ID</th><th>TASK</th><th>DEPT</th><th>ASSIGNEE</th><th>STATUS</th><th>DUE</th></tr></thead><tbody>'+crit.map(t=>'<tr onclick="go(\''+t.dept+'\')" style="cursor:pointer"><td class="tid">'+t.id+'</td><td>'+esc(t.name)+'</td><td>'+bpill(t.dept)+'</td><td>'+esc(t.assignee)+'</td><td>'+spill(t.status)+'</td><td style="font-family:DM Mono,monospace;font-size:10px;color:var(--mut)">'+(t.dueDate||'—')+'</td></tr>').join('')+'</tbody></table></div>';if(due.length)h+='<div class="sh"><div><div class="sh-t">📅 Due This Week</div><div class="sh-s">'+due.length+' tasks due within 7 days</div></div></div><div class="tw"><table><thead><tr><th>ID</th><th>TASK</th><th>DEPT</th><th>PRIORITY</th><th>STATUS</th><th>DUE</th></tr></thead><tbody>'+due.map(t=>{const diff=Math.ceil((new Date(t.dueDate)-new Date())/864e5);return '<tr onclick="go(\''+t.dept+'\')" style="cursor:pointer"><td class="tid">'+t.id+'</td><td>'+esc(t.name)+'</td><td style="font-size:10px;color:var(--mut)">'+t.dept+'</td><td>'+(t.priority?bpill(t.priority):'—')+'</td><td>'+spill(t.status)+'</td><td style="font-family:DM Mono,monospace;font-size:10px;color:'+(diff<=1?'var(--red)':diff<=3?'var(--yel)':'var(--mut)')+'">'+t.dueDate+' <span style="font-size:9px">('+diff+'d)</span></td></tr>';}).join('')+'</tbody></table></div>';if(!tot)h+='<div class="empty">No tasks yet.</div>';document.getElementById('main').innerHTML=h;setTimeout(buildDashCharts,60);}
function buildDashCharts(){const st=Object.assign({},CO,{scales:{x:Object.assign({},CO.scales.x,{stacked:true}),y:Object.assign({},CO.scales.y,{stacked:true})}});mkChart('ch-s',{type:'bar',data:{labels:DEPTS.map(d=>d.substring(0,3).toUpperCase()),datasets:[{label:'Done',data:DEPTS.map(d=>stats(d).dn),backgroundColor:'rgba(74,222,128,.75)',borderRadius:2},{label:'In Progress',data:DEPTS.map(d=>stats(d).ip),backgroundColor:'rgba(108,99,255,.75)',borderRadius:2},{label:'Under Review',data:DEPTS.map(d=>stats(d).ur),backgroundColor:'rgba(251,191,36,.75)',borderRadius:2},{label:'Blocked',data:DEPTS.map(d=>stats(d).bl),backgroundColor:'rgba(255,107,107,.75)',borderRadius:2},{label:'Not Started',data:DEPTS.map(d=>stats(d).ns),backgroundColor:'rgba(100,100,122,.4)',borderRadius:2}]},options:st});const af=DEPTS.flatMap(d=>data[d]);mkChart('ch-p',{type:'doughnut',data:{labels:['Critical','High','Medium','Low'],datasets:[{data:[af.filter(t=>t.priority==='Critical').length,af.filter(t=>t.priority==='High').length,af.filter(t=>t.priority==='Medium').length,af.filter(t=>t.priority==='Low').length],backgroundColor:['rgba(255,68,68,.8)','rgba(255,140,66,.8)','rgba(251,191,36,.8)','rgba(74,222,128,.8)'],borderWidth:0,hoverOffset:5}]},options:Object.assign({},NO,{cutout:'62%'})});mkChart('ch-c',{type:'bar',data:{labels:DEPTS.map(d=>d.substring(0,3).toUpperCase()),datasets:[{label:'% Done',data:DEPTS.map(d=>{const s=stats(d);return s.total?Math.round(s.dn/s.total*100):0;}),backgroundColor:DEPTS.map(d=>CFG[d].col+'bb'),borderRadius:4}]},options:Object.assign({},CO,{plugins:Object.assign({},CO.plugins,{legend:{display:false}}),scales:{x:CO.scales.x,y:Object.assign({},CO.scales.y,{max:100,ticks:Object.assign({},CO.scales.y.ticks,{callback:v=>v+'%'})})}})});mkChart('ch-ab',{type:'bar',data:{labels:DEPTS.map(d=>d.substring(0,3).toUpperCase()),datasets:[{label:'In Progress',data:DEPTS.map(d=>stats(d).ip),backgroundColor:'rgba(108,99,255,.75)',borderRadius:2},{label:'Blocked',data:DEPTS.map(d=>stats(d).bl),backgroundColor:'rgba(255,107,107,.75)',borderRadius:2}]},options:CO});}
function renderLog(){let h='<div class="ptitle">Activity Log</div><div class="psub">'+actLog.length+' events · auto-saved on every change</div>';if(actLog.length){h+='<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="hbtn" onclick="if(confirm(\'Clear log?\'))clearLog()">&#128465; Clear Log</button></div><div class="log-panel"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-size:13px;font-weight:700">Recent Activity</div><div style="font-family:DM Mono,monospace;font-size:9px;color:var(--mut)">Newest first · who made each change</div></div>'+actLog.map(e=>'<div class="log-entry"><span class="log-time">'+e.ts+'</span><span style="font-family:DM Mono,monospace;font-size:9px;color:var(--acc);min-width:100px;white-space:nowrap;padding-top:1px">'+(e.user||'')+'</span><span class="log-msg">'+esc(e.msg)+'<span class="log-tag '+e.tag+'">'+e.tag+'</span></span></div>').join('')+'</div>';}else{h+='<div class="log-panel"><div class="log-empty">No activity yet.</div></div>';}document.getElementById('main').innerHTML=h;}
function clearLog(){actLog=[];autoSave();render();toast('Log cleared','ok');}
function renderDept(dept){const c=CFG[dept],s=stats(dept),sorted=sortedTasks(data[dept]);const fil=sorted.filter(t=>(fStatus==='All'||t.status===fStatus)&&(!fSearch||[t.name,t.id,t.assignee||''].join(' ').toLowerCase().includes(fSearch.toLowerCase())));let h='<div class="ptitle" style="color:'+c.col+'">'+dept+'</div><div class="psub">'+data[dept].length+' tasks · '+s.dn+' done · '+s.ip+' in progress · '+s.bl+' blocked</div><div class="dept-charts"><div class="cc"><div class="cc-t">Status Distribution</div><div class="cc-s">'+dept+' by status</div><div class="cw"><canvas id="dc-s"></canvas></div></div><div class="cc"><div class="cc-t">Priority Breakdown</div><div class="cc-s">'+dept+' by priority</div><div class="cw"><canvas id="dc-p"></canvas></div></div><div class="cc"><div class="cc-t">Avg Progress</div><div class="cc-s">Task completion gauge</div><div class="cw"><canvas id="dc-g"></canvas></div></div></div><div class="atb"><div class="fld"><label>TASK NAME</label><input id="nn" placeholder="Describe the task…" onkeydown="if(event.key===\'Enter\')addTask(\''+dept+'\')" ></div><div class="fld"><label>ASSIGNEE</label><input id="na" placeholder="Name…"></div><div class="fld"><label>PRIORITY</label><select id="np">'+PRIORITIES.map(p=>'<option>'+p+'</option>').join('')+'</select></div><div class="fld"><label>DUE DATE</label><input id="nd" type="date"></div><button class="add-btn" onclick="addTask(\''+dept+'\')" >+ ADD</button></div><div class="fb"><input class="si" placeholder="🔍 Search…" oninput="fSearch=this.value;renderDept(\''+dept+'\')" value="'+esc(fSearch)+'">'+['All',...STATUSES].map(st=>'<button class="fc '+(fStatus===st?'active':'')+' " onclick="fStatus=\''+st+'\';renderDept(\''+dept+'\')" >'+st+'</button>').join('')+'</div>';if(!fil.length){h+='<div class="tw"><div class="empty">'+(data[dept].length===0?'No tasks yet.':'Nothing matches this filter.')+'</div></div>';}else{const af=fil.filter(t=>t.status!=='Done'),df=fil.filter(t=>t.status==='Done');h+='<div class="tw"><table><thead><tr><th>ID</th><th>TASK NAME</th><th>ASSIGNEE</th><th>PRIORITY</th><th>STATUS</th><th>PROG%</th><th>DUE</th><th>NOTES</th><th></th></tr></thead><tbody>'+af.map(t=>trow(dept,t,false)).join('');if(df.length)h+='<tr class="done-divider"><td colspan="9">✓ COMPLETED ('+df.length+')</td></tr>';h+=df.map(t=>trow(dept,t,true)).join('')+'</tbody></table></div>';}document.getElementById('main').innerHTML=h;setTimeout(()=>buildDeptCharts(dept),60);}
function trow(dept,t,isDone){const pr=t.progress||0,id=t.id;return '<tr class="'+(isDone?'done-row':'')+'">'+'<td class="tid">'+id+(isDone?' ✓':'')+'</td>'+'<td style="min-width:160px;max-width:260px"><input class="ie" value="'+esc(t.name)+'" onblur="if(this.value.trim())upd(\''+dept+'\',\''+id+'\',\'name\',this.value.trim())" onkeydown="if(event.key===\'Enter\')this.blur()" ></td>'+'<td style="min-width:90px"><input class="ie" style="width:90px" value="'+esc(t.assignee||'')+'" onblur="upd(\''+dept+'\',\''+id+'\',\'assignee\',this.value.trim())" onkeydown="if(event.key===\'Enter\')this.blur()" ></td>'+'<td><select class="isel" onchange="upd(\''+dept+'\',\''+id+'\',\'priority\',this.value)" >'+PRIORITIES.map(p=>'<option'+(t.priority===p?' selected':'')+'>'+p+'</option>').join('')+'</select></td>'+'<td><select class="isel" style="min-width:100px" onchange="upd(\''+dept+'\',\''+id+'\',\'status\',this.value)" >'+STATUSES.map(s=>'<option'+(t.status===s?' selected':'')+'>'+s+'</option>').join('')+'</select></td>'+'<td><div style="display:flex;align-items:center;gap:5px"><div class="pw"><div class="pf" style="width:'+pr+'%"></div></div><input type="number" min="0" max="100" value="'+pr+'" style="width:34px;padding:1px 3px;font-size:10px;font-family:DM Mono,monospace;text-align:center;background:var(--bg);border:1px solid var(--brd);color:var(--txt);border-radius:3px;outline:none" onblur="upd(\''+dept+'\',\''+id+'\',\'progress\',Math.min(100,Math.max(0,parseInt(this.value)||0)));renderDept(\''+dept+'\')" onkeydown="if(event.key===\'Enter\')this.blur()" ></div></td>'+'<td><input type="date" value="'+(t.dueDate||'')+'" style="width:118px;font-size:10px;font-family:DM Mono,monospace;background:var(--bg);border:1px solid var(--brd);color:var(--txt);border-radius:3px;padding:3px 5px;outline:none" onchange="upd(\''+dept+'\',\''+id+'\',\'dueDate\',this.value)" ></td>'+'<td style="min-width:100px"><input class="ie" style="width:100px;font-size:11px" value="'+esc(t.notes||'')+'" placeholder="Notes…" onblur="upd(\''+dept+'\',\''+id+'\',\'notes\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()" ></td>'+'<td><button class="del" onclick="del(\''+dept+'\',\''+id+'\')" >×</button></td></tr>';}
function buildDeptCharts(dept){const s=stats(dept);mkChart('dc-s',{type:'doughnut',data:{labels:['Not Started','In Progress','Blocked','Under Review','Done'],datasets:[{data:[s.ns,s.ip,s.bl,s.ur,s.dn],backgroundColor:['rgba(100,100,122,.6)','rgba(108,99,255,.8)','rgba(255,107,107,.8)','rgba(251,191,36,.8)','rgba(74,222,128,.8)'],borderWidth:0,hoverOffset:5}]},options:Object.assign({},NO,{cutout:'58%'})});mkChart('dc-p',{type:'bar',data:{labels:['Critical','High','Medium','Low'],datasets:[{data:[s.critical,s.high,s.medium,s.low],backgroundColor:['rgba(255,68,68,.8)','rgba(255,140,66,.8)','rgba(251,191,36,.8)','rgba(74,222,128,.8)'],borderRadius:4}]},options:Object.assign({},CO,{plugins:Object.assign({},CO.plugins,{legend:{display:false}})})});const pv=data[dept].map(t=>t.progress||0),avg=pv.length?Math.round(pv.reduce((a,b)=>a+b,0)/pv.length):0;const gc=mkChart('dc-g',{type:'doughnut',data:{labels:['Done','Remaining'],datasets:[{data:[avg,100-avg],backgroundColor:['rgba(108,99,255,.9)','rgba(37,37,51,.5)'],borderWidth:0}]},options:Object.assign({},NO,{cutout:'70%',plugins:Object.assign({},NO.plugins,{legend:{display:false},tooltip:{enabled:false}})})});if(gc){const od=gc.draw.bind(gc);gc.draw=function(){od();const ctx=gc.ctx,ca=gc.chartArea;if(!ca)return;const cx=(ca.left+ca.right)/2,cy=(ca.top+ca.bottom)/2;ctx.save();ctx.fillStyle='#e4e4f0';ctx.font='bold 22px Syne,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(avg+'%',cx,cy-3);ctx.fillStyle='#64647a';ctx.font='9px DM Mono,monospace';ctx.fillText('avg progress',cx,cy+13);ctx.restore();};gc.draw();}}
function toast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='toast'+(type?' '+type:'');el.style.display='block';clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',2800);}
init();
</script>
